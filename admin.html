<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Online Visitors</title>
  <script type="module">
    import { inject } from 'https://cdn.jsdelivr.net/npm/@vercel/analytics@2/+esm';
    inject();
  </script>
</head>
<body>
  <h2>🟢 在線訪客監控</h2>

  <div id="count">載入中...</div>
  <div id="list">載入中...</div>

  <script>
    async function load() {
      try {
        const res = await fetch(
          "https://qgjtucbscrzqkvjsizwm.supabase.co/rest/v1/visitors?select=*&order=last_seen.desc",
          {
            headers: {
              apikey: "sb_publishable_XRIWwaSCWIPhUrulnQJDSg_QREhc9Q8",
              Authorization: "Bearer sb_publishable_XRIWwaSCWIPhUrulnQJDSg_QREhc9Q8"
            }
          }
        );

        const data = await res.json();

        // 🟢 在線判斷（10秒內）
        const online = data.filter(v => {
          return (Date.now() - new Date(v.last_seen).getTime()) < 10000;
        });

        // 🟢 人數
        document.getElementById("count").innerHTML =
          `目前在線：${online.length} 人`;

        // 🟢 列表
        document.getElementById("list").innerHTML =
          online.map(v => `
            <p>🟢 ${v.ip} ｜ ${new Date(v.last_seen).toLocaleTimeString()}</p>
          `).join("");

        // 🟡 沒人在線
        if (online.length === 0) {
          document.getElementById("list").innerHTML = "⚪ 沒有人在線";
        }

      } catch (err) {
        document.getElementById("list").innerHTML =
          "❌ 讀取失敗：" + err.message;
      }
    }

    // 🔥 立即載入
    load();

    // 🔁 每 3 秒更新（穩定節奏）
    setInterval(load, 3000);
  </script>
</body>
</html>
