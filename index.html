          if (r !== writeR) { grid[writeR][c] = grid[r][c]; grid[r][c] = null; }
          writeR--;
        }
      }
    }
  }

  function dropIntervalForLevel(lvl) { return Math.max(220, 750 - (lvl-1)*45); }

  function tick() {
    if (!running || resolving) { resetDropTimer(); return; }
    tryFall(false);
    resetDropTimer();
  }
  function resetDropTimer() {
    if (dropTimer) clearTimeout(dropTimer);
    if (!running) return;
    dropTimer = setTimeout(tick, dropIntervalForLevel(level));
  }

  function endGame() {
    running = false;
    if (dropTimer) clearTimeout(dropTimer);
    const earned = convertScoreToCoins('puyo', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '靈魂滿溢了！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '重新開始';
  }

  function drawBlob(c2, r, c, colorIdx, cellSize) {
    const palette = currentPalette();
    const color = palette[colorIdx];
    const x = c*cellSize+cellSize/2, y = r*cellSize+cellSize/2;
    c2.save();
    c2.shadowBlur=4; c2.shadowColor=color;
    c2.fillStyle = color;
    c2.beginPath(); c2.arc(x,y,cellSize*0.42,0,Math.PI*2); c2.fill();
    c2.fillStyle = '#2b2440';
    c2.beginPath(); c2.arc(x-cellSize*0.13,y-cellSize*0.05,cellSize*0.06,0,Math.PI*2); c2.fill();
    c2.beginPath(); c2.arc(x+cellSize*0.13,y-cellSize*0.05,cellSize*0.06,0,Math.PI*2); c2.fill();
    c2.fillStyle = 'rgba(255,255,255,0.5)';
    c2.beginPath(); c2.arc(x-cellSize*0.12,y-cellSize*0.16,cellSize*0.08,0,Math.PI*2); c2.fill();
    c2.restore();
  }

  function draw() {
    const theme = currentBoardTheme();
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = theme.grid; ctx.lineWidth=1;
    for (let c=0;c<=COLS;c++) { ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,canvas.height); ctx.stroke(); }
    for (let r=0;r<=ROWS;r++) { ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(canvas.width,r*CELL); ctx.stroke(); }

    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
      if (grid[r][c] !== null) drawBlob(ctx, r, c, grid[r][c], CELL);
    }
    if (running && !resolving) {
      const b = bPos();
      if (axisR>=0) drawBlob(ctx, axisR, axisC, axisColor, CELL);
      if (b.r>=0) drawBlob(ctx, b.r, b.c, bColor, CELL);
    }
  }

  function drawNext() {
    const theme = currentBoardTheme();
    if (!nextColors) {
      nctx.fillStyle = theme.bg;
      nctx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
      return;
    }
    const cx = nextCanvas.width/2;
    nctx.fillStyle = theme.bg;
    nctx.fillRect(0,0,nextCanvas.width,nextCanvas.height);
    const palette = currentPalette();
    [nextColors[0], nextColors[1]].forEach((colorIdx, i) => {
      const y = 24 + i*32;
      nctx.save();
      nctx.shadowBlur=4; nctx.shadowColor=palette[colorIdx];
      nctx.fillStyle = palette[colorIdx];
      nctx.beginPath(); nctx.arc(cx,y,13,0,Math.PI*2); nctx.fill();
      nctx.fillStyle = '#2b2440';
      nctx.beginPath(); nctx.arc(cx-4,y-2,2,0,Math.PI*2); nctx.fill();
      nctx.beginPath(); nctx.arc(cx+4,y-2,2,0,Math.PI*2); nctx.fill();
      nctx.restore();
    });
  }

  function render() {
    draw();
    drawNext();
    rafId = requestAnimationFrame(render);
  }

  function start() {
    grid = emptyGrid();
    score = 0; level = 1; totalPops = 0; chainDisplay = 0;
    scoreEl.textContent=0; levelEl.textContent=1; chainEl.textContent=0;
    nextColors = null;
    gameOverState = false;
    resolving = false;
    running = true;
    overlay.style.display = 'none';
    spawnPiece();
    resetDropTimer();
  }

  function onKey(e) {
    if (!running) return;
    if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') { moveLeft(); e.preventDefault(); }
    else if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') { moveRight(); e.preventDefault(); }
    else if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') { softDrop(); e.preventDefault(); }
    else if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') { rotatePiece(); e.preventDefault(); }
  }

  let touchStartX=0, touchStartY=0, touchMoved=false;
  function onTouchStart(e) { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; touchMoved=false; }
  function onTouchMove(e) {
    const dx = e.touches[0].clientX-touchStartX;
    const dy = e.touches[0].clientY-touchStartY;
    if (Math.abs(dx) > 22) {
      if (dx>0) moveRight(); else moveLeft();
      touchStartX = e.touches[0].clientX;
      touchMoved = true;
    } else if (dy > 22) {
      softDrop();
      touchStartY = e.touches[0].clientY;
      touchMoved = true;
    }
  }
  function onTouchEnd() { if (!touchMoved) rotatePiece(); }

  document.addEventListener('keydown', onKey);
  canvas.addEventListener('touchstart', onTouchStart, {passive:true});
  canvas.addEventListener('touchmove', onTouchMove, {passive:true});
  canvas.addEventListener('touchend', onTouchEnd, {passive:true});
  startBtn.addEventListener('click', start);

  grid = emptyGrid();
  render();

  window.__puyoCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (dropTimer) clearTimeout(dropTimer);
    document.removeEventListener('keydown', onKey);
    canvas.removeEventListener('touchstart', onTouchStart);
    canvas.removeEventListener('touchmove', onTouchMove);
    canvas.removeEventListener('touchend', onTouchEnd);
  };
}



// ===== game-swapmatch.js =====
// ============================================================
// SWAP MATCH-3 GAME — 甜點工坊交換消 (Pastry Workshop Swap Match)
// Classic swap-adjacent-tiles match-3: swap two tiles to form a
// run of 3+ same color. Limited moves, cascading combos score more.
// ============================================================

function mountSwapMatchGame(container, gameDef) {
  container.innerHTML = `
    <div id="smRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff0e0,#ffd9b8);position:relative;overflow:hidden;">
      <div id="smHUD" style="position:absolute;top:64px;display:flex;gap:20px;align-items:center;color:#6a3a1a;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="smScore" style="color:#ff8a3a;">0</strong></span>
        <span>步數 <strong id="smMoves" style="color:#6c5ce7;">25</strong></span>
        <span>連鎖 <strong id="smCombo" style="color:#ffc857;">0</strong></span>
      </div>
      <canvas id="smCanvas" width="384" height="384" style="border-radius:16px;box-shadow:0 12px 30px rgba(150,90,40,0.25);background:#fff8f0;margin-top:36px;max-width:90vw;"></canvas>
      <div style="position:absolute;bottom:16px;color:#6a3a1a;font-size:12px;letter-spacing:1px;">點擊兩個相鄰方塊交換位置，湊成3個以上同色即可消除</div>
      <div id="smOverlay" style="display:flex;position:absolute;inset:0;background:rgba(100,50,20,0.55);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🧁</div>
        <h2 id="smOverlayTitle" style="font-size:26px;letter-spacing:3px;">甜點工坊交換消</h2>
        <p id="smOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">點擊相鄰的兩個方塊交換<br>湊成3個以上同色即可消除得分<br>連續消除觸發連鎖加成，步數有限，把握機會！</p>
        <button id="smStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #ff8a3a;background:rgba(255,138,58,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('smCanvas');
  const ctx = canvas.getContext('2d');
  const GRID = 8;
  const CELL = canvas.width / GRID;
  const scoreEl = document.getElementById('smScore');
  const movesEl = document.getElementById('smMoves');
  const comboEl = document.getElementById('smCombo');
  const overlay = document.getElementById('smOverlay');
  const overlayTitle = document.getElementById('smOverlayTitle');
  const overlayDesc = document.getElementById('smOverlayDesc');
  const startBtn = document.getElementById('smStartBtn');

  function currentPalette() {
    const item = getEquipped('swapmatch', 'character');
    return item ? item.colors : ['#ff6fa5','#5ec8e8','#ffc857','#6c5ce7','#55e6a5','#ff8a5c'];
  }
  function currentBoardTheme() {
    const item = getEquipped('swapmatch', 'background');
    return item ? item.colors : { bg: '#fff8f0', grid: 'rgba(255,138,58,0.1)' };
  }

  let board; // board[r][c] = colorIdx
  let score = 0, movesLeft = 25, comboCount = 0;
  let running = false, animating = false;
  let selected = null;
  let particles = [];
  let rafId = null;

  function randColorIdx() { return Math.floor(Math.random()*currentPalette().length); }

  function wouldMatch(b, r, c, color) {
    // check horizontal
    let countL = 0, cc = c-1;
    while (cc>=0 && b[r][cc]===color) { countL++; cc--; }
    let countR = 0; cc = c+1;
    while (cc<GRID && b[r][cc]===color) { countR++; cc++; }
    if (countL+countR >= 2) return true;
    let countU = 0, rr = r-1;
    while (rr>=0 && b[rr][c]===color) { countU++; rr--; }
    let countD = 0; rr = r+1;
    while (rr<GRID && b[rr][c]===color) { countD++; rr++; }
    if (countU+countD >= 2) return true;
    return false;
  }

  function generateBoard() {
    const b = Array.from({length:GRID}, () => Array(GRID).fill(null));
    for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
      let color;
      let attempts = 0;
      do { color = randColorIdx(); attempts++; } while (wouldMatch(b,r,c,color) && attempts < 30);
      b[r][c] = color;
    }
    return b;
  }

  function findAllMatches(b) {
    const toClear = new Set();
    for (let r=0;r<GRID;r++) {
      let runStart = 0;
      for (let c=1;c<=GRID;c++) {
        if (c<GRID && b[r][c]===b[r][runStart] && b[r][c]!==null) continue;
        const runLen = c - runStart;
        if (runLen >= 3) for (let k=runStart;k<c;k++) toClear.add(r+','+k);
        runStart = c;
      }
    }
    for (let c=0;c<GRID;c++) {
      let runStart = 0;
      for (let r=1;r<=GRID;r++) {
        if (r<GRID && b[r][c]===b[runStart][c] && b[r][c]!==null) continue;
        const runLen = r - runStart;
        if (runLen >= 3) for (let k=runStart;k<r;k++) toClear.add(k+','+c);
        runStart = r;
      }
    }
    return toClear;
  }

  function applyGravityAndRefill(b) {
    for (let c=0;c<GRID;c++) {
      let writeR = GRID-1;
      for (let r=GRID-1;r>=0;r--) {
        if (b[r][c] !== null) {
          if (r !== writeR) { b[writeR][c] = b[r][c]; b[r][c] = null; }
          writeR--;
        }
      }
      for (let r=writeR;r>=0;r--) b[r][c] = randColorIdx();
    }
  }

  function spawnParticles(x,y,color) {
    for (let i=0;i<8;i++) {
      const a=Math.random()*Math.PI*2, s=Math.random()*2.5+1;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color});
    }
  }
  function updateParticles() {
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.04;});
  }
  function drawParticles() {
    particles.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function resolveCascade() {
    animating = true;
    comboCount = 0;
    function step() {
      const matches = findAllMatches(board);
      if (matches.size === 0) {
        animating = false;
        comboEl.textContent = 0;
        if (movesLeft <= 0) endGame();
        return;
      }
      comboCount++;
      comboEl.textContent = comboCount;
      const palette = currentPalette();
      matches.forEach(key => {
        const [r,c] = key.split(',').map(Number);
        spawnParticles(c*CELL+CELL/2, r*CELL+CELL/2, palette[board[r][c]]);
        board[r][c] = null;
      });
      const gained = matches.size * 15 * comboCount;
      score += gained;
      scoreEl.textContent = score;
      applyGravityAndRefill(board);
      setTimeout(step, 260);
    }
    step();
  }

  function tryAdjacentSwap(r1,c1,r2,c2) {
    if (animating || !running) return;
    const dr = Math.abs(r1-r2), dc = Math.abs(c1-c2);
    if (dr+dc !== 1) return;
    const tmp = board[r1][c1];
    board[r1][c1] = board[r2][c2];
    board[r2][c2] = tmp;
    const matches = findAllMatches(board);
    if (matches.size === 0) {
      // revert
      board[r2][c2] = board[r1][c1];
      board[r1][c1] = tmp;
      flashInvalidSwap(r1,c1,r2,c2);
      return;
    }
    movesLeft--;
    movesEl.textContent = movesLeft;
    resolveCascade();
  }

  function flashInvalidSwap(r1,c1,r2,c2) {
    // simple visual no-op placeholder; could add shake animation later
  }

  function handleClick(evt) {
    if (!running || animating) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const x = (evt.clientX-rect.left)*scaleX, y = (evt.clientY-rect.top)*scaleY;
    const c = Math.floor(x/CELL), r = Math.floor(y/CELL);
    if (r<0||r>=GRID||c<0||c>=GRID) return;

    if (!selected) {
      selected = [r,c];
    } else {
      const [sr,sc] = selected;
      if (sr===r && sc===c) { selected = null; return; }
      const dr=Math.abs(sr-r), dc=Math.abs(sc-c);
      if (dr+dc===1) {
        tryAdjacentSwap(sr,sc,r,c);
        selected = null;
      } else {
        selected = [r,c];
      }
    }
  }

  function drawTile(r,c,colorIdx) {
    const palette = currentPalette();
    const x=c*CELL, y=r*CELL, w=CELL-6, h=CELL-6;
    const color = palette[colorIdx];
    ctx.save();
    const cx=x+3+w/2, cy=y+3+h/2;
    ctx.translate(cx,cy);
    const isSelected = selected && selected[0]===r && selected[1]===c;
    if (isSelected) ctx.scale(1.08,1.08);
    ctx.save();
    ctx.shadowBlur = isSelected?10:5; ctx.shadowColor=color;
    const grad = ctx.createRadialGradient(-w*0.2,-h*0.2,2,0,0,w*0.7);
    grad.addColorStop(0,'#fff'); grad.addColorStop(0.3,color); grad.addColorStop(1,color);
    ctx.fillStyle = grad;
    roundRectPath(ctx,-w/2,-h/2,w,h,10);
    ctx.fill();
    if (isSelected) { ctx.strokeStyle='#fff'; ctx.lineWidth=3; roundRectPath(ctx,-w/2,-h/2,w,h,10); ctx.stroke(); }
    ctx.restore();
    ctx.restore();
  }

  function draw() {
    const theme = currentBoardTheme();
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = theme.grid; ctx.lineWidth=1;
    for (let i=0;i<=GRID;i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
    }
    for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
      if (board[r][c] !== null) drawTile(r,c,board[r][c]);
    }
    updateParticles();
    drawParticles();
  }

  function render() { draw(); rafId = requestAnimationFrame(render); }

  function endGame() {
    running = false;
    const earned = convertScoreToCoins('swapmatch', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '步數用完了！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '再玩一次';
  }

  function start() {
    score = 0; movesLeft = 25; comboCount = 0;
    scoreEl.textContent=0; movesEl.textContent=25; comboEl.textContent=0;
    board = generateBoard();
    selected = null;
    running = true;
    animating = false;
    overlay.style.display = 'none';
  }

  canvas.addEventListener('click', handleClick);
  startBtn.addEventListener('click', start);

  board = generateBoard();
  render();

  window.__swapmatchCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    canvas.removeEventListener('click', handleClick);
  };
}



// ===== game-suika.js =====
// ============================================================
// FRUIT MERGE GAME — 萌果合成樂園 (Cute Fruit Fusion Paradise)
// Physics-based merge game (Suika-style): drop fruits, same-tier
// fruits touching merge into the next bigger tier. Don't overflow!
// ============================================================

function mountSuikaGame(container, gameDef) {
  container.innerHTML = `
    <div id="skRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff0e8,#ffe0c2);position:relative;overflow:hidden;">
      <div id="skHUD" style="position:absolute;top:64px;display:flex;gap:20px;align-items:center;color:#6a3a1a;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="skScore" style="color:#ff8a3a;">0</strong></span>
        <span>最大果實 <strong id="skMaxTier" style="color:#ff6fa5;">莓果</strong></span>
      </div>
      <canvas id="skCanvas" width="320" height="440" style="border-radius:14px;box-shadow:0 12px 30px rgba(150,90,40,0.3);background:#fffaf0;margin-top:36px;max-width:88vw;cursor:pointer;"></canvas>
      <div style="position:absolute;bottom:14px;color:#6a3a1a;font-size:12px;letter-spacing:1px;">移動滑鼠/手指選位置，點擊掉落水果 ・ 同種水果碰撞會合成更大的果實</div>
      <div id="skOverlay" style="display:flex;position:absolute;inset:0;background:rgba(120,70,30,0.55);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🍉</div>
        <h2 id="skOverlayTitle" style="font-size:26px;letter-spacing:3px;">萌果合成樂園</h2>
        <p id="skOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">掉落水果到容器中<br>同種水果相碰即可合成更大的水果<br>果實堆到頂端就遊戲結束，挑戰合成出夢幻終極果實！</p>
        <button id="skStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #ff8a3a;background:rgba(255,138,58,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('skCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const WALL = 8;
  const DANGER_Y = H * 0.16;
  const scoreEl = document.getElementById('skScore');
  const maxTierEl = document.getElementById('skMaxTier');
  const overlay = document.getElementById('skOverlay');
  const overlayTitle = document.getElementById('skOverlayTitle');
  const overlayDesc = document.getElementById('skOverlayDesc');
  const startBtn = document.getElementById('skStartBtn');

  const TIERS = [
    { name:'莓果', r:12, color:'#ff6fa5' },
    { name:'葡萄', r:16, color:'#a06fd4' },
    { name:'橘子', r:21, color:'#ff9b3a' },
    { name:'蘋果', r:27, color:'#ff5c5c' },
    { name:'水梨', r:34, color:'#bde85a' },
    { name:'蜜桃', r:42, color:'#ffb3c6' },
    { name:'鳳梨', r:51, color:'#ffe066' },
    { name:'哈密瓜', r:61, color:'#9be870' },
    { name:'西瓜', r:72, color:'#2fae5c' },
    { name:'星空夢幻瓜', r:86, color:'#6c4fd4', special:true }
  ];

  function currentPalette() {
    const item = getEquipped('suika', 'character');
    return item ? item.colors : TIERS.map(t=>t.color);
  }
  function currentBoardTheme() {
    const item = getEquipped('suika', 'background');
    return item ? item.colors : { bg: '#fffaf0', wall: '#e0a868' };
  }

  let fruits = [];
  let score = 0, maxTierReached = 0, running = false, gameOverState = false;
  let dropX = W/2, canDrop = true, nextTier = 0;
  let dangerTimer = 0;
  let rafId = null;
  let idCounter = 0;

  const GRAVITY = 0.42;
  const DAMPING = 0.992;
  const FLOOR_Y = H - WALL;

  function pickNextTier() {
    const weights = [0.35,0.3,0.2,0.15];
    const r = Math.random();
    let acc = 0;
    for (let i=0;i<weights.length;i++) { acc += weights[i]; if (r < acc) return i; }
    return 0;
  }

  function spawnFruit(tier, x, y, vx, vy) {
    const def = TIERS[tier];
    fruits.push({ id: idCounter++, tier, x, y, vx: vx||0, vy: vy||0, r: def.r, settling:false });
  }

  function dropCurrent() {
    if (!running || !canDrop) return;
    const def = TIERS[nextTier];
    const clampedX = Math.max(WALL+def.r, Math.min(W-WALL-def.r, dropX));
    spawnFruit(nextTier, clampedX, def.r+10, 0, 1);
    canDrop = false;
    nextTier = pickNextTier();
    setTimeout(() => { canDrop = true; }, 420);
  }

  function update() {
    if (!running) return;
    fruits.forEach(f => {
      f.vy += GRAVITY;
      f.vx *= DAMPING; f.vy *= DAMPING;
      f.x += f.vx; f.y += f.vy;
      if (f.x - f.r < WALL) { f.x = WALL+f.r; f.vx *= -0.3; }
      if (f.x + f.r > W-WALL) { f.x = W-WALL-f.r; f.vx *= -0.3; }
      if (f.y + f.r > FLOOR_Y) { f.y = FLOOR_Y-f.r; f.vy *= -0.2; f.vx *= 0.9; }
    });

    // collision resolution (multiple passes for stability)
    // Same-tier pairs are skipped here so they can actually overlap and trigger a merge below —
    // otherwise this pass would keep pushing them apart before the merge check ever sees them touch.
    for (let pass=0; pass<4; pass++) {
      for (let i=0;i<fruits.length;i++) {
        for (let j=i+1;j<fruits.length;j++) {
          const a = fruits[i], b = fruits[j];
          if (!a || !b) continue;
          if (a.tier === b.tier) continue;
          const dx = b.x-a.x, dy = b.y-a.y;
          const dist = Math.hypot(dx,dy) || 0.001;
          const minDist = a.r+b.r;
          if (dist < minDist) {
            const overlap = minDist - dist;
            const nx = dx/dist, ny = dy/dist;
            const massA = a.r*a.r, massB = b.r*b.r;
            const totalMass = massA+massB;
            const pushA = overlap * (massB/totalMass);
            const pushB = overlap * (massA/totalMass);
            a.x -= nx*pushA; a.y -= ny*pushA;
            b.x += nx*pushB; b.y += ny*pushB;
          }
        }
      }
    }

    // merge detection — any actual touch/overlap between same-tier fruits triggers a merge
    const toRemove = new Set();
    const toAdd = [];
    for (let i=0;i<fruits.length;i++) {
      if (toRemove.has(fruits[i].id)) continue;
      for (let j=i+1;j<fruits.length;j++) {
        if (toRemove.has(fruits[j].id)) continue;
        const a = fruits[i], b = fruits[j];
        if (a.tier !== b.tier) continue;
        const dist = Math.hypot(b.x-a.x, b.y-a.y);
        if (dist < (a.r+b.r)*1.02) {
          toRemove.add(a.id); toRemove.add(b.id);
          const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
          if (a.tier >= TIERS.length-1) {
            score += 1000;
            spawnMergeBurst(mx,my,TIERS[a.tier].color);
            spawnMergeBurst(mx,my,'#ffe066');
            spawnMergeBurst(mx,my,'#fff');
          } else {
            const newTier = a.tier+1;
            toAdd.push({ tier:newTier, x:mx, y:my, vx:(a.vx+b.vx)/4, vy:(a.vy+b.vy)/4 });
            score += (newTier+1)*8;
            if (newTier > maxTierReached) { maxTierReached = newTier; maxTierEl.textContent = TIERS[newTier].name; }
            spawnMergeBurst(mx,my,TIERS[newTier].color);
          }
          scoreEl.textContent = score;
          break;
        }
      }
    }
    if (toRemove.size>0) {
      fruits = fruits.filter(f => !toRemove.has(f.id));
      toAdd.forEach(nf => spawnFruit(nf.tier, nf.x, nf.y, nf.vx, nf.vy));
    }

    // danger check
    const inDanger = fruits.some(f => f.y - f.r < DANGER_Y && Math.abs(f.vy) < 1.2);
    if (inDanger) { dangerTimer++; } else { dangerTimer = Math.max(0, dangerTimer-2); }
    if (dangerTimer > 90) endGame();

    updateBursts();
  }

  let bursts = [];
  function spawnMergeBurst(x,y,color) {
    for (let i=0;i<10;i++) {
      const a=Math.random()*Math.PI*2, s=Math.random()*3+1;
      bursts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color});
    }
  }
  function updateBursts() {
    bursts = bursts.filter(p=>p.life>0);
    bursts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.035;});
  }
  function drawBursts() {
    bursts.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function endGame() {
    running = false;
    const earned = convertScoreToCoins('suika', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '滿出來了！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　最大果實：${TIERS[maxTierReached].name}<br>獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '重新開始';
  }

  function drawFruit(f) {
    const palette = currentPalette();
    const color = palette[f.tier] || TIERS[f.tier].color;
    const isUltimate = TIERS[f.tier] && TIERS[f.tier].special;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.save();
    ctx.shadowBlur = isUltimate ? 18 : 4;
    ctx.shadowColor = isUltimate ? '#ffe066' : 'rgba(0,0,0,0.2)';
    const grad = isUltimate
      ? ctx.createRadialGradient(-f.r*0.3,-f.r*0.3,2,0,0,f.r)
      : ctx.createRadialGradient(-f.r*0.3,-f.r*0.3,2,0,0,f.r);
    if (isUltimate) {
      grad.addColorStop(0,'#fff8d0');
      grad.addColorStop(0.4,'#9b7fe8');
      grad.addColorStop(1,'#4a2fb0');
    } else {
      grad.addColorStop(0,'#fff'); grad.addColorStop(0.25,color); grad.addColorStop(1,color);
    }
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0,0,f.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if (isUltimate) {
      // sparkly stars scattered across the surface
      const starPositions = [[-0.3,-0.35,0.09],[0.25,-0.15,0.06],[-0.1,0.2,0.07],[0.35,0.3,0.05],[0,-0.05,0.1]];
      starPositions.forEach(([sx,sy,sr]) => drawSparkle(ctx, sx*f.r, sy*f.r, sr*f.r, '#fff7c2'));
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0,0,f.r*0.96,0,Math.PI*2); ctx.stroke();
    }
    // cute face for smaller/medium tiers
    if (f.r < 55) {
      ctx.fillStyle = '#2b2440';
      const eyeOff = f.r*0.32, eyeR = Math.max(1.2,f.r*0.09);
      ctx.beginPath(); ctx.arc(-eyeOff,-f.r*0.05,eyeR,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(eyeOff,-f.r*0.05,eyeR,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawWalls() {
    const theme = currentBoardTheme();
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = theme.wall; ctx.lineWidth = WALL*2;
    ctx.beginPath();
    ctx.moveTo(WALL,0); ctx.lineTo(WALL,H-WALL); ctx.lineTo(W-WALL,H-WALL); ctx.lineTo(W-WALL,0);
    ctx.stroke();
    // danger line
    ctx.strokeStyle = 'rgba(255,80,80,0.4)'; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(WALL,DANGER_Y); ctx.lineTo(W-WALL,DANGER_Y); ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawPreview() {
    if (!running || !canDrop) return;
    const def = TIERS[nextTier];
    const clampedX = Math.max(WALL+def.r, Math.min(W-WALL-def.r, dropX));
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = 'rgba(150,100,60,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(clampedX, def.r+10); ctx.lineTo(clampedX, FLOOR_Y); ctx.stroke();
    ctx.setLineDash([]);
    drawFruit({ x: clampedX, y: def.r+10, r: def.r, tier: nextTier });
    ctx.restore();
  }

  function render() {
    drawWalls();
    fruits.forEach(drawFruit);
    drawBursts();
    drawPreview();
    if (running) update();
    rafId = requestAnimationFrame(render);
  }

  function start() {
    fruits = []; score = 0; maxTierReached = 0; dangerTimer = 0;
    scoreEl.textContent = 0; maxTierEl.textContent = TIERS[0].name;
    nextTier = pickNextTier();
    canDrop = true;
    gameOverState = false;
    running = true;
    overlay.style.display = 'none';
  }

  function updatePointerX(clientX) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width;
    dropX = (clientX-rect.left)*scaleX;
  }
  function onMouseMove(e) { updatePointerX(e.clientX); }
  function onTouchMove(e) { updatePointerX(e.touches[0].clientX); e.preventDefault(); }
  function onClick(e) { updatePointerX(e.clientX); dropCurrent(); }
  function onTouchEnd(e) { dropCurrent(); }

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('touchmove', onTouchMove, { passive:false });
  canvas.addEventListener('click', onClick);
  canvas.addEventListener('touchend', onTouchEnd);
  startBtn.addEventListener('click', start);

  render();

  window.__suikaCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    canvas.removeEventListener('mousemove', onMouseMove);
    canvas.removeEventListener('touchmove', onTouchMove);
    canvas.removeEventListener('click', onClick);
    canvas.removeEventListener('touchend', onTouchEnd);
  };
}



// ===== game-flappy.js =====
// ============================================================
// FLAPPY-STYLE GAME — 羽靈穿梭 (Feather Spirit Dash)
// Tap/space to flap upward, gravity pulls down, weave through
// crystal gate obstacles. Classic one-hit endless arcade game.
// ============================================================

function mountFlappyGame(container, gameDef) {
  container.innerHTML = `
    <div id="flapRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#bcdcf0,#eaf6ff);position:relative;overflow:hidden;">
      <div id="flapHUD" style="position:absolute;top:64px;display:flex;gap:20px;align-items:center;color:#2b3a55;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="flapScore" style="color:#ff6fa5;">0</strong></span>
        <span>最高 <strong id="flapBest" style="color:#5ec8e8;">0</strong></span>
      </div>
      <canvas id="flapCanvas" width="360" height="480" style="border-radius:14px;box-shadow:0 12px 30px rgba(60,90,140,0.25);background:#cfe8f7;margin-top:36px;max-height:62vh;cursor:pointer;"></canvas>
      <div style="position:absolute;bottom:14px;color:rgba(40,40,80,0.6);font-size:12px;letter-spacing:1px;">點擊畫面 / 空白鍵：拍動翅膀往上飛</div>
      <div id="flapOverlay" style="display:flex;position:absolute;inset:0;background:rgba(40,60,90,0.5);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🪶</div>
        <h2 id="flapOverlayTitle" style="font-size:26px;letter-spacing:3px;">羽靈穿梭</h2>
        <p id="flapOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">點擊或按空白鍵拍翅膀往上飛<br>穿越水晶之門得分<br>碰到障礙或地面就結束，看你能飛多遠！</p>
        <button id="flapStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #5ec8e8;background:rgba(94,200,232,0.2);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('flapCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('flapScore');
  const bestEl = document.getElementById('flapBest');
  const overlay = document.getElementById('flapOverlay');
  const overlayTitle = document.getElementById('flapOverlayTitle');
  const overlayDesc = document.getElementById('flapOverlayDesc');
  const startBtn = document.getElementById('flapStartBtn');

  function currentBirdSkin() {
    const item = getEquipped('flappy', 'character');
    return item ? item.colors : { body: '#ff6fa5', wing: '#ffe066', belly: '#fff' };
  }
  function currentSkyTheme() {
    const item = getEquipped('flappy', 'background');
    return item ? item.colors : { sky1: '#bcdcf0', sky2: '#eaf6ff', gate: '#7ec8d8', gateGlow: '#a8e8ff' };
  }

  let bird, gates, clouds;
  let score = 0, best = 0, running = false, gameOverState = false;
  let frame = 0, rafId = null;
  const GRAVITY = 0.5;
  const FLAP_VY = -8.2;
  const GATE_GAP = 150;
  const GATE_SPACING = 220;
  let scrollSpeed = 2.4;

  function initClouds() {
    clouds = [];
    for (let i=0;i<8;i++) clouds.push({ x: Math.random()*W, y: Math.random()*H*0.6, s: Math.random()*0.6+0.5, speed: Math.random()*0.4+0.2 });
  }
  function updateClouds() {
    clouds.forEach(c => { c.x -= c.speed; if (c.x < -40) { c.x = W+40; c.y = Math.random()*H*0.6; } });
  }
  function drawClouds() {
    clouds.forEach(c => {
      ctx.save(); ctx.translate(c.x,c.y); ctx.scale(c.s,c.s);
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.beginPath(); ctx.ellipse(0,0,18,10,0,0,Math.PI*2); ctx.ellipse(-14,3,12,8,0,0,Math.PI*2); ctx.ellipse(14,3,12,8,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function createBird() { return { x: W*0.28, y: H/2, vy: 0, r: 16, rot: 0 }; }

  function spawnGate(x) {
    const margin = 60;
    const gapCenter = margin + Math.random()*(H-margin*2-GATE_GAP) + GATE_GAP/2;
    gates.push({ x, gapCenter, passed: false, w: 44 });
  }

  function reset() {
    bird = createBird();
    gates = [];
    score = 0; scoreEl.textContent = 0;
    scrollSpeed = 2.4;
    frame = 0;
    let x = W + 80;
    for (let i=0;i<5;i++) { spawnGate(x); x += GATE_SPACING; }
  }

  function flap() {
    if (!running) return;
    bird.vy = FLAP_VY;
  }

  function update() {
    if (!running) return;
    frame++;
    scrollSpeed = Math.min(4.2, 2.4 + score*0.04);

    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.rot = Math.max(-0.5, Math.min(1.1, bird.vy*0.06));

    if (bird.y - bird.r < 0) { bird.y = bird.r; bird.vy = 0; }
    if (bird.y + bird.r > H) { return endGame(); }

    gates.forEach(g => { g.x -= scrollSpeed; });
    if (gates.length && gates[0].x < -60) {
      gates.shift();
      const lastX = gates.length ? gates[gates.length-1].x : W;
      spawnGate(lastX + GATE_SPACING);
    }

    gates.forEach(g => {
      if (!g.passed && g.x + g.w/2 < bird.x) {
        g.passed = true;
        score++;
        scoreEl.textContent = score;
      }
      const dx = Math.abs(bird.x - g.x);
      if (dx < g.w/2 + bird.r*0.7) {
        const topEdge = g.gapCenter - GATE_GAP/2;
        const botEdge = g.gapCenter + GATE_GAP/2;
        if (bird.y - bird.r*0.7 < topEdge || bird.y + bird.r*0.7 > botEdge) {
          endGame();
        }
      }
    });
  }

  function endGame() {
    running = false;
    if (score > best) best = score;
    bestEl.textContent = best;
    const earned = convertScoreToCoins('flappy', score*8);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '墜落了！';
    overlayDesc.innerHTML = `本局分數：<strong style="color:#ffc857">${score}</strong>　最高分：${best}<br>獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '再玩一次';
  }

  function drawBird() {
    const skin = currentBirdSkin();
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);
    const flapPhase = Math.sin(frame*0.4) * (running?1:0);
    ctx.fillStyle = skin.body;
    ctx.beginPath(); ctx.ellipse(0,0,bird.r,bird.r*0.85,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = skin.belly;
    ctx.beginPath(); ctx.ellipse(-2,4,bird.r*0.6,bird.r*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = skin.wing;
    ctx.save(); ctx.translate(-2,0); ctx.rotate(flapPhase*0.5);
    ctx.beginPath(); ctx.ellipse(0,0,bird.r*0.55,bird.r*0.3,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(bird.r*0.35,-bird.r*0.2,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(bird.r*0.4,-bird.r*0.2,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff9b3a';
    ctx.beginPath(); ctx.moveTo(bird.r*0.8,0); ctx.lineTo(bird.r*1.3,-2); ctx.lineTo(bird.r*0.8,4); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawGate(g) {
    const theme = currentSkyTheme();
    const topEdge = g.gapCenter - GATE_GAP/2;
    const botEdge = g.gapCenter + GATE_GAP/2;
    ctx.save();
    ctx.shadowBlur = 6; ctx.shadowColor = theme.gateGlow;
    ctx.fillStyle = theme.gate;
    roundRectPath(ctx, g.x-g.w/2, 0, g.w, topEdge, 8); ctx.fill();
    roundRectPath(ctx, g.x-g.w/2, botEdge, g.w, H-botEdge, 8); ctx.fill();
    ctx.restore();
    ctx.fillStyle = theme.gateGlow;
    ctx.fillRect(g.x-g.w/2-3, topEdge-8, g.w+6, 8);
    ctx.fillRect(g.x-g.w/2-3, botEdge, g.w+6, 8);
  }

  function draw() {
    const theme = currentSkyTheme();
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, theme.sky1); grad.addColorStop(1, theme.sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);
    drawClouds();
    gates.forEach(drawGate);
    if (bird) drawBird();
  }

  function render() {
    updateClouds();
    if (running) update();
    draw();
    rafId = requestAnimationFrame(render);
  }

  function start() {
    reset();
    running = true;
    overlay.style.display = 'none';
  }

  function onKey(e) { if (e.key===' ') { flap(); e.preventDefault(); } }
  function onClick() { if (running) flap(); }

  document.addEventListener('keydown', onKey);
  canvas.addEventListener('click', onClick);
  canvas.addEventListener('touchstart', onClick, { passive:true });
  startBtn.addEventListener('click', start);

  initClouds();
  reset();
  render();

  window.__flappyCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    document.removeEventListener('keydown', onKey);
    canvas.removeEventListener('click', onClick);
    canvas.removeEventListener('touchstart', onClick);
  };
}



// ===== game-ninjarunner.js =====
// ============================================================
// NINJA RUNNER GAME — 忍者疾走 (Ninja Dash)
// 3-lane endless runner: switch lanes / jump to dodge obstacles,
// collect coins. HP-based damage (not instant death) with i-frames.
// ============================================================

function mountNinjaRunnerGame(container, gameDef) {
  container.innerHTML = `
    <div id="ninjaRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#1a2a1a,#2d4a2d);position:relative;overflow:hidden;">
      <div id="ninjaHUD" style="position:absolute;top:64px;display:flex;gap:16px;align-items:center;color:#fff;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="ninjaScore" style="color:#ffc857;">0</strong></span>
        <span>金幣 <strong id="ninjaCoins" style="color:#ffe066;">0</strong></span>
        <span>速度 <strong id="ninjaSpeed" style="color:#ff7a3a;">1.0x</strong></span>
        <span style="display:flex;align-items:center;gap:5px;">
          HP
          <span style="width:80px;height:11px;background:rgba(0,0,0,0.3);border:1px solid #ff6fa5;border-radius:6px;overflow:hidden;display:inline-block;">
            <span id="ninjaHpFill" style="display:block;height:100%;width:100%;background:linear-gradient(90deg,#7ee8a0,#4fcf78);transition:width 0.15s;"></span>
          </span>
        </span>
      </div>
      <canvas id="ninjaCanvas" width="380" height="420" style="border-radius:14px;box-shadow:0 12px 30px rgba(10,20,10,0.5);background:#243524;margin-top:36px;max-height:60vh;"></canvas>
      <div style="position:absolute;bottom:14px;color:rgba(255,255,255,0.65);font-size:11px;letter-spacing:0.5px;text-align:center;">↑↓或滑動：切換上中下三線道 ・ 空白鍵/點擊：跳躍躲避低矮障礙</div>
      <div id="ninjaOverlay" style="display:flex;position:absolute;inset:0;background:rgba(10,20,10,0.7);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🥷</div>
        <h2 id="ninjaOverlayTitle" style="font-size:26px;letter-spacing:3px;">忍者疾走</h2>
        <p id="ninjaOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">在三條線道間切換躲避障礙物<br>遇到低矮障礙可以跳躍越過<br>收集金幣加分，撞到障礙會扣血但不會馬上死亡！</p>
        <button id="ninjaStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #55a630;background:rgba(85,166,48,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('ninjaCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const LANE_Y = [H*0.32, H*0.55, H*0.78];
  const PLAYER_X = W*0.22;
  const scoreEl = document.getElementById('ninjaScore');
  const coinsEl = document.getElementById('ninjaCoins');
  const speedEl = document.getElementById('ninjaSpeed');
  const hpFillEl = document.getElementById('ninjaHpFill');
  const overlay = document.getElementById('ninjaOverlay');
  const overlayTitle = document.getElementById('ninjaOverlayTitle');
  const overlayDesc = document.getElementById('ninjaOverlayDesc');
  const startBtn = document.getElementById('ninjaStartBtn');

  function currentNinjaSkin() {
    const item = getEquipped('ninjarunner', 'character');
    return item ? item.colors : { suit: '#2d3436', scarf: '#ff6fa5', skin: '#ffe0c2' };
  }
  function currentForestTheme() {
    const item = getEquipped('ninjarunner', 'background');
    return item ? item.colors : { bg1: '#1a2a1a', bg2: '#2d4a2d', track: '#3a5a3a', trackLine: '#4a6a4a' };
  }

  const MAX_HP = 100;
  let hp = MAX_HP, invincibleUntil = 0;
  let lane = 1, targetLane = 1, laneAnimY = LANE_Y[1];
  let jumpOffset = 0, jumpVel = 0, isJumping = false;
  let obstacles = [], coins = [], particles = [];
  let distanceTraveled = 0, speedMult = 1;
  let score = 0, coinCount = 0;
  let running = false, gameOverState = false, rafId = null;
  let lastObstacleX = -9999;
  const MIN_GAP = 200;
  const SAFE_START = 380;

  function baseSpeed() { return 3.4 * speedMult; }

  function reset() {
    hp = MAX_HP; invincibleUntil = 0;
    lane = 1; targetLane = 1; laneAnimY = LANE_Y[1];
    jumpOffset = 0; jumpVel = 0; isJumping = false;
    obstacles = []; coins = []; particles = [];
    distanceTraveled = 0; speedMult = 1;
    score = 0; coinCount = 0;
    lastObstacleX = -9999;
    scoreEl.textContent = 0; coinsEl.textContent = 0; speedEl.textContent = '1.0x';
    updateHpBar();
    generateInitial();
  }

  function updateHpBar() {
    const pct = Math.max(0, hp/MAX_HP*100);
    hpFillEl.style.width = pct+'%';
    if (pct>60) hpFillEl.style.background='linear-gradient(90deg,#7ee8a0,#4fcf78)';
    else if (pct>30) hpFillEl.style.background='linear-gradient(90deg,#ffcc66,#ff8800)';
    else hpFillEl.style.background='linear-gradient(90deg,#ff5555,#cc0000)';
  }

  function tryPlaceObstacle(x, laneIdx, type) {
    if (x < SAFE_START) return false;
    if (x - lastObstacleX < MIN_GAP) return false;
    obstacles.push({ x, lane: laneIdx, type, hit:false });
    lastObstacleX = x;
    return true;
  }

  function generateInitial() {
    let x = 500;
    for (let i=0;i<12;i++) {
      const laneIdx = Math.floor(Math.random()*3);
      const type = Math.random()<0.5 ? 'low' : 'tall'; // low = jumpable, tall = must switch lane
      tryPlaceObstacle(x, laneIdx, type);
      if (Math.random()<0.6) coins.push({ x: x+80, lane: Math.floor(Math.random()*3), taken:false });
      x += 220 + Math.random()*140;
    }
  }

  function extendObstacles() {
    let x = lastObstacleX + 220;
    for (let i=0;i<4;i++) {
      const laneIdx = Math.floor(Math.random()*3);
      const type = Math.random()<0.5 ? 'low' : 'tall';
      tryPlaceObstacle(x, laneIdx, type);
      if (Math.random()<0.6) coins.push({ x: x+80, lane: Math.floor(Math.random()*3), taken:false });
      x += 220 + Math.random()*140;
    }
    const cutoff = distanceTraveled - 200;
    obstacles = obstacles.filter(o => o.x > cutoff);
    coins = coins.filter(c => c.x > cutoff);
  }

  function switchLane(dir) {
    if (!running) return;
    targetLane = Math.max(0, Math.min(2, targetLane+dir));
  }

  function jump() {
    if (!running || isJumping) return;
    isJumping = true;
    jumpVel = -9.5;
  }

  function update() {
    if (!running) return;
    speedMult = 1 + Math.min(1.3, distanceTraveled/6500);
    speedEl.textContent = speedMult.toFixed(1)+'x';
    distanceTraveled += baseSpeed();
    score = Math.floor(distanceTraveled/10);
    scoreEl.textContent = score;

    lane = targetLane;
    const targetY = LANE_Y[lane];
    laneAnimY += (targetY - laneAnimY) * 0.22;

    if (isJumping) {
      jumpVel += 0.6;
      jumpOffset += jumpVel;
      if (jumpOffset >= 0) { jumpOffset = 0; jumpVel = 0; isJumping = false; }
    }

    const worldX = PLAYER_X + distanceTraveled;
    const isInvincible = performance.now() < invincibleUntil;

    obstacles.forEach(ob => {
      if (ob.hit) return;
      if (ob.lane !== lane) return;
      const dx = ob.x - worldX;
      if (Math.abs(dx) < 22) {
        const cleared = ob.type==='low' && jumpOffset < -18;
        if (!cleared && !isInvincible) {
          ob.hit = true;
          takeDamage();
        } else if (cleared) {
          ob.hit = true;
        }
      }
    });

    coins.forEach(c => {
      if (c.taken) return;
      if (c.lane !== lane) return;
      const dx = c.x - worldX;
      if (Math.abs(dx) < 20) {
        c.taken = true;
        coinCount++;
        coinsEl.textContent = coinCount;
        score += 5;
        spawnSparkle(PLAYER_X, laneAnimY-20);
      }
    });

    updateParticles();

    if (lastObstacleX - distanceTraveled < W*1.5) extendObstacles();
  }

  function takeDamage() {
    hp -= 22;
    updateHpBar();
    invincibleUntil = performance.now() + 1100;
    spawnSparkle(PLAYER_X, laneAnimY-10, '#ff5555');
    if (hp <= 0) { hp = 0; updateHpBar(); endGame(); }
  }

  function spawnSparkle(x,y,color) {
    for (let i=0;i<6;i++) particles.push({ x,y, vx:(Math.random()-0.5)*2, vy:-Math.random()*2-1, life:1, color: color||'#ffe066' });
  }
  function updateParticles() {
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.04;});
  }
  function drawParticles() {
    particles.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function endGame() {
    running = false;
    const earned = convertScoreToCoins('ninjarunner', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = 'HP耗盡了！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　金幣：${coinCount}<br>獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '重新開始';
  }

  function drawTrack() {
    const theme = currentForestTheme();
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,theme.bg1); grad.addColorStop(1,theme.bg2);
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
    LANE_Y.forEach(y => {
      ctx.fillStyle = theme.track;
      ctx.fillRect(0, y-26, W, 52);
      ctx.strokeStyle = theme.trackLine; ctx.lineWidth=1.5; ctx.setLineDash([12,10]);
      const offset = -(distanceTraveled % 22);
      ctx.beginPath(); ctx.moveTo(offset, y); ctx.lineTo(W, y); ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  function drawObstacle(ob) {
    const screenX = ob.x - distanceTraveled;
    if (screenX < -40 || screenX > W+40) return;
    const y = LANE_Y[ob.lane];
    if (ob.hit && ob.type==='low') return; // cleared by jump, don't render as blocking
    ctx.save();
    if (ob.type==='low') {
      ctx.fillStyle = '#7a6a4a';
      roundRectPath(ctx, screenX-12, y+6, 24, 16, 4); ctx.fill();
    } else {
      ctx.fillStyle = '#8a3a3a';
      roundRectPath(ctx, screenX-14, y-30, 28, 50, 6); ctx.fill();
      ctx.fillStyle = '#ffd9d9';
      ctx.beginPath(); ctx.arc(screenX, y-14, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#2b2440';
      ctx.beginPath(); ctx.arc(screenX-2,y-15,1.4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(screenX+2,y-15,1.4,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawCoin(c) {
    if (c.taken) return;
    const screenX = c.x - distanceTraveled;
    if (screenX < -40 || screenX > W+40) return;
    const y = LANE_Y[c.lane];
    ctx.save();
    ctx.shadowBlur=8; ctx.shadowColor='#ffe066';
    ctx.fillStyle='#ffe066';
    ctx.beginPath(); ctx.arc(screenX, y-20, 8, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    const skin = currentNinjaSkin();
    const isInvincible = performance.now() < invincibleUntil;
    if (isInvincible && Math.floor(performance.now()/100)%2===0) return;
    const y = laneAnimY + jumpOffset;
    ctx.save();
    ctx.translate(PLAYER_X, y);
    ctx.fillStyle = skin.suit;
    roundRectPath(ctx,-12,-22,24,32,8); ctx.fill();
    ctx.fillStyle = skin.skin;
    ctx.beginPath(); ctx.ellipse(0,-26,10,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = skin.scarf;
    ctx.beginPath(); ctx.moveTo(-10,-30); ctx.lineTo(10,-30); ctx.lineTo(6,-22); ctx.lineTo(-6,-22); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(-3,-27,1.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3,-27,1.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function render() {
    drawTrack();
    obstacles.forEach(drawObstacle);
    coins.forEach(drawCoin);
    drawParticles();
    drawPlayer();
    if (running) update();
    rafId = requestAnimationFrame(render);
  }

  function start() {
    reset();
    running = true;
    overlay.style.display = 'none';
  }

  function onKey(e) {
    if (!running) return;
    if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') { switchLane(-1); e.preventDefault(); }
    else if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') { switchLane(1); e.preventDefault(); }
    else if (e.key===' '||e.key==='ArrowRight') { jump(); e.preventDefault(); }
  }

  let touchStartX=0, touchStartY=0;
  function onTouchStart(e) { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; }
  function onTouchEnd(e) {
    const dx = e.changedTouches[0].clientX-touchStartX;
    const dy = e.changedTouches[0].clientY-touchStartY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 20) {
      switchLane(dy>0?1:-1);
    } else if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
      jump();
    }
  }

  document.addEventListener('keydown', onKey);
  canvas.addEventListener('touchstart', onTouchStart, {passive:true});
  canvas.addEventListener('touchend', onTouchEnd, {passive:true});
  canvas.addEventListener('click', jump);
  startBtn.addEventListener('click', start);

  reset();
  render();

  window.__ninjarunnerCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    document.removeEventListener('keydown', onKey);
    canvas.removeEventListener('touchstart', onTouchStart);
    canvas.removeEventListener('touchend', onTouchEnd);
    canvas.removeEventListener('click', jump);
  };
}



// ===== game-cubedash.js =====
// ============================================================
// SPIRIT CUBE DASH GAME — 靈方衝刺 (Spirit Cube Dash)
// Geometry Dash style: auto-running cube, precise single-jump
// timing over spikes/blocks, bounce pads for double-jump moments.
// ============================================================

function mountCubeDashGame(container, gameDef) {
  container.innerHTML = `
    <div id="cdRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#1a0a30,#3a1a5c);position:relative;overflow:hidden;">
      <div id="cdHUD" style="position:absolute;top:64px;display:flex;gap:20px;align-items:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="cdScore" style="color:#ffc857;">0</strong></span>
        <span>最高 <strong id="cdBest" style="color:#ff6fa5;">0</strong></span>
      </div>
      <canvas id="cdCanvas" width="400" height="280" style="border-radius:14px;box-shadow:0 12px 30px rgba(20,10,50,0.5);background:#241548;margin-top:36px;max-width:92vw;cursor:pointer;"></canvas>
      <div style="position:absolute;bottom:14px;color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px;">點擊 / 空白鍵：跳躍 ・ 精準時機躲避尖刺，黃色彈跳板可二段跳</div>
      <div id="cdOverlay" style="display:flex;position:absolute;inset:0;background:rgba(15,8,35,0.75);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">💠</div>
        <h2 id="cdOverlayTitle" style="font-size:26px;letter-spacing:3px;">靈方衝刺</h2>
        <p id="cdOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">靈方會自動向前衝刺<br>點擊精準跳過尖刺與方塊<br>碰到尖刺立刻失敗，速度會持續提升！</p>
        <button id="cdStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #a29bfe;background:rgba(162,155,254,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('cdCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = H * 0.78;
  const PLAYER_X = W*0.22;
  const scoreEl = document.getElementById('cdScore');
  const bestEl = document.getElementById('cdBest');
  const overlay = document.getElementById('cdOverlay');
  const overlayTitle = document.getElementById('cdOverlayTitle');
  const overlayDesc = document.getElementById('cdOverlayDesc');
  const startBtn = document.getElementById('cdStartBtn');

  function currentCubeSkin() {
    const item = getEquipped('cubedash', 'character');
    return item ? item.colors : { cube: '#a29bfe', glow: '#c8b8ff', trail: '#ff6fa5' };
  }
  function currentArenaTheme() {
    const item = getEquipped('cubedash', 'background');
    return item ? item.colors : { bg1: '#1a0a30', bg2: '#3a1a5c', ground: '#150a28', grid: 'rgba(162,155,254,0.12)' };
  }

  const GRAVITY = 0.85;
  const JUMP_VY = -13;
  let player, obstacles, trail, particles;
  let distanceTraveled = 0, speed = 4.2;
  let score = 0, best = 0, running = false;
  let rafId = null;
  let lastObstacleX = -9999;
  const MIN_GAP = 170;
  const SAFE_START = 320;

  function createPlayer() { return { y: GROUND_Y, vy: 0, size: 26, onGround: true, canDoubleJump: false, rot: 0 }; }

  function tryPlace(x, type) {
    if (x < SAFE_START) return false;
    if (x - lastObstacleX < MIN_GAP) return false;
    obstacles.push({ x, type, scored:false });
    lastObstacleX = x;
    return true;
  }

  function generateInitial() {
    let x = 460;
    for (let i=0;i<14;i++) {
      const roll = Math.random();
      const type = roll<0.5?'spike':roll<0.8?'block':'pad';
      tryPlace(x, type);
      x += 180 + Math.random()*160;
    }
  }
  function extendObstacles() {
    let x = lastObstacleX + 180;
    for (let i=0;i<5;i++) {
      const roll = Math.random();
      const type = roll<0.5?'spike':roll<0.8?'block':'pad';
      tryPlace(x, type);
      x += 180 + Math.random()*160;
    }
    const cutoff = distanceTraveled - 200;
    obstacles = obstacles.filter(o => o.x > cutoff);
  }

  function reset() {
    player = createPlayer();
    obstacles = []; trail = []; particles = [];
    distanceTraveled = 0; speed = 4.2;
    score = 0; scoreEl.textContent = 0;
    lastObstacleX = -9999;
    generateInitial();
  }

  function jump() {
    if (!running) return;
    if (player.onGround) {
      player.vy = JUMP_VY;
      player.onGround = false;
      player.canDoubleJump = false;
    }
  }

  function update() {
    if (!running) return;
    speed = Math.min(7.5, 4.2 + score*0.012);
    distanceTraveled += speed;
    score = Math.floor(distanceTraveled/10);
    scoreEl.textContent = score;

    player.vy += GRAVITY;
    player.y += player.vy;
    player.rot += 0.12 + speed*0.01;
    if (player.y >= GROUND_Y) { player.y = GROUND_Y; player.vy = 0; player.onGround = true; player.rot = Math.round(player.rot/(Math.PI/2))*(Math.PI/2); }

    trail.push({ x: PLAYER_X-distanceTraveled%1, y: player.y, life:1 });
    if (trail.length>14) trail.shift();

    const worldX = PLAYER_X + distanceTraveled;
    obstacles.forEach(ob => {
      const dx = ob.x - worldX;
      if (ob.type === 'pad') {
        if (Math.abs(dx) < 16 && player.y > GROUND_Y-30 && player.vy >= 0) {
          player.vy = JUMP_VY*1.15;
          player.onGround = false;
          spawnBurst(PLAYER_X, GROUND_Y, '#ffe066');
        }
        return;
      }
      if (Math.abs(dx) < 14) {
        const cubeBottom = player.y;
        if (ob.type === 'spike') {
          // spike occupies top region near ground; fail if cube isn't high enough to clear it
          const spikeTop = GROUND_Y - 26;
          if (cubeBottom > spikeTop + 4) return endGame();
        } else if (ob.type === 'block') {
          // block requires genuine height clearance, same precision rule as spikes
          const blockTop = GROUND_Y - 30;
          if (cubeBottom > blockTop + 4) return endGame();
        }
      }
    });

    updateParticles();

    if (lastObstacleX - distanceTraveled < W*1.4) extendObstacles();
  }

  function spawnBurst(x,y,color) {
    for (let i=0;i<10;i++) {
      const a=Math.random()*Math.PI*2, s=Math.random()*3+1;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color});
    }
  }
  function updateParticles() {
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.035;});
  }
  function drawParticles() {
    particles.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function endGame() {
    if (!running) return;
    running = false;
    if (score > best) best = score;
    bestEl.textContent = best;
    spawnBurst(PLAYER_X, player.y-10, '#ff5555');
    const earned = convertScoreToCoins('cubedash', score*6);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '撞到尖刺了！';
    overlayDesc.innerHTML = `本局分數：<strong style="color:#ffc857">${score}</strong>　最高分：${best}<br>獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '再玩一次';
  }

  function drawGround() {
    const theme = currentArenaTheme();
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,theme.bg1); grad.addColorStop(1,theme.bg2);
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = theme.ground;
    ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
    ctx.strokeStyle = theme.grid; ctx.lineWidth=1;
    const offset = -(distanceTraveled % 30);
    for (let x=offset; x<W; x+=30) { ctx.beginPath(); ctx.moveTo(x,GROUND_Y); ctx.lineTo(x,H); ctx.stroke(); }
    ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(W,GROUND_Y); ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=2; ctx.stroke();
  }

  function drawObstacle(ob) {
    const screenX = ob.x - distanceTraveled;
    if (screenX < -40 || screenX > W+40) return;
    if (ob.type === 'spike') {
      ctx.save();
      ctx.fillStyle = '#ff4757';
      ctx.shadowBlur=6; ctx.shadowColor='#ff4757';
      ctx.beginPath();
      ctx.moveTo(screenX-13, GROUND_Y);
      ctx.lineTo(screenX, GROUND_Y-26);
      ctx.lineTo(screenX+13, GROUND_Y);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (ob.type === 'block') {
      ctx.save();
      ctx.fillStyle = '#5a4a8a';
      ctx.shadowBlur=4; ctx.shadowColor='#5a4a8a';
      roundRectPath(ctx, screenX-15, GROUND_Y-30, 30, 30, 4); ctx.fill();
      ctx.restore();
    } else if (ob.type === 'pad') {
      ctx.save();
      ctx.shadowBlur=10; ctx.shadowColor='#ffe066';
      ctx.fillStyle = '#ffe066';
      roundRectPath(ctx, screenX-16, GROUND_Y-8, 32, 8, 3); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.moveTo(screenX-8,GROUND_Y-8); ctx.lineTo(screenX,GROUND_Y-16); ctx.lineTo(screenX+8,GROUND_Y-8); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  function drawTrail() {
    const skin = currentCubeSkin();
    trail.forEach((t,i) => {
      ctx.save();
      ctx.globalAlpha = (i/trail.length)*0.35;
      ctx.fillStyle = skin.trail;
      ctx.beginPath(); ctx.arc(PLAYER_X-(trail.length-i)*3, t.y-player.size/2, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function drawPlayer() {
    const skin = currentCubeSkin();
    ctx.save();
    ctx.translate(PLAYER_X, player.y - player.size/2);
    ctx.rotate(player.rot);
    ctx.save();
    ctx.shadowBlur=10; ctx.shadowColor=skin.glow;
    ctx.fillStyle = skin.cube;
    roundRectPath(ctx, -player.size/2, -player.size/2, player.size, player.size, 5);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    roundRectPath(ctx, -player.size/2+3, -player.size/2+3, player.size-6, (player.size-6)*0.4, 3);
    ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(-4,2,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,2,2.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function render() {
    drawGround();
    obstacles.forEach(drawObstacle);
    drawTrail();
    drawParticles();
    drawPlayer();
    if (running) update();
    rafId = requestAnimationFrame(render);
  }

  function start() {
    reset();
    running = true;
    overlay.style.display = 'none';
  }

  function onKey(e) { if (e.key===' ') { jump(); e.preventDefault(); } }
  function onClick() { jump(); }

  document.addEventListener('keydown', onKey);
  canvas.addEventListener('click', onClick);
  canvas.addEventListener('touchstart', onClick, { passive:true });
  startBtn.addEventListener('click', start);

  reset();
  render();

  window.__cubedashCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    document.removeEventListener('keydown', onKey);
    canvas.removeEventListener('click', onClick);
    canvas.removeEventListener('touchstart', onClick);
  };
}



// ===== game-sokoban.js =====
// ============================================================
// SOKOBAN GAME — 靈狐推箱記 (Spirit Fox Box Push)
// Classic push-boxes-onto-targets puzzle. 8 hand-verified levels
// (each confirmed solvable via BFS solver before shipping).
// Undo support, move counter.
// ============================================================

function mountSokobanGame(container, gameDef) {
  container.innerHTML = `
    <div id="sokRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff0dc,#ffe0bd);position:relative;overflow:hidden;">
      <div id="sokHUD" style="position:absolute;top:64px;display:flex;gap:18px;align-items:center;color:#6a3a1a;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>關卡 <strong id="sokLevel" style="color:#ff8a3a;">1</strong>/<span id="sokTotal">8</span></span>
        <span>步數 <strong id="sokMoves" style="color:#6c5ce7;">0</strong></span>
        <button id="sokUndoBtn" style="padding:4px 12px;border-radius:14px;border:1.5px solid #ff8a3a;background:rgba(255,138,58,0.15);color:#6a3a1a;font-weight:700;font-size:11px;cursor:pointer;">↩ 復原</button>
      </div>
      <canvas id="sokCanvas" width="340" height="340" style="border-radius:14px;box-shadow:0 12px 30px rgba(150,90,40,0.25);background:#fff8f0;margin-top:38px;max-width:88vw;"></canvas>
      <div style="position:absolute;bottom:14px;color:#6a3a1a;font-size:12px;letter-spacing:1px;">方向鍵/WASD 移動 ・ 推動木箱到光環目標上</div>
      <div id="sokOverlay" style="display:flex;position:absolute;inset:0;background:rgba(120,70,30,0.55);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🦊</div>
        <h2 id="sokOverlayTitle" style="font-size:26px;letter-spacing:3px;">靈狐推箱記</h2>
        <p id="sokOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">推動木箱到發光的目標位置上<br>箱子只能推不能拉，小心別卡角落<br>共 8 關，越來越燒腦！</p>
        <button id="sokStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #ff8a3a;background:rgba(255,138,58,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('sokCanvas');
  const ctx = canvas.getContext('2d');
  const levelEl = document.getElementById('sokLevel');
  const movesEl = document.getElementById('sokMoves');
  const undoBtn = document.getElementById('sokUndoBtn');
  const overlay = document.getElementById('sokOverlay');
  const overlayTitle = document.getElementById('sokOverlayTitle');
  const overlayDesc = document.getElementById('sokOverlayDesc');
  const startBtn = document.getElementById('sokStartBtn');

  function currentFoxSkin() {
    const item = getEquipped('sokoban', 'character');
    return item ? item.colors : { fur: '#ff8a5c', belly: '#fff', ear: '#ff6fa5' };
  }
  function currentRoomTheme() {
    const item = getEquipped('sokoban', 'background');
    return item ? item.colors : { floor: '#fff8f0', wall: '#c08a5a', target: '#ffc857', box: '#8b5a2b' };
  }

  // BFS-verified levels (see verification script used during development)
  const LEVELS = [
    ["#####","#@$.#","#####"],
    ["######","# @  #","#  $ #","#  . #","######"],
    ["#######","#.    #","# $   #","#  $  #","#   . #","#  @  #","#######"],
    ["#######","#     #","# .$. #","#  @  #","#  $  #","#     #","#######"],
    ["########","#  .   #","# $#$  #","#  @   #","#   .  #","#      #","########"],
    ["########","#.     #","# $    #","#  #   #","#  $@  #","#    . #","#      #","########"],
    ["#########","#   .   #","#  $$   #","#   @   #","#  .    #","#########"],
    ["##########","#   .    #","#  $ $   #","#   @  . #","#    $   #","#   .    #","##########"]
  ];

  let levelIdx = 0;
  let grid, player, boxes, targets, walls, moveCount, history;
  let running = false, cellSize = 40;

  function parseLevel(rows) {
    const maxLen = Math.max(...rows.map(r=>r.length));
    const padded = rows.map(r => r.padEnd(maxLen,' '));
    const w = maxLen, h = padded.length;
    const wallSet = new Set(), targetSet = new Set();
    const boxSet = new Set();
    let p = [0,0];
    for (let r=0;r<h;r++) for (let c=0;c<w;c++) {
      const ch = padded[r][c];
      const key = r+','+c;
      if (ch==='#') wallSet.add(key);
      if (ch==='.'||ch==='*'||ch==='+') targetSet.add(key);
      if (ch==='$'||ch==='*') boxSet.add(key);
      if (ch==='@'||ch==='+') p = [r,c];
    }
    return { w, h, walls: wallSet, targets: targetSet, boxes: boxSet, player: p };
  }

  function loadLevel(idx) {
    const parsed = parseLevel(LEVELS[idx]);
    walls = parsed.walls; targets = parsed.targets;
    boxes = new Set(parsed.boxes);
    player = parsed.player.slice();
    grid = { w: parsed.w, h: parsed.h };
    moveCount = 0;
    history = [];
    movesEl.textContent = 0;
    levelEl.textContent = idx+1;
    cellSize = Math.min(canvas.width/grid.w, canvas.height/grid.h);
  }

  function isWon() {
    for (const t of targets) if (!boxes.has(t)) return false;
    return true;
  }

  function tryMove(dr, dc) {
    if (!running) return;
    const nr = player[0]+dr, nc = player[1]+dc;
    const nkey = nr+','+nc;
    if (walls.has(nkey)) return;
    let pushedBox = null;
    if (boxes.has(nkey)) {
      const br = nr+dr, bc = nc+dc;
      const bkey = br+','+bc;
      if (walls.has(bkey) || boxes.has(bkey)) return;
      pushedBox = { from: nkey, to: bkey };
    }
    history.push({ player: player.slice(), boxKey: pushedBox ? pushedBox.from : null, boxTo: pushedBox ? pushedBox.to : null });
    if (pushedBox) { boxes.delete(pushedBox.from); boxes.add(pushedBox.to); }
    player = [nr,nc];
    moveCount++;
    movesEl.textContent = moveCount;
    if (isWon()) {
      setTimeout(levelComplete, 200);
    }
  }

  function undo() {
    if (!running || history.length===0) return;
    const last = history.pop();
    player = last.player;
    if (last.boxTo) { boxes.delete(last.boxTo); boxes.add(last.boxKey); }
    moveCount = Math.max(0, moveCount-1);
    movesEl.textContent = moveCount;
  }

  function levelComplete() {
    running = false;
    const earned = convertScoreToCoins('sokoban', Math.max(20, 80 - moveCount));
    if (levelIdx >= LEVELS.length-1) {
      overlay.style.display = 'flex';
      overlayTitle.textContent = '全部關卡通關！';
      overlayDesc.innerHTML = `恭喜完成所有 ${LEVELS.length} 關！<br>獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
      startBtn.textContent = '重新挑戰';
      levelIdx = 0;
    } else {
      overlay.style.display = 'flex';
      overlayTitle.textContent = `第 ${levelIdx+1} 關完成！`;
      overlayDesc.innerHTML = `用了 ${moveCount} 步　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
      startBtn.textContent = `第 ${levelIdx+2} 關`;
      levelIdx++;
    }
  }

  function draw() {
    const theme = currentRoomTheme();
    const fox = currentFoxSkin();
    ctx.fillStyle = theme.floor;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    const offX = (canvas.width - grid.w*cellSize)/2;
    const offY = (canvas.height - grid.h*cellSize)/2;

    walls.forEach(key => {
      const [r,c] = key.split(',').map(Number);
      ctx.fillStyle = theme.wall;
      ctx.fillRect(offX+c*cellSize, offY+r*cellSize, cellSize, cellSize);
    });
    targets.forEach(key => {
      const [r,c] = key.split(',').map(Number);
      const cx = offX+c*cellSize+cellSize/2, cy = offY+r*cellSize+cellSize/2;
      ctx.save(); ctx.shadowBlur=8; ctx.shadowColor=theme.target;
      ctx.strokeStyle = theme.target; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(cx,cy,cellSize*0.28,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    });
    boxes.forEach(key => {
      const [r,c] = key.split(',').map(Number);
      const onTarget = targets.has(key);
      ctx.save();
      ctx.fillStyle = onTarget ? '#7ec88a' : theme.box;
      roundRectPath(ctx, offX+c*cellSize+4, offY+r*cellSize+4, cellSize-8, cellSize-8, 5);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth=2;
      ctx.strokeRect(offX+c*cellSize+8, offY+r*cellSize+8, cellSize-16, cellSize-16);
      ctx.restore();
    });
    // player (fox)
    const px = offX+player[1]*cellSize+cellSize/2, py = offY+player[0]*cellSize+cellSize/2;
    ctx.save();
    ctx.translate(px,py);
    const r = cellSize*0.32;
    ctx.fillStyle = fox.ear;
    ctx.beginPath(); ctx.moveTo(-r*0.6,-r*0.7); ctx.lineTo(-r*1.1,-r*1.5); ctx.lineTo(-r*0.1,-r*0.9); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*0.6,-r*0.7); ctx.lineTo(r*1.1,-r*1.5); ctx.lineTo(r*0.1,-r*0.9); ctx.closePath(); ctx.fill();
    ctx.fillStyle = fox.fur;
    ctx.beginPath(); ctx.ellipse(0,0,r,r*0.95,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = fox.belly;
    ctx.beginPath(); ctx.ellipse(0,r*0.25,r*0.55,r*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(-r*0.3,-r*0.1,r*0.12,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.3,-r*0.1,r*0.12,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  let rafId = null;
  function render() { draw(); rafId = requestAnimationFrame(render); }

  function start() {
    loadLevel(levelIdx);
    running = true;
    overlay.style.display = 'none';
  }

  function onKey(e) {
    if (!running) return;
    if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') { tryMove(-1,0); e.preventDefault(); }
    else if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') { tryMove(1,0); e.preventDefault(); }
    else if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') { tryMove(0,-1); e.preventDefault(); }
    else if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') { tryMove(0,1); e.preventDefault(); }
    else if (e.key==='z'||e.key==='Z') { undo(); }
  }

  let touchStartX=0, touchStartY=0;
  function onTouchStart(e) { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; }
  function onTouchEnd(e) {
    const dx = e.changedTouches[0].clientX-touchStartX;
    const dy = e.changedTouches[0].clientY-touchStartY;
    if (Math.max(Math.abs(dx),Math.abs(dy)) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) tryMove(0, dx>0?1:-1);
    else tryMove(dy>0?1:-1, 0);
  }

  document.addEventListener('keydown', onKey);
  canvas.addEventListener('touchstart', onTouchStart, {passive:true});
  canvas.addEventListener('touchend', onTouchEnd, {passive:true});
  undoBtn.addEventListener('click', undo);
  startBtn.addEventListener('click', start);

  loadLevel(0);
  render();

  window.__sokobanCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    document.removeEventListener('keydown', onKey);
    canvas.removeEventListener('touchstart', onTouchStart);
    canvas.removeEventListener('touchend', onTouchEnd);
  };
}



// ===== game-spotdiff.js =====
// ============================================================
// SPOT THE DIFFERENCE GAME — 雙生庭園尋異 (Twin Garden Spot-the-Difference)
// Procedurally generates a decorative scene, then creates a twin
// copy with N controlled mutations (color/size/rotation/presence).
// Click matching spots on either canvas to mark differences found.
// ============================================================

function mountSpotDiffGame(container, gameDef) {
  container.innerHTML = `
    <div id="sdRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#d4f5e0,#a8e8c0);position:relative;overflow:hidden;padding:8px;">
      <div id="sdHUD" style="position:absolute;top:64px;display:flex;gap:18px;align-items:center;color:#1a4a30;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>找到 <strong id="sdFound" style="color:#ff6fa5;">0</strong>/<span id="sdTotal">5</span></span>
        <span>分數 <strong id="sdScore" style="color:#ffc857;">0</strong></span>
        <span>時間 <strong id="sdTime" style="color:#0984e3;">90</strong></span>
      </div>
      <div style="display:flex;gap:8px;margin-top:38px;flex-wrap:wrap;justify-content:center;">
        <canvas id="sdCanvasA" width="170" height="220" style="border-radius:10px;box-shadow:0 8px 20px rgba(20,80,40,0.25);background:#eafdf0;cursor:pointer;"></canvas>
        <canvas id="sdCanvasB" width="170" height="220" style="border-radius:10px;box-shadow:0 8px 20px rgba(20,80,40,0.25);background:#eafdf0;cursor:pointer;"></canvas>
      </div>
      <div style="position:absolute;bottom:10px;color:#1a4a30;font-size:11px;letter-spacing:0.5px;">點擊兩張圖中不一樣的地方 ・ 找滿後自動換下一輪</div>
      <div id="sdOverlay" style="display:flex;position:absolute;inset:0;background:rgba(20,70,40,0.55);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🔍</div>
        <h2 id="sdOverlayTitle" style="font-size:26px;letter-spacing:3px;">雙生庭園尋異</h2>
        <p id="sdOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">兩張庭園圖看似相同，其實藏有 5 處不同<br>點擊發現差異的位置即可標記<br>找齊就換下一輪，時間內盡量找越多越好！</p>
        <button id="sdStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #0984e3;background:rgba(9,132,227,0.2);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvasA = document.getElementById('sdCanvasA');
  const canvasB = document.getElementById('sdCanvasB');
  const ctxA = canvasA.getContext('2d');
  const ctxB = canvasB.getContext('2d');
  const W = canvasA.width, H = canvasA.height;
  const foundEl = document.getElementById('sdFound');
  const totalEl = document.getElementById('sdTotal');
  const scoreEl = document.getElementById('sdScore');
  const timeEl = document.getElementById('sdTime');
  const overlay = document.getElementById('sdOverlay');
  const overlayTitle = document.getElementById('sdOverlayTitle');
  const overlayDesc = document.getElementById('sdOverlayDesc');
  const startBtn = document.getElementById('sdStartBtn');

  function currentPalette() {
    const item = getEquipped('spotdiff', 'character');
    return item ? item.colors : ['#ff6fa5','#ffc857','#5ec8e8','#a06fd4','#ff8a5c','#55e6a5'];
  }
  function currentGardenTheme() {
    const item = getEquipped('spotdiff', 'background');
    return item ? item.colors : { bg: '#eafdf0', ground: '#bfe8c8' };
  }

  let objects = [];
  let diffs = []; // { idx, type, x, y, found }
  let score = 0, timeLeft = 90, running = false;
  let countdownTimer = null, rafId = null;
  let pulsePhase = 0;

  const SHAPE_TYPES = ['circle','star','leaf','flower'];

  function rand(min,max) { return min + Math.random()*(max-min); }

  function generateScene() {
    objects = [];
    const palette = currentPalette();
    let attempts = 0;
    while (objects.length < 16 && attempts < 400) {
      attempts++;
      const x = rand(20, W-20), y = rand(30, H-20);
      const tooClose = objects.some(o => Math.hypot(o.x-x,o.y-y) < 26);
      if (tooClose) continue;
      objects.push({
        type: SHAPE_TYPES[Math.floor(Math.random()*SHAPE_TYPES.length)],
        x, y,
        r: rand(8,14),
        color: palette[Math.floor(Math.random()*palette.length)],
        rotation: rand(0, Math.PI*2)
      });
    }
  }

  function generateDiffs() {
    diffs = [];
    const indices = objects.map((_,i)=>i);
    for (let i=indices.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [indices[i],indices[j]]=[indices[j],indices[i]]; }
    const chosen = indices.slice(0,5);
    const palette = currentPalette();
    chosen.forEach(idx => {
      const obj = objects[idx];
      const types = ['color','scale','remove'];
      if (obj.type==='star'||obj.type==='leaf') types.push('rotate');
      const type = types[Math.floor(Math.random()*types.length)];
      diffs.push({ idx, type, x: obj.x, y: obj.y, found:false });
    });
  }

  function mutatedObject(obj, idx) {
    const diff = diffs.find(d => d.idx===idx);
    if (!diff) return obj;
    if (diff.type==='remove') return null;
    const clone = Object.assign({}, obj);
    if (diff.type==='color') {
      const palette = currentPalette();
      let newColor;
      do { newColor = palette[Math.floor(Math.random()*palette.length)]; } while (newColor===obj.color);
      clone.color = newColor;
    } else if (diff.type==='scale') {
      clone.r = obj.r * (Math.random()<0.5?0.55:1.6);
    } else if (diff.type==='rotate') {
      clone.rotation = obj.rotation + Math.PI/2;
    }
    return clone;
  }

  function drawShape(ctx, obj) {
    if (!obj) return;
    ctx.save();
    ctx.translate(obj.x, obj.y);
    ctx.rotate(obj.rotation);
    ctx.fillStyle = obj.color;
    if (obj.type==='circle') {
      ctx.beginPath(); ctx.arc(0,0,obj.r,0,Math.PI*2); ctx.fill();
    } else if (obj.type==='star') {
      ctx.beginPath();
      for (let i=0;i<10;i++) {
        const a=(Math.PI/5)*i-Math.PI/2, rad= i%2===0?obj.r:obj.r*0.45;
        const x=Math.cos(a)*rad,y=Math.sin(a)*rad;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath(); ctx.fill();
    } else if (obj.type==='leaf') {
      ctx.beginPath();
      ctx.moveTo(0,-obj.r);
      ctx.quadraticCurveTo(obj.r,0,0,obj.r);
      ctx.quadraticCurveTo(-obj.r,0,0,-obj.r);
      ctx.fill();
    } else if (obj.type==='flower') {
      for (let i=0;i<5;i++) {
        const a = (Math.PI*2/5)*i;
        ctx.save(); ctx.rotate(a);
        ctx.beginPath(); ctx.ellipse(0,-obj.r*0.6,obj.r*0.4,obj.r*0.6,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      ctx.fillStyle = '#ffe066';
      ctx.beginPath(); ctx.arc(0,0,obj.r*0.35,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawScene(ctx, isRight) {
    const theme = currentGardenTheme();
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = theme.ground;
    ctx.fillRect(0,H-18,W,18);
    objects.forEach((obj,idx) => {
      const renderObj = isRight ? mutatedObject(obj, idx) : obj;
      drawShape(ctx, renderObj);
    });
    // found markers
    diffs.forEach(d => {
      if (!d.found) return;
      ctx.save();
