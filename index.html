  // ---- Player: chibi pilot in a cute plane ----
  function createPlayer() {
    return { x: W/2, y: H-90, w: 46, h: 50, speed: 4.6, invincible: 0 };
  }

  function currentPlaneSkin() {
    const item = getEquipped('shooter', 'character');
    return item ? item.colors : { body1: '#fff5f0', body2: '#ffd6e0', wing: '#ff9bb8', hair: '#5a4070', flame: '#ffd166' };
  }
  function currentSkyTheme() {
    const item = getEquipped('shooter', 'background');
    return item ? item.colors : { sky1:'#bcdcf0', sky2:'#eaf6ff', cloud:'rgba(255,255,255,0.85)' };
  }

  function drawPlayer(p) {
    if (p.invincible > 0 && Math.floor(frameCount/5)%2===0) return;
    const skin = currentPlaneSkin();
    ctx.save();
    ctx.translate(p.x, p.y);
    // engine glow
    const glow = ctx.createRadialGradient(0,26,2,0,26,20);
    glow.addColorStop(0,'rgba(255,200,90,0.6)'); glow.addColorStop(1,'rgba(255,200,90,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.ellipse(0,26,18,13,0,0,Math.PI*2); ctx.fill();
    // flame
    ctx.fillStyle = skin.flame;
    ctx.beginPath(); ctx.moveTo(-7,20); ctx.lineTo(0,30+Math.sin(frameCount*0.3)*4); ctx.lineTo(7,20); ctx.closePath(); ctx.fill();

    // plane body (cute rounded jet, pastel)
    const bodyGrad = ctx.createLinearGradient(-20,-26,20,24);
    bodyGrad.addColorStop(0,skin.body1); bodyGrad.addColorStop(1,skin.body2);
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(0,-28);
    ctx.bezierCurveTo(12,-12,20,6,16,20);
    ctx.lineTo(-16,20);
    ctx.bezierCurveTo(-20,6,-12,-12,0,-28);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = skin.wing; ctx.lineWidth = 1.6; ctx.stroke();

    // wings
    ctx.fillStyle = skin.wing;
    ctx.beginPath(); ctx.moveTo(-15,8); ctx.lineTo(-32,20); ctx.lineTo(-13,18); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(15,8); ctx.lineTo(32,20); ctx.lineTo(13,18); ctx.closePath(); ctx.fill();

    // cockpit bubble with chibi pilot face
    ctx.save();
    ctx.beginPath(); ctx.ellipse(0,-6,10,12,0,0,Math.PI*2); ctx.clip();
    ctx.fillStyle = '#cfe8ff';
    ctx.fillRect(-12,-20,24,28);
    // tiny face
    ctx.fillStyle = '#ffe0c2';
    ctx.beginPath(); ctx.ellipse(0,-4,7,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = skin.hair;
    ctx.beginPath(); ctx.arc(0,-10,7.2,Math.PI,2*Math.PI); ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(-2.6,-4,1.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2.6,-4,1.3,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.ellipse(0,-6,10,12,0,0,Math.PI*2); ctx.stroke();

    ctx.restore();
  }

  // ---- Enemies: cute kaiju-style invaders ----
  function spawnEnemies(lvl) {
    enemies = [];
    const cols = Math.min(7 + Math.floor((lvl-1)/3), 9);
    const rows = Math.min(3 + Math.floor(lvl*0.6), 6);
    const spacingX = Math.floor((W-40)/cols);
    for (let r=0;r<rows;r++) {
      for (let c=0;c<cols;c++) {
        const type = r===0 ? 2 : (r<3?1:0);
        const maxHpE = enemyHP(type, lvl);
        enemies.push({
          x: 20+spacingX*c+spacingX/2,
          y: 40+r*Math.min(46,Math.floor(190/rows)),
          w: 32, h: 30,
          type, dx: 0.75+lvl*0.13,
          hp: maxHpE, maxHp: maxHpE,
          alive: true, bobPhase: Math.random()*Math.PI*2
        });
      }
    }
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y + Math.sin(frameCount*0.08+e.bobPhase)*2);
    if (e.type === 2) {
      // boss-tier: red oni-style kaiju
      ctx.fillStyle = '#ff7a6e';
      ctx.beginPath(); ctx.ellipse(0,0,16,14,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffb8a8';
      ctx.beginPath(); ctx.ellipse(0,3,10,8,0,0,Math.PI*2); ctx.fill();
      // horns
      ctx.fillStyle = '#e8c468';
      ctx.beginPath(); ctx.moveTo(-8,-10); ctx.lineTo(-12,-20); ctx.lineTo(-3,-12); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(8,-10); ctx.lineTo(12,-20); ctx.lineTo(3,-12); ctx.closePath(); ctx.fill();
      // angry eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(-5,-1,3.4,4,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(5,-1,3.4,4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#cc2222';
      ctx.beginPath(); ctx.arc(-5,0,1.8,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5,0,1.8,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#a83030'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.arc(0,7,3,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
      // little wings
      ctx.fillStyle = '#e85a4f';
      ctx.beginPath(); ctx.moveTo(-14,2); ctx.lineTo(-22,8); ctx.lineTo(-11,9); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(14,2); ctx.lineTo(22,8); ctx.lineTo(11,9); ctx.closePath(); ctx.fill();
    } else if (e.type === 1) {
      // mid-tier: purple slime-bat
      ctx.fillStyle = '#b48cff';
      ctx.beginPath(); ctx.ellipse(0,0,13,12,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(-4,-1,3,3.6,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(4,-1,3,3.6,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#5a3a8a';
      ctx.beginPath(); ctx.arc(-4,0,1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(4,0,1.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#9670ec';
      ctx.beginPath(); ctx.moveTo(-12,3); ctx.lineTo(-19,9); ctx.lineTo(-9,8); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(12,3); ctx.lineTo(19,9); ctx.lineTo(9,8); ctx.closePath(); ctx.fill();
    } else {
      // basic: green blob-bug
      ctx.fillStyle = '#7ed957';
      ctx.beginPath(); ctx.ellipse(0,0,11,10,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(-3.4,-0.5,2.6,3,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(3.4,-0.5,2.6,3,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2b6e1f';
      ctx.beginPath(); ctx.arc(-3.4,0,1.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3.4,0,1.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#5fc23f';
      ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-16,7); ctx.lineTo(-8,7); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(16,7); ctx.lineTo(8,7); ctx.closePath(); ctx.fill();
    }
    // hp bar
    if (e.maxHp > 1) {
      const bw=26, bh=4;
      ctx.fillStyle = '#33000055';
      ctx.fillRect(-bw/2, -22, bw, bh);
      const frac = Math.max(0, e.hp/e.maxHp);
      ctx.fillStyle = frac > 0.5 ? '#ff5a5a' : '#ff9933';
      ctx.fillRect(-bw/2, -22, bw*frac, bh);
    }
    ctx.restore();
  }

  // ---- Bullets ----
  function drawBullet(b, isEnemy) {
    ctx.save();
    if (isEnemy) {
      ctx.shadowBlur = 6; ctx.shadowColor = '#ff7a6e';
      ctx.fillStyle = '#ff9b8e';
      ctx.beginPath(); ctx.ellipse(b.x,b.y,3,7,0,0,Math.PI*2); ctx.fill();
    } else {
      ctx.shadowBlur = 8; ctx.shadowColor = '#ffd166';
      const g = ctx.createLinearGradient(b.x,b.y-10,b.x,b.y+4);
      g.addColorStop(0,'#fff3b0'); g.addColorStop(1,'#ffd16600');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(b.x,b.y,2.6,9,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // ---- Sparkle explosion ----
  function spawnSparkle(x,y,color) {
    const particles = [];
    for (let i=0;i<14;i++) {
      const a = Math.random()*Math.PI*2, sp = Math.random()*2.6+1;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:Math.random()*2.6+1});
    }
    sparkles.push({particles, color: color||'#ffd166', life:1});
  }
  function updateSparkles() {
    sparkles = sparkles.filter(s=>s.life>0);
    sparkles.forEach(s=>{ s.life-=0.04; s.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.life-=0.045;}); });
  }
  function drawSparkles() {
    sparkles.forEach(s=>{
      s.particles.forEach(p=>{
        if (p.life<=0) return;
        ctx.save(); ctx.globalAlpha = p.life*s.life; ctx.fillStyle=s.color;
        ctx.shadowBlur=5; ctx.shadowColor=s.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    });
  }

  // ---- Heal drops: cute stars ----
  function spawnHealDrop(x,y) { healDrops.push({x,y,vy:1.3,phase:Math.random()*Math.PI*2}); }
  function updateHealDrops() { healDrops = healDrops.filter(d=>d.y<H+20); healDrops.forEach(d=>{d.y+=d.vy; d.phase+=0.12;}); }
  function drawHealDrops() {
    healDrops.forEach(d=>{
      const s = 1+Math.sin(d.phase)*0.15;
      ctx.save(); ctx.translate(d.x,d.y); ctx.scale(s,s);
      ctx.shadowBlur=12; ctx.shadowColor='#ff9bb8';
      ctx.fillStyle = '#ff9bb8';
      drawStarPath(ctx, 0,0, 9, 4);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText('+', 0, 3);
      ctx.restore();
    });
  }
  function drawStarPath(ctx,cx,cy,outerR,points) {
    ctx.beginPath();
    for (let i=0;i<points*2;i++) {
      const r = i%2===0?outerR:outerR*0.45;
      const a = (Math.PI/points)*i - Math.PI/2;
      const x = cx+Math.cos(a)*r, y = cy+Math.sin(a)*r;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
  }

  function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
    return ax-aw/2<bx+bw/2 && ax+aw/2>bx-bw/2 && ay-ah/2<by+bh/2 && ay+ah/2>by-bh/2;
  }

  function updateHpBar() {
    const pct = Math.max(0, hp/maxHp*100);
    hpFillEl.style.width = pct+'%';
    if (pct>60) hpFillEl.style.background='linear-gradient(90deg,#7ec88a,#4f9d62)';
    else if (pct>30) hpFillEl.style.background='linear-gradient(90deg,#ffd166,#ff9933)';
    else hpFillEl.style.background='linear-gradient(90deg,#ff7a6e,#cc2222)';
    hpTextEl.textContent = `${Math.max(0,Math.ceil(hp))}/${maxHp}`;
  }

  function startGame() {
    score=0; level=1; maxHp=playerMaxHP(1); hp=maxHp;
    player = createPlayer();
    bullets=[]; enemyBullets=[]; healDrops=[]; sparkles=[];
    shootCooldown=0; enemyShootTimer=0; frameCount=0; enemyDir=1; spaceHoldFrames=0;
    spawnEnemies(level);
    scoreEl.textContent=score; levelEl.textContent=level; updateHpBar();
    state='playing'; overlay.style.display='none';
  }

  function nextLevel() {
    level++;
    const newMax = playerMaxHP(level);
    hp = Math.min(newMax, hp + Math.round(newMax*0.3));
    maxHp = newMax;
    bullets=[]; enemyBullets=[]; healDrops=[];
    player = createPlayer(); enemyDir=1;
    spawnEnemies(level);
    levelEl.textContent=level; updateHpBar();
    state='playing'; overlay.style.display='none';
  }

  function update() {
    frameCount++;
    updateClouds();
    if (state!=='playing') return;

    if ((keys['ArrowLeft']||keys['a']||keys['A']) && player.x>22) player.x -= player.speed;
    if ((keys['ArrowRight']||keys['d']||keys['D']) && player.x<W-22) player.x += player.speed;
    if ((keys['ArrowUp']||keys['w']||keys['W']) && player.y>110) player.y -= player.speed;
    if ((keys['ArrowDown']||keys['s']||keys['S']) && player.y<H-40) player.y += player.speed;

    const spaceHeld = keys[' ']||keys['z']||keys['Z'];
    if (spaceHeld) { spaceHoldFrames = Math.min(spaceHoldFrames+1, 90); }
    else { spaceHoldFrames = 0; }

    if (spaceHeld && shootCooldown<=0) {
      const chargedSpeed = 9 + spaceHoldFrames * 0.12; // up to ~9+10.8 = ~19.8 at max hold
      bullets.push({x:player.x,y:player.y-30,speed:chargedSpeed});
      shootCooldown = shootCooldownForLevel(level);
    }
    if (shootCooldown>0) shootCooldown--;

    bullets = bullets.filter(b=>b.y>-10);
    bullets.forEach(b=>b.y-=b.speed);
    enemyBullets = enemyBullets.filter(b=>b.y<H+10);
    enemyBullets.forEach(b=>{b.x+=b.vx; b.y+=b.vy;});

    let hitEdge=false;
    const alive = enemies.filter(e=>e.alive);
    alive.forEach(e=>{e.x += e.dx*enemyDir;});
    alive.forEach(e=>{ if (e.x>W-20||e.x<20) hitEdge=true; });
    if (hitEdge) { enemyDir*=-1; }

    enemyShootTimer++;
    const fireRate = Math.max(120-level*8, 60);
    if (enemyShootTimer>=fireRate && alive.length>0) {
      enemyShootTimer=0;
      const shooter = alive[Math.floor(Math.random()*alive.length)];
      enemyBullets.push({x:shooter.x,y:shooter.y+14,vx:(Math.random()-0.5)*1.2,vy:3+level*0.2});
    }

    bullets.forEach(b=>{
      enemies.forEach(e=>{
        if (!e.alive) return;
        if (rectsOverlap(b.x,b.y,5,18,e.x,e.y,e.w,e.h)) {
          b.y=-999; e.hp -= playerDamage(level);
          if (e.hp<=0) {
            e.alive=false;
            const pts = e.type===2?30:e.type===1?20:10;
            score += pts*level;
            spawnSparkle(e.x,e.y, e.type===2?'#ff7a6e':e.type===1?'#b48cff':'#7ed957');
            const dropChance = e.type===2?0.5:e.type===1?0.35:0.25;
            if (Math.random()<dropChance) spawnHealDrop(e.x,e.y);
          } else {
            spawnSparkle(b.x,b.y,'#ffffff');
          }
          scoreEl.textContent=score;
        }
      });
    });

    healDrops.forEach(d=>{
      if (rectsOverlap(d.x,d.y,18,18,player.x,player.y,40,46)) {
        d.y=H+100;
        hp = Math.min(maxHp, hp+healAmount(level));
        spawnSparkle(player.x,player.y-10,'#7ec88a');
        updateHpBar();
      }
    });
    updateHealDrops();

    if (player.invincible<=0) {
      enemyBullets.forEach(b=>{
        if (rectsOverlap(b.x,b.y,6,14,player.x,player.y,34,40)) {
          b.y=H+100;
          hp -= enemyDamage(level);
          spawnSparkle(player.x,player.y,'#a8d4f0');
          player.invincible=60;
          updateHpBar();
          if (hp<=0) {
            hp=0; updateHpBar(); state='dead';
            spawnSparkle(player.x,player.y,'#ffffff');
            const earned = convertScoreToCoins('shooter', score);
            showOverlay('遊戲結束', `最終分數：${score}　獲得 💰${earned} 金幣`, '重新開始');
          }
        }
      });
    }
    if (player.invincible>0) player.invincible--;

    if (enemies.filter(e=>e.alive).length===0 && state==='playing') {
      state='levelup';
      const nl = level+1;
      showOverlay(`第 ${level} 關通過！`, `分數：${score}　下一關 HP：${playerMaxHP(nl)}<br>我方攻擊力：${playerDamage(nl)}　敵方攻擊：${enemyDamage(nl)}`, `進入第 ${nl} 關`);
    }

    updateSparkles();
  }

  function showOverlay(title, desc, btnLabel) {
    overlay.style.display='flex';
    overlayTitle.textContent = title;
    overlayDesc.innerHTML = desc;
    startBtn.textContent = btnLabel;
  }

  function draw() {
    const sky = currentSkyTheme();
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, sky.sky1); grad.addColorStop(1, sky.sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);
    clouds.forEach(c => drawCloud(c, sky.cloud));
    if (state==='playing'||state==='dead'||state==='levelup') {
      enemies.forEach(e=>{ if (e.alive) drawEnemy(e); });
      drawHealDrops();
      bullets.forEach(b=>drawBullet(b,false));
      enemyBullets.forEach(b=>drawBullet(b,true));
      if (state==='playing') drawPlayer(player);
    }
    drawSparkles();
  }

  function loop() { update(); draw(); rafId = requestAnimationFrame(loop); }

  function handleKey(e) { keys[e.key]=true; if (e.key===' ') e.preventDefault(); }
  function handleKeyUp(e) { keys[e.key]=false; }

  let touchStartX=0, touchStartY=0;
  function handleTouchStart(e) { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; keys[' ']=true; }
  function handleTouchMove(e) {
    const dx=e.touches[0].clientX-touchStartX, dy=e.touches[0].clientY-touchStartY;
    if (player && state==='playing') {
      player.x = Math.max(22,Math.min(W-22,player.x+dx*0.6));
      player.y = Math.max(110,Math.min(H-40,player.y+dy*0.4));
    }
    touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
  }
  function handleTouchEnd() { keys[' ']=false; }

  document.addEventListener('keydown', handleKey);
  document.addEventListener('keyup', handleKeyUp);
  canvas.addEventListener('touchstart', handleTouchStart, {passive:true});
  canvas.addEventListener('touchmove', handleTouchMove, {passive:true});
  canvas.addEventListener('touchend', handleTouchEnd, {passive:true});

  startBtn.addEventListener('click', () => {
    if (state==='levelup') nextLevel(); else startGame();
  });

  initClouds();
  loop();

  window.__shooterCleanup = function() {
    state = 'idle';
    if (rafId) cancelAnimationFrame(rafId);
    document.removeEventListener('keydown', handleKey);
    document.removeEventListener('keyup', handleKeyUp);
  };
}



// ===== game-match3.js =====
// ============================================================
// MATCH-3 GAME — 魔法糖果陣 (Magic Candy Match)
// Click two adjacent same-colored gems to clear a connected group (≥2).
// Bombs and rainbow gems add special effects. Timed mode.
// ============================================================

function mountMatch3Game(container, gameDef) {
  container.innerHTML = `
    <div id="m3Root" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#ffd9ec,#ffb8d9);position:relative;overflow:hidden;">
      <div id="m3HUD" style="position:absolute;top:64px;display:flex;gap:22px;align-items:center;color:#5a2a4a;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="m3Score" style="color:#fd79a8;">0</strong></span>
        <span>時間 <strong id="m3Time" style="color:#6c5ce7;">60</strong></span>
        <span>連鎖 <strong id="m3Combo" style="color:#ffc857;">0</strong></span>
      </div>
      <canvas id="m3Canvas" width="384" height="384" style="border-radius:16px;box-shadow:0 12px 30px rgba(150,60,110,0.25);background:#fff0f6;margin-top:36px;max-width:90vw;"></canvas>
      <div style="position:absolute;bottom:16px;color:#7a3a5a;font-size:12px;letter-spacing:1px;">點擊相連的同色方塊（2個以上）即可消除 ・ 炸彈會清除周圍 ・ 彩虹塊清除全場同色</div>
      <div id="m3Overlay" style="display:flex;position:absolute;inset:0;background:rgba(80,30,60,0.55);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🍬</div>
        <h2 id="m3OverlayTitle" style="font-size:26px;letter-spacing:3px;">魔法糖果陣</h2>
        <p id="m3OverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">點擊相連的同色方塊消除得分<br>消除越多連鎖分數越高<br>炸彈💣與彩虹塊🌈帶來特殊效果！</p>
        <button id="m3StartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #fd79a8;background:rgba(253,121,168,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('m3Canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('m3Score');
  const timeEl = document.getElementById('m3Time');
  const comboEl = document.getElementById('m3Combo');
  const overlay = document.getElementById('m3Overlay');
  const overlayTitle = document.getElementById('m3OverlayTitle');
  const overlayDesc = document.getElementById('m3OverlayDesc');
  const startBtn = document.getElementById('m3StartBtn');

  const GRID = 8; // 8x8 board
  const CELL = canvas.width / GRID;

  function currentPalette() {
    const item = getEquipped('match3', 'character');
    return item ? item.colors : ['#ff6fa5', '#5ec8e8', '#ffc857', '#6c5ce7', '#55e6a5'];
  }
  function currentBoardTheme() {
    const item = getEquipped('match3', 'background');
    return item ? item.colors : { bg: '#fff0f6', grid: 'rgba(253,121,168,0.12)' };
  }

  let board = []; // board[r][c] = { color: idx, special: null|'bomb'|'rainbow' }
  let score = 0, timeLeft = 60, comboCount = 0;
  let running = false, countdownTimer = null;
  let particles = [];
  let animFrame = null;
  let selecting = false;

  function randColorIdx() { return Math.floor(Math.random() * currentPalette().length); }

  function createBoard() {
    board = [];
    for (let r = 0; r < GRID; r++) {
      const row = [];
      for (let c = 0; c < GRID; c++) {
        row.push({ color: randColorIdx(), special: null, fallY: -(GRID-r)*CELL, scale: 1 });
      }
      board.push(row);
    }
    // animate fall-in
    board.forEach(row => row.forEach(cell => { cell.fallY = 0; }));
  }

  function neighbors(r, c) {
    return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc]) => nr>=0&&nr<GRID&&nc>=0&&nc<GRID);
  }

  function findConnectedGroup(r, c) {
    const startColor = board[r][c].color;
    const visited = new Set();
    const stack = [[r,c]];
    const group = [];
    while (stack.length) {
      const [cr,cc] = stack.pop();
      const key = cr+','+cc;
      if (visited.has(key)) continue;
      visited.add(key);
      if (!board[cr][cc] || board[cr][cc].color !== startColor) continue;
      group.push([cr,cc]);
      neighbors(cr,cc).forEach(([nr,nc]) => { if (!visited.has(nr+','+nc)) stack.push([nr,nc]); });
    }
    return group;
  }

  function clearCells(cells, isSpecialTrigger) {
    cells.forEach(([r,c]) => {
      if (!board[r][c]) return;
      const cell = board[r][c];
      spawnParticles(c*CELL+CELL/2, r*CELL+CELL/2, currentPalette()[cell.color]);
      board[r][c] = null;
    });
  }

  function applyGravityAndRefill() {
    for (let c = 0; c < GRID; c++) {
      let writeR = GRID - 1;
      for (let r = GRID - 1; r >= 0; r--) {
        if (board[r][c]) {
          if (r !== writeR) {
            board[writeR][c] = board[r][c];
            board[writeR][c].fallY = (r - writeR) * -CELL; // will animate to 0
            board[r][c] = null;
          }
          writeR--;
        }
      }
      for (let r = writeR; r >= 0; r--) {
        board[r][c] = { color: randColorIdx(), special: null, fallY: -(writeR - r + 1) * CELL, scale: 1 };
      }
    }
  }

  function spawnParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      const angle = Math.random()*Math.PI*2, speed = Math.random()*2.5+1;
      particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, color });
    }
  }
  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.04; });
  }
  function drawParticles() {
    particles.forEach(p => {
      ctx.save(); ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function handleClick(evt) {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    const x = (evt.clientX - rect.left) * scaleX;
    const y = (evt.clientY - rect.top) * scaleY;
    const c = Math.floor(x / CELL), r = Math.floor(y / CELL);
    if (r<0||r>=GRID||c<0||c>=GRID || !board[r][c]) return;

    const cell = board[r][c];

    if (cell.special === 'bomb') {
      const cells = [];
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
        const nr=r+dr, nc=c+dc;
        if (nr>=0&&nr<GRID&&nc>=0&&nc<GRID&&board[nr][nc]) cells.push([nr,nc]);
      }
      resolveMatch(cells);
      return;
    }
    if (cell.special === 'rainbow') {
      const targetColor = cell.color;
      const cells = [];
      for (let rr=0; rr<GRID; rr++) for (let cc=0; cc<GRID; cc++) {
        if (board[rr][cc] && board[rr][cc].color === targetColor) cells.push([rr,cc]);
      }
      resolveMatch(cells);
      return;
    }

    const group = findConnectedGroup(r, c);
    if (group.length < 2) {
      flashInvalid(r, c);
      return;
    }
    resolveMatch(group);
  }

  function resolveMatch(cells) {
    comboCount++;
    comboEl.textContent = comboCount;
    const base = cells.length * 10;
    const comboBonus = Math.floor(comboCount / 3) * 5;
    const gained = base + comboBonus * cells.length;
    score += gained;
    scoreEl.textContent = score;

    // chance to create special tile at first cleared cell location if group big enough
    if (cells.length >= 5) {
      const [sr, sc] = cells[0];
      setTimeout(() => {
        clearCells(cells);
        if (board[sr]) board[sr][sc] = { color: randColorIdx(), special: cells.length >= 7 ? 'rainbow' : 'bomb', fallY: 0, scale: 1 };
        applyGravityAndRefillExcept(sr, sc);
      }, 0);
    } else {
      clearCells(cells);
      applyGravityAndRefill();
    }

    clearTimeout(comboResetTimer);
    comboResetTimer = setTimeout(() => { comboCount = 0; comboEl.textContent = 0; }, 1500);
  }

  function applyGravityAndRefillExcept(keepR, keepC) {
    const keep = board[keepR][keepC];
    board[keepR][keepC] = null;
    applyGravityAndRefill();
    // find where 'keep' tile should be re-placed: simplest is just re-place at same spot post gravity if empty
    if (!board[keepR][keepC]) board[keepR][keepC] = keep;
  }

  let comboResetTimer = null;

  function flashInvalid(r, c) {
    const cell = board[r][c];
    if (!cell) return;
    cell.shake = 6;
  }

  function drawBoard() {
    const theme = currentBoardTheme();
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = theme.grid;
    ctx.lineWidth = 1;
    for (let i=0;i<=GRID;i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
    }
    const palette = currentPalette();
    for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
      const cell = board[r][c];
      if (!cell) continue;
      if (cell.fallY !== 0) cell.fallY *= 0.7;
      if (Math.abs(cell.fallY) < 0.5) cell.fallY = 0;
      if (cell.shake) cell.shake *= 0.6;
      const shakeX = cell.shake ? Math.sin(Date.now()*0.05)*cell.shake : 0;
      const cx = c*CELL+CELL/2+shakeX, cy = r*CELL+CELL/2+cell.fallY;
      const size = CELL*0.38;
      ctx.save();
      ctx.translate(cx, cy);
      if (cell.special === 'bomb') {
        ctx.save(); ctx.shadowBlur=10; ctx.shadowColor='#333';
        ctx.fillStyle = '#3a3a3a';
        ctx.beginPath(); ctx.arc(0,2,size*0.9,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ff6a3a';
        ctx.beginPath(); ctx.moveTo(-3,-size*0.85); ctx.lineTo(3,-size*1.1); ctx.lineTo(6,-size*0.8); ctx.closePath(); ctx.fill();
        ctx.restore();
      } else if (cell.special === 'rainbow') {
        const rg = ctx.createLinearGradient(-size,-size,size,size);
        rg.addColorStop(0,'#ff6fa5'); rg.addColorStop(0.33,'#ffc857'); rg.addColorStop(0.66,'#55e6a5'); rg.addColorStop(1,'#5ec8e8');
        ctx.save(); ctx.shadowBlur=12; ctx.shadowColor='#fff';
        ctx.fillStyle = rg;
        roundRectPath(ctx, -size, -size, size*2, size*2, size*0.3);
        ctx.fill();
        ctx.restore();
      } else {
        const color = palette[cell.color % palette.length];
        ctx.save(); ctx.shadowBlur=6; ctx.shadowColor=color;
        const grad = ctx.createRadialGradient(-size*0.3,-size*0.3,2,0,0,size*1.3);
        grad.addColorStop(0,'#fff'); grad.addColorStop(0.3,color); grad.addColorStop(1,color);
        ctx.fillStyle = grad;
        roundRectPath(ctx, -size, -size, size*2, size*2, size*0.35);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }
  }

  function render() {
    if (!running) { drawBoard(); drawParticles(); return; }
    drawBoard();
    updateParticles();
    drawParticles();
    animFrame = requestAnimationFrame(render);
  }

  function tickCountdown() {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) return endGame();
    countdownTimer = setTimeout(tickCountdown, 1000);
  }

  function endGame() {
    running = false;
    if (countdownTimer) clearTimeout(countdownTimer);
    const earned = convertScoreToCoins('match3', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '時間到！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '再玩一次';
  }

  function start() {
    score = 0; timeLeft = 60; comboCount = 0;
    scoreEl.textContent = 0; timeEl.textContent = 60; comboEl.textContent = 0;
    createBoard();
    running = true;
    overlay.style.display = 'none';
    render();
    countdownTimer = setTimeout(tickCountdown, 1000);
  }

  canvas.addEventListener('click', handleClick);
  startBtn.addEventListener('click', start);

  // idle preview board behind start screen
  createBoard();
  render();

  window.__match3Cleanup = function() {
    running = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    if (countdownTimer) clearTimeout(countdownTimer);
    clearTimeout(comboResetTimer);
    canvas.removeEventListener('click', handleClick);
  };
}



// ===== game-pinball.js =====
// ============================================================
// PINBALL GAME — 機甲彈擊 (Mecha Bounce Strike)
// Breakout-style: control a paddle, bounce the ball to destroy mech targets.
// Different ball types and obstacle types each have unique effects.
// ============================================================

function mountPinballGame(container, gameDef) {
  container.innerHTML = `
    <div id="pbRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d1b2a,#1b3a5c);position:relative;overflow:hidden;">
      <div id="pbHUD" style="position:absolute;top:64px;display:flex;gap:22px;align-items:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="pbScore" style="color:#ffc857;">0</strong></span>
        <span>關卡 <strong id="pbLevel" style="color:#0984e3;">1</strong></span>
        <span>球數 <strong id="pbBalls" style="color:#e84393;">3</strong></span>
      </div>
      <canvas id="pbCanvas" width="380" height="500" style="border-radius:14px;box-shadow:0 12px 30px rgba(0,0,0,0.5);background:#0a1622;margin-top:36px;max-height:62vh;"></canvas>
      <div style="position:absolute;bottom:16px;color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px;">滑鼠/觸控移動机体 ・ 擊毀所有目標過關 ・ 不同目標有不同效果</div>
      <div id="pbOverlay" style="display:flex;position:absolute;inset:0;background:rgba(5,10,20,0.7);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🤖</div>
        <h2 id="pbOverlayTitle" style="font-size:26px;letter-spacing:3px;">機甲彈擊</h2>
        <p id="pbOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">移動機體反彈能量球<br>擊毀所有敵方裝置過關<br>金色目標給予額外分數！</p>
        <button id="pbStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #0984e3;background:rgba(9,132,227,0.2);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('pbCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('pbScore');
  const levelEl = document.getElementById('pbLevel');
  const ballsEl = document.getElementById('pbBalls');
  const overlay = document.getElementById('pbOverlay');
  const overlayTitle = document.getElementById('pbOverlayTitle');
  const overlayDesc = document.getElementById('pbOverlayDesc');
  const startBtn = document.getElementById('pbStartBtn');

  function currentMechSkin() {
    const item = getEquipped('pinball', 'character');
    return item ? item.colors : { paddle1: '#3a5a7a', paddle2: '#5ec8e8', ball: '#ffc857', glow: '#ffc857' };
  }
  function currentArenaTheme() {
    const item = getEquipped('pinball', 'background');
    return item ? item.colors : { bg1: '#0a1622', bg2: '#16263a', grid: 'rgba(94,200,232,0.08)' };
  }

  let score = 0, level = 1, ballsLeft = 3;
  let paddle, ball, blocks;
  let running = false, rafId = null;
  let launched = false;

  function blockRowsForLevel(lvl) { return Math.min(3 + Math.floor(lvl/2), 6); }
  function ballSpeedForLevel(lvl) { return 4.2 + lvl * 0.3; }

  function createPaddle() { return { x: W/2, w: 70, h: 14, y: H - 36 }; }
  function createBall() {
    return { x: W/2, y: H-50, vx: (Math.random()>0.5?1:-1)*2.4, vy: -ballSpeedForLevel(level), r: 8, trail: [] };
  }
  function createBlocks(lvl) {
    blocks = [];
    const rows = blockRowsForLevel(lvl);
    const cols = 7;
    const bw = (W - 20) / cols, bh = 22;
    for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
      const isGold = Math.random() < 0.1;
      const hp = isGold ? 1 : (r < rows/2 ? 2 : 1) + Math.floor((lvl-1)/3);
      blocks.push({ x: 10+c*bw+bw/2, y: 50+r*bh+bh/2, w: bw-4, h: bh-4, hp, maxHp: hp, gold: isGold, alive: true });
    }
  }

  function resetBallOnPaddle() {
    launched = false;
    ball = { x: paddle.x, y: paddle.y - 16, vx: 0, vy: 0, r: 8, trail: [] };
  }

  function launchBall() {
    if (launched || !running) return;
    launched = true;
    ball.vx = (Math.random()>0.5?1:-1) * 2.4;
    ball.vy = -ballSpeedForLevel(level);
  }

  function startGame() {
    score = 0; level = 1; ballsLeft = 3;
    scoreEl.textContent = 0; levelEl.textContent = 1; ballsEl.textContent = 3;
    paddle = createPaddle();
    createBlocks(level);
    resetBallOnPaddle();
    running = true;
    overlay.style.display = 'none';
    if (!rafId) loop();
  }

  function nextLevel() {
    level++;
    levelEl.textContent = level;
    createBlocks(level);
    paddle = createPaddle();
    resetBallOnPaddle();
    running = true;
    overlay.style.display = 'none';
  }

  function loseBall() {
    ballsLeft--;
    ballsEl.textContent = ballsLeft;
    if (ballsLeft <= 0) return gameOver();
    paddle = createPaddle();
    resetBallOnPaddle();
  }

  function gameOver() {
    running = false;
    const earned = convertScoreToCoins('pinball', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '機體損毀';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣<br>到達關卡：${level}`;
    startBtn.textContent = '重新開始';
  }

  function update() {
    if (!running) return;
    if (!launched) { ball.x = paddle.x; return; }

    ball.trail.push({x:ball.x,y:ball.y});
    if (ball.trail.length > 8) ball.trail.shift();

    ball.x += ball.vx; ball.y += ball.vy;

    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -1; }
    if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx *= -1; }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }

    // paddle collision
    if (ball.y + ball.r > paddle.y - paddle.h/2 && ball.y + ball.r < paddle.y + paddle.h/2 + 10 &&
        ball.x > paddle.x - paddle.w/2 && ball.x < paddle.x + paddle.w/2 && ball.vy > 0) {
      ball.vy *= -1;
      const hitOffset = (ball.x - paddle.x) / (paddle.w/2);
      ball.vx = hitOffset * 4.5;
      ball.y = paddle.y - paddle.h/2 - ball.r;
    }

    // block collisions
    blocks.forEach(b => {
      if (!b.alive) return;
      if (ball.x+ball.r > b.x-b.w/2 && ball.x-ball.r < b.x+b.w/2 && ball.y+ball.r > b.y-b.h/2 && ball.y-ball.r < b.y+b.h/2) {
        b.hp--;
        if (b.hp <= 0) {
          b.alive = false;
          score += b.gold ? 50 : 10 * level;
          scoreEl.textContent = score;
          spawnBlockBurst(b.x, b.y, b.gold ? '#ffe066' : '#5ec8e8');
        }
        // simple reflection based on overlap direction
        const overlapX = Math.min(ball.x+ball.r-(b.x-b.w/2), (b.x+b.w/2)-(ball.x-ball.r));
        const overlapY = Math.min(ball.y+ball.r-(b.y-b.h/2), (b.y+b.h/2)-(ball.y-ball.r));
        if (overlapX < overlapY) ball.vx *= -1; else ball.vy *= -1;
      }
    });

    if (ball.y - ball.r > H) loseBall();

    if (blocks.every(b => !b.alive)) {
      running = false;
      const earned = convertScoreToCoins('pinball', score);
      overlay.style.display = 'flex';
      overlayTitle.textContent = `第 ${level} 關 突破！`;
      overlayDesc.innerHTML = `分數：${score}　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣<br>準備進入更強的第 ${level+1} 關`;
      startBtn.textContent = `進入第 ${level+1} 關`;
      startBtn.onclick = nextLevel;
    }

    updateBursts();
  }

  let bursts = [];
  function spawnBlockBurst(x,y,color) {
    for (let i=0;i<10;i++) {
      const a = Math.random()*Math.PI*2, s = Math.random()*3+1;
      bursts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color});
    }
  }
  function updateBursts() {
    bursts = bursts.filter(p=>p.life>0);
    bursts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.04;});
  }
  function drawBursts() {
    bursts.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,2.6,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function drawPaddle() {
    const skin = currentMechSkin();
    ctx.save();
    ctx.translate(paddle.x, paddle.y);
    ctx.fillStyle = skin.paddle1;
    roundRectPath(ctx, -paddle.w/2, -paddle.h/2, paddle.w, paddle.h, 6);
    ctx.fill();
    ctx.fillStyle = skin.paddle2;
    roundRectPath(ctx, -paddle.w/2+4, -paddle.h/2+3, paddle.w-8, paddle.h-9, 4);
    ctx.fill();
    // little antenna details (mech feel)
    ctx.fillStyle = skin.glow;
    ctx.beginPath(); ctx.arc(-paddle.w/2+8, 0, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(paddle.w/2-8, 0, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawBall() {
    const skin = currentMechSkin();
    ball.trail.forEach((t,i) => {
      ctx.save(); ctx.globalAlpha = (i/ball.trail.length) * 0.3;
      ctx.fillStyle = skin.ball;
      ctx.beginPath(); ctx.arc(t.x,t.y,ball.r*0.7,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
    ctx.save();
    ctx.shadowBlur = 14; ctx.shadowColor = skin.glow;
    ctx.fillStyle = skin.ball;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawBlocks() {
    blocks.forEach(b => {
      if (!b.alive) return;
      ctx.save();
      ctx.translate(b.x, b.y);
      const color = b.gold ? '#ffe066' : (b.hp >= 2 ? '#e84393' : '#0984e3');
      ctx.save(); ctx.shadowBlur = b.gold?14:0; ctx.shadowColor = '#ffe066';
      ctx.fillStyle = color;
      roundRectPath(ctx, -b.w/2, -b.h/2, b.w, b.h, 4);
      ctx.fill();
      ctx.restore();
      if (b.maxHp > 1) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillRect(-b.w/2+3, b.h/2-5, (b.w-6)*(b.hp/b.maxHp), 3);
      }
      ctx.restore();
    });
  }

  function drawArenaBg() {
    const theme = currentArenaTheme();
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,theme.bg1); g.addColorStop(1,theme.bg2);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = theme.grid; ctx.lineWidth=1;
    for (let i=0;i<W;i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
    for (let i=0;i<H;i+=20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }
  }

  function draw() {
    drawArenaBg();
    drawBlocks();
    drawBursts();
    drawPaddle();
    drawBall();
  }

  function loop() { update(); draw(); rafId = requestAnimationFrame(loop); }

  function movePaddleTo(clientX) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (clientX - rect.left) * scaleX;
    paddle.x = Math.max(paddle.w/2, Math.min(W - paddle.w/2, x));
  }
  function onMouseMove(e) { movePaddleTo(e.clientX); }
  function onTouchMove(e) { movePaddleTo(e.touches[0].clientX); e.preventDefault(); }
  function onClickOrTouch() { launchBall(); }

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('click', onClickOrTouch);
  canvas.addEventListener('touchstart', onClickOrTouch);
  startBtn.addEventListener('click', startGame);

  // idle preview
  paddle = createPaddle();
  createBlocks(1);
  resetBallOnPaddle();
  draw();

  window.__pinballCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    canvas.removeEventListener('mousemove', onMouseMove);
    canvas.removeEventListener('touchmove', onTouchMove);
    canvas.removeEventListener('click', onClickOrTouch);
    canvas.removeEventListener('touchstart', onClickOrTouch);
  };
}



// ===== game-fishing.js =====
// ============================================================
// FISHING GAME — 夏日釣魚祭 (Summer Fishing Festival)
// Cast the line, wait for a bite, then time a reaction-based reel-in.
// Different fish have different value and difficulty.
// ============================================================

function mountFishingGame(container, gameDef) {
  container.innerHTML = `
    <div id="fishRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#ffe9a8,#7fd4d9);position:relative;overflow:hidden;">
      <div id="fishHUD" style="position:absolute;top:64px;display:flex;gap:22px;align-items:center;color:#1a4a3a;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="fishScore" style="color:#ff7a3a;">0</strong></span>
        <span>釣獲 <strong id="fishCount" style="color:#0984e3;">0</strong></span>
        <span>時間 <strong id="fishTime" style="color:#1a4a3a;">60</strong></span>
      </div>
      <canvas id="fishCanvas" width="420" height="460" style="border-radius:16px;box-shadow:0 12px 30px rgba(0,80,90,0.25);background:#bdeef2;margin-top:36px;max-height:60vh;"></canvas>
      <div id="fishStatusMsg" style="position:absolute;bottom:16px;color:#1a4a3a;font-size:13px;letter-spacing:1px;font-weight:700;">點擊水面拋出釣竿</div>
      <div id="fishOverlay" style="display:flex;position:absolute;inset:0;background:rgba(20,60,60,0.5);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🎣</div>
        <h2 id="fishOverlayTitle" style="font-size:26px;letter-spacing:3px;">夏日釣魚祭</h2>
        <p id="fishOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">點擊拋竿，等待魚兒咬鉤<br>看到「咬鉤！」立刻點擊收線<br>稀有魚種分數更高，但更難釣！</p>
        <button id="fishStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #00b894;background:rgba(0,184,148,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('fishCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const WATERLINE = H * 0.42;
  const scoreEl = document.getElementById('fishScore');
  const countEl = document.getElementById('fishCount');
  const timeEl = document.getElementById('fishTime');
  const statusMsg = document.getElementById('fishStatusMsg');
  const overlay = document.getElementById('fishOverlay');
  const overlayTitle = document.getElementById('fishOverlayTitle');
  const overlayDesc = document.getElementById('fishOverlayDesc');
  const startBtn = document.getElementById('fishStartBtn');

  function currentAnglerSkin() {
    const item = getEquipped('fishing', 'character');
    return item ? item.colors : { skin: '#ffe0c2', hair: '#2d3436', shirt: '#ffffff', rod: '#8b5a2b' };
  }
  function currentBeachTheme() {
    const item = getEquipped('fishing', 'background');
    return item ? item.colors : { sky1: '#ffe9a8', sky2: '#7fd4d9', water: '#3aa8c9', sun: '#ffd966' };
  }

  const FISH_TYPES = [
    { name: '小銀魚', color: '#cfd8dc', value: 10, weight: 42, biteWindow: 900 },
    { name: '青花魚', color: '#4a90d9', value: 14, weight: 36, biteWindow: 820 },
    { name: '橙鯛魚', color: '#ff8a5c', value: 20, weight: 26, biteWindow: 700 },
    { name: '河豚', color: '#ffe066', value: 26, weight: 20, biteWindow: 620 },
    { name: '紫斑魚', color: '#a06fd4', value: 35, weight: 14, biteWindow: 550 },
    { name: '深海鰻', color: '#2d3436', value: 42, weight: 10, biteWindow: 480 },
    { name: '彩虹魚', color: '#ff6fa5', value: 55, weight: 7, biteWindow: 420 },
    { name: '黃金鯉', color: '#ffd700', value: 80, weight: 4, biteWindow: 380 },
    { name: '夢幻錦鯉', color: '#ff3366', value: 150, weight: 1.5, biteWindow: 300 },
  ];

  let score = 0, caughtCount = 0, timeLeft = 60;
  let running = false, countdownTimer = null, rafId = null;
  let state = 'idle'; // idle | casting | waiting | biting | reeling | result
  let hookX = W/2, hookY = WATERLINE + 20;
  let castProgress = 0;
  let waitTimer = null, biteTimeout = null;
  let currentFish = null;
  let resultMsg = null, resultTimer = null;
  let ripples = [];
  let bobPhase = 0;

  function pickFish() {
    const totalWeight = FISH_TYPES.reduce((s,f)=>s+f.weight,0);
    let r = Math.random()*totalWeight;
    for (const f of FISH_TYPES) { if (r < f.weight) return f; r -= f.weight; }
    return FISH_TYPES[0];
  }

  function startCast(x) {
    if (state !== 'idle') return;
    state = 'casting';
    hookX = Math.max(40, Math.min(W-40, x));
    castProgress = 0;
    statusMsg.textContent = '拋竿中...';
  }

  function updateCast() {
    castProgress += 0.06;
    hookY = WATERLINE + 20 + Math.sin(Math.min(castProgress,1)*Math.PI/2) * 0; // placeholder, refined below
    const t = Math.min(castProgress, 1);
    hookY = (H*0.15) + t * (WATERLINE + 40 - H*0.15);
    if (t >= 1) {
      state = 'waiting';
      statusMsg.textContent = '等待魚兒咬鉤...';
      const fishDelay = 1200 + Math.random()*2200;
      waitTimer = setTimeout(triggerBite, fishDelay);
    }
  }

  function triggerBite() {
    if (state !== 'waiting') return;
    currentFish = pickFish();
    state = 'biting';
    statusMsg.textContent = '🐟 咬鉤了！快點擊收線！';
    spawnRipple(hookX, hookY);
    biteTimeout = setTimeout(() => {
      if (state === 'biting') missedFish();
    }, currentFish.biteWindow);
  }

  function missedFish() {
    state = 'result';
    resultMsg = { text: '魚跑掉了...', color: '#ff6b6b' };
    statusMsg.textContent = '魚跑掉了，再試一次';
    resetAfterResult();
  }

  function reelIn() {
    if (state !== 'biting') return;
    clearTimeout(biteTimeout);
    state = 'result';
    score += currentFish.value;
    caughtCount++;
    scoreEl.textContent = score;
    countEl.textContent = caughtCount;
    resultMsg = { text: `釣到 ${currentFish.name}！ +${currentFish.value}`, color: currentFish.color };
    statusMsg.textContent = `釣到 ${currentFish.name}！+${currentFish.value} 分`;
    spawnRipple(hookX, hookY);
    resetAfterResult();
  }

  function resetAfterResult() {
    resultTimer = setTimeout(() => {
      state = 'idle';
      currentFish = null;
      resultMsg = null;
      statusMsg.textContent = '點擊水面拋出釣竿';
      hookY = H*0.15;
    }, 1100);
  }

  function spawnRipple(x,y) { ripples.push({ x, y, r: 4, life: 1 }); }
  function updateRipples() {
    ripples = ripples.filter(r => r.life > 0);
    ripples.forEach(r => { r.r += 1.5; r.life -= 0.025; });
  }
  function drawRipples() {
    ripples.forEach(r => {
      ctx.save(); ctx.globalAlpha = Math.max(0,r.life);
      ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(r.x, r.y, r.r, r.r*0.35, 0, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    });
  }

  function handleInteract(x) {
    if (state === 'idle') startCast(x);
    else if (state === 'biting') reelIn();
  }

  function drawScene() {
    const theme = currentBeachTheme();
    const skySky = ctx.createLinearGradient(0,0,0,WATERLINE);
    skySky.addColorStop(0, theme.sky1); skySky.addColorStop(1, theme.sky2);
    ctx.fillStyle = skySky; ctx.fillRect(0,0,W,WATERLINE);

    // sun
    ctx.save(); ctx.shadowBlur=24; ctx.shadowColor=theme.sun;
    ctx.fillStyle = theme.sun;
    ctx.beginPath(); ctx.arc(W*0.78, H*0.12, 22, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // water
    const waterGrad = ctx.createLinearGradient(0,WATERLINE,0,H);
    waterGrad.addColorStop(0, theme.water); waterGrad.addColorStop(1, 'rgba(10,40,60,0.9)');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, WATERLINE, W, H-WATERLINE);

    // water shimmer lines
    bobPhase += 0.02;
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth=2;
    for (let i=0;i<5;i++) {
      const y = WATERLINE + 20 + i*30;
      ctx.beginPath();
      for (let x=0;x<=W;x+=10) {
        const wy = y + Math.sin(x*0.05 + bobPhase + i) * 3;
        if (x===0) ctx.moveTo(x,wy); else ctx.lineTo(x,wy);
      }
      ctx.stroke();
    }

    // beach sand strip at bottom of sky area
    ctx.fillStyle = '#f4d9a0';
    ctx.fillRect(0, WATERLINE-14, W, 14);

    // angler character standing on dock (simple chibi)
    drawAngler();

    drawRipples();

    // fishing line + hook
    if (state !== 'idle') {
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(W*0.18, H*0.22); ctx.lineTo(hookX, hookY); ctx.stroke();
      ctx.save();
      if (state === 'biting') {
        const shake = Math.sin(Date.now()*0.05)*3;
        ctx.translate(shake,0);
      }
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(hookX, hookY, 5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // result popup
    if (resultMsg) {
      ctx.save();
      ctx.font = 'bold 16px sans-serif'; ctx.textAlign='center';
      ctx.fillStyle = resultMsg.color;
      ctx.shadowBlur=8; ctx.shadowColor = resultMsg.color;
      ctx.fillText(resultMsg.text, W/2, H*0.3);
      ctx.restore();
    }

    // biting indicator
    if (state === 'biting') {
      ctx.save();
      ctx.font = 'bold 20px sans-serif'; ctx.textAlign='center';
      ctx.fillStyle = '#fff';
      ctx.shadowBlur=10; ctx.shadowColor='#ff4444';
      const pulse = 1+Math.sin(Date.now()*0.02)*0.15;
      ctx.translate(W/2, H*0.25); ctx.scale(pulse,pulse);
      ctx.fillText('咬鉤了！點擊收線', 0, 0);
      ctx.restore();
    }
  }

  function drawAngler() {
    const skin = currentAnglerSkin();
    const x = W*0.18, y = H*0.22;
    ctx.save();
    ctx.translate(x, y);
    // simple dock
    ctx.fillStyle = '#a0703a';
    ctx.fillRect(-30, 18, 60, 8);
    // body
    ctx.fillStyle = skin.shirt;
    roundRectPath(ctx, -14, -4, 28, 32, 6);
    ctx.fill();
    // head
    ctx.fillStyle = skin.skin;
    ctx.beginPath(); ctx.ellipse(0, -16, 13, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = skin.hair;
    ctx.beginPath(); ctx.arc(0, -22, 13.5, Math.PI, 2*Math.PI); ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(-4,-16,1.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-16,1.6,0,Math.PI*2); ctx.fill();
    // rod
    ctx.strokeStyle = skin.rod; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(10,10); ctx.lineTo(38, -30); ctx.stroke();
    ctx.restore();
  }

  function render() {
    drawScene();
    updateRipples();
    if (state === 'casting') updateCast();
    rafId = requestAnimationFrame(render);
  }

  function tickCountdown() {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) return endGame();
    countdownTimer = setTimeout(tickCountdown, 1000);
  }

  function endGame() {
    running = false;
    if (countdownTimer) clearTimeout(countdownTimer);
    clearTimeout(waitTimer); clearTimeout(biteTimeout); clearTimeout(resultTimer);
    const earned = convertScoreToCoins('fishing', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '釣魚時間結束！';
    overlayDesc.innerHTML = `總分：<strong style="color:#ffc857">${score}</strong>　釣獲 ${caughtCount} 隻　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '再玩一次';
  }

  function start() {
    score = 0; caughtCount = 0; timeLeft = 60; state = 'idle';
    scoreEl.textContent = 0; countEl.textContent = 0; timeEl.textContent = 60;
    statusMsg.textContent = '點擊水面拋出釣竿';
    running = true;
    overlay.style.display = 'none';
    countdownTimer = setTimeout(tickCountdown, 1000);
  }

  function onCanvasClick(e) {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    handleInteract(x);
  }
  function onCanvasTouch(e) {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.touches[0].clientX - rect.left) * scaleX;
    handleInteract(x);
  }

  canvas.addEventListener('click', onCanvasClick);
  canvas.addEventListener('touchstart', onCanvasTouch, { passive: true });
  startBtn.addEventListener('click', start);

  render();

  window.__fishingCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (countdownTimer) clearTimeout(countdownTimer);
    clearTimeout(waitTimer); clearTimeout(biteTimeout); clearTimeout(resultTimer);
    canvas.removeEventListener('click', onCanvasClick);
    canvas.removeEventListener('touchstart', onCanvasTouch);
  };
}



// ===== game-colormatch.js =====
// ============================================================
// COLOR MATCH GAME — 光速配色 (Lightspeed Color Match)
// A center color is shown; click the matching colored orb among
// several options before time runs out. Options & time decrease per level.
// ============================================================

function mountColorMatchGame(container, gameDef) {
  container.innerHTML = `
    <div id="cmRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a2540,#0f3d5c);position:relative;overflow:hidden;">
      <div id="cmHUD" style="position:absolute;top:64px;display:flex;gap:22px;align-items:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="cmScore" style="color:#00cec9;">0</strong></span>
        <span>關卡 <strong id="cmLevel" style="color:#ffc857;">1</strong></span>
        <span>生命 <strong id="cmLives" style="color:#ff6fa5;">3</strong></span>
      </div>
      <canvas id="cmCanvas" width="380" height="440" style="border-radius:16px;box-shadow:0 12px 30px rgba(0,30,50,0.5);background:#0d2d45;margin-top:36px;max-height:60vh;"></canvas>
      <div style="position:absolute;bottom:16px;color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px;">點擊與中心顏色相同的光球 ・ 時間限制隨關卡縮短</div>
      <div id="cmOverlay" style="display:flex;position:absolute;inset:0;background:rgba(5,15,30,0.7);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🔬</div>
        <h2 id="cmOverlayTitle" style="font-size:26px;letter-spacing:3px;">光速配色</h2>
        <p id="cmOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">記住中心顯示的顏色<br>在選項中點擊相同顏色<br>速度與顏色種類隨關卡增加！</p>
        <button id="cmStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #00cec9;background:rgba(0,206,201,0.2);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('cmCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('cmScore');
  const levelEl = document.getElementById('cmLevel');
  const livesEl = document.getElementById('cmLives');
  const overlay = document.getElementById('cmOverlay');
  const overlayTitle = document.getElementById('cmOverlayTitle');
  const overlayDesc = document.getElementById('cmOverlayDesc');
  const startBtn = document.getElementById('cmStartBtn');

  function currentColorSet() {
    const item = getEquipped('colormatch', 'character');
    return item ? item.colors : ['#ff6fa5','#5ec8e8','#ffc857','#55e6a5','#a29bfe','#ff8a5c','#00cec9','#fd79a8'];
  }
  function currentLabTheme() {
    const item = getEquipped('colormatch', 'background');
    return item ? item.colors : { bg1: '#0a2540', bg2: '#0f3d5c', grid: 'rgba(0,206,201,0.12)' };
  }

  let score = 0, level = 1, lives = 3;
  let running = false, rafId = null, roundTimer = null, roundDeadline = 0;
  let targetColor = null;
  let orbs = [];

  function optionsCountForLevel(lvl) { return Math.min(3 + Math.floor(lvl/2), 8); }
  function timeForLevel(lvl) { return Math.max(1100, 3200 - lvl*180); }

  function setupRound() {
    const palette = currentColorSet();
    const count = optionsCountForLevel(level);
    const usedColors = [];
    while (usedColors.length < count) {
      const c = palette[Math.floor(Math.random()*palette.length)];
      if (!usedColors.includes(c)) usedColors.push(c);
    }
    targetColor = usedColors[Math.floor(Math.random()*usedColors.length)];

    orbs = [];
    const cols = Math.ceil(Math.sqrt(count));
    const rows = Math.ceil(count/cols);
    const cellW = W/cols, cellH = (H*0.6)/rows;
    const offsetY = H*0.32;
    let idx = 0;
    for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
      if (idx >= count) break;
      const jitterX = (Math.random()-0.5)*cellW*0.3;
      const jitterY = (Math.random()-0.5)*cellH*0.3;
      orbs.push({
        x: c*cellW + cellW/2 + jitterX,
        y: offsetY + r*cellH + cellH/2 + jitterY,
        r: 24, color: usedColors[idx], hit: false
      });
      idx++;
    }

    const duration = timeForLevel(level);
    roundDeadline = performance.now() + duration;
    clearTimeout(roundTimer);
    roundTimer = setTimeout(() => { if (running) handleTimeout(); }, duration);
  }

  function handleTimeout() {
    loseLife();
    if (running) setupRound();
  }

  function loseLife() {
    lives--;
    livesEl.textContent = lives;
    flashFail();
    if (lives <= 0) return endGame();
  }

  function flashFail() {
    canvas.style.boxShadow = '0 0 0 6px rgba(255,80,80,0.6)';
    setTimeout(() => { canvas.style.boxShadow = 'none'; }, 200);
  }
  function flashSuccess() {
    canvas.style.boxShadow = '0 0 0 6px rgba(80,255,150,0.6)';
    setTimeout(() => { canvas.style.boxShadow = 'none'; }, 150);
  }

  function handleClick(evt) {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const x = (evt.clientX-rect.left)*scaleX, y = (evt.clientY-rect.top)*scaleY;
    for (const o of orbs) {
      const d = Math.hypot(x-o.x, y-o.y);
      if (d <= o.r) {
        if (o.color === targetColor) {
          const timeBonus = Math.max(0, Math.round((roundDeadline - performance.now())/30));
          score += 10 + timeBonus + level*2;
          scoreEl.textContent = score;
          flashSuccess();
          clearTimeout(roundTimer);
          level++;
          levelEl.textContent = level;
          setupRound();
        } else {
          loseLife();
        }
        return;
      }
    }
  }

  function drawCountdownRing(progress) {
    ctx.save();
    ctx.translate(W/2, H*0.13);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle = progress > 0.3 ? '#00cec9' : '#ff6b6b';
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(0,0,30,-Math.PI/2, -Math.PI/2 + progress*Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  function drawScene() {
    const theme = currentLabTheme();
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, theme.bg1); g.addColorStop(1, theme.bg2);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = theme.grid; ctx.lineWidth=1;
    for (let i=0;i<W;i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }

    if (targetColor) {
      ctx.save();
      ctx.shadowBlur=20; ctx.shadowColor=targetColor;
      ctx.fillStyle = targetColor;
      ctx.beginPath(); ctx.arc(W/2, H*0.13, 22, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      const remaining = Math.max(0, (roundDeadline - performance.now()) / timeForLevel(level));
      drawCountdownRing(remaining);
    }

    orbs.forEach(o => {
      ctx.save();
      ctx.shadowBlur=10; ctx.shadowColor=o.color;
      const grad = ctx.createRadialGradient(o.x-6,o.y-6,2,o.x,o.y,o.r);
      grad.addColorStop(0,'#fff'); grad.addColorStop(0.3,o.color); grad.addColorStop(1,o.color);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function render() {
    drawScene();
    rafId = requestAnimationFrame(render);
  }

  function endGame() {
    running = false;
    clearTimeout(roundTimer);
    const earned = convertScoreToCoins('colormatch', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '配色失敗！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣<br>到達關卡：${level}`;
    startBtn.textContent = '重新開始';
  }

  function start() {
    score = 0; level = 1; lives = 3;
    scoreEl.textContent = 0; levelEl.textContent = 1; livesEl.textContent = 3;
    running = true;
    overlay.style.display = 'none';
    setupRound();
  }

  canvas.addEventListener('click', handleClick);
  startBtn.addEventListener('click', start);

  render();

  window.__colormatchCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    clearTimeout(roundTimer);
    canvas.removeEventListener('click', handleClick);
  };
}



// ===== game-memory.js =====
// ============================================================
// MEMORY GAME — 星空記憶術 (Starlight Memory Spell)
// Simon-says style: watch a sequence of glowing stars light up,
// then repeat it. Sequence grows by one each successful round.
// ============================================================

function mountMemoryGame(container, gameDef) {
  container.innerHTML = `
    <div id="memRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#1a1245,#2d1f6b);position:relative;overflow:hidden;">
      <div id="memHUD" style="position:absolute;top:64px;display:flex;gap:22px;align-items:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="memScore" style="color:#a29bfe;">0</strong></span>
        <span>關卡 <strong id="memLevel" style="color:#ffc857;">1</strong></span>
        <span>序列長度 <strong id="memSeqLen" style="color:#ff6fa5;">3</strong></span>
      </div>
      <canvas id="memCanvas" width="360" height="420" style="border-radius:16px;box-shadow:0 12px 30px rgba(20,10,50,0.5);background:#1f1654;margin-top:36px;max-height:60vh;"></canvas>
      <div id="memStatusMsg" style="position:absolute;bottom:16px;color:rgba(255,255,255,0.7);font-size:13px;letter-spacing:1px;font-weight:700;">準備開始...</div>
      <div id="memOverlay" style="display:flex;position:absolute;inset:0;background:rgba(10,5,30,0.7);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">✨</div>
        <h2 id="memOverlayTitle" style="font-size:26px;letter-spacing:3px;">星空記憶術</h2>
        <p id="memOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">記住星星發光的順序<br>按照相同順序點擊重現<br>每成功一輪，序列會增加一個！</p>
        <button id="memStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #a29bfe;background:rgba(162,155,254,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('memCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('memScore');
  const levelEl = document.getElementById('memLevel');
  const seqLenEl = document.getElementById('memSeqLen');
  const statusMsg = document.getElementById('memStatusMsg');
  const overlay = document.getElementById('memOverlay');
  const overlayTitle = document.getElementById('memOverlayTitle');
  const overlayDesc = document.getElementById('memOverlayDesc');
  const startBtn = document.getElementById('memStartBtn');

  function currentStarColors() {
    const item = getEquipped('memory', 'character');
    return item ? item.colors : ['#ff6fa5','#5ec8e8','#ffc857','#a29bfe'];
  }
  function currentSkyTheme() {
    const item = getEquipped('memory', 'background');
    return item ? item.colors : { bg1: '#1a1245', bg2: '#2d1f6b' };
  }

  let score = 0, level = 1, sequence = [];
  let playerInput = [];
  let stars = []; // 4 fixed star pads
  let running = false, rafId = null;
  let state = 'idle'; // idle | showing | input
  let showIndex = 0, flashUntil = 0, flashingStar = -1;
  let bgStars = [];

  function initBgStars() {
    bgStars = [];
    for (let i=0;i<30;i++) bgStars.push({ x: Math.random()*W, y: Math.random()*H*0.5, r: Math.random()*1.4+0.4, phase: Math.random()*Math.PI*2 });
  }

  function setupStars() {
    const colors = currentStarColors();
    stars = [];
    const positions = [
      { x: W*0.3, y: H*0.65 }, { x: W*0.7, y: H*0.65 },
      { x: W*0.3, y: H*0.85 }, { x: W*0.7, y: H*0.85 }
    ];
    for (let i=0;i<4;i++) stars.push({ ...positions[i], r: 36, color: colors[i % colors.length], id: i });
  }

  function seqLengthForLevel(lvl) { return Math.min(2 + lvl, 16); }

  function startSequence() {
    sequence = [];
    const len = seqLengthForLevel(level);
    for (let i=0;i<len;i++) sequence.push(Math.floor(Math.random()*4));
    seqLenEl.textContent = len;
    playerInput = [];
    state = 'showing';
    showIndex = 0;
    statusMsg.textContent = '仔細看...';
    setTimeout(() => showNextInSequence(), 600);
  }

  function showNextInSequence() {
    if (!running) return;
    if (showIndex >= sequence.length) {
      state = 'input';
      statusMsg.textContent = '輪到你了！依序點擊';
      return;
    }
    flashingStar = sequence[showIndex];
    flashUntil = performance.now() + 480;
    setTimeout(() => {
      flashingStar = -1;
      showIndex++;
      setTimeout(showNextInSequence, 250);
    }, 480);
  }

  function handleStarClick(id) {
    if (state !== 'input' || !running) return;
    flashingStar = id;
    flashUntil = performance.now() + 200;
    setTimeout(() => { if (flashingStar === id) flashingStar = -1; }, 200);

    playerInput.push(id);
    const idx = playerInput.length - 1;
    if (sequence[idx] !== id) {
      return failRound();
    }
    if (playerInput.length === sequence.length) {
      succeedRound();
    }
  }

  function succeedRound() {
    score += sequence.length * 8 + level * 5;
    scoreEl.textContent = score;
    level++;
    levelEl.textContent = level;
    statusMsg.textContent = '完美！下一輪...';
    state = 'idle';
    setTimeout(startSequence, 900);
  }

  function failRound() {
    state = 'idle';
    const earned = convertScoreToCoins('memory', score);
    running = false;
    overlay.style.display = 'flex';
    overlayTitle.textContent = '記憶中斷！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣<br>到達關卡：${level}　序列長度：${sequence.length}`;
    startBtn.textContent = '重新開始';
  }

  function drawScene(time) {
    const theme = currentSkyTheme();
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,theme.bg1); g.addColorStop(1,theme.bg2);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

    bgStars.forEach(s => {
      const tw = 0.5 + Math.sin(time*0.002 + s.phase)*0.4;
      ctx.save(); ctx.globalAlpha = Math.max(0.1,tw);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    stars.forEach(s => {
      const isFlashing = flashingStar === s.id;
      ctx.save();
      ctx.translate(s.x, s.y);
      const scale = isFlashing ? 1.15 : 1;
      ctx.scale(scale, scale);
      ctx.save();
      ctx.shadowBlur = isFlashing ? 30 : 12;
      ctx.shadowColor = s.color;
      ctx.globalAlpha = isFlashing ? 1 : 0.55;
      drawStarShape(ctx, 0, 0, s.r, s.color);
      ctx.restore();
      ctx.restore();
    });
  }

  function drawStarShape(ctx, cx, cy, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i=0;i<10;i++) {
      const angle = (Math.PI/5)*i - Math.PI/2;
      const radius = i%2===0 ? r : r*0.45;
      const x = cx + Math.cos(angle)*radius, y = cy + Math.sin(angle)*radius;
      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.fill();
  }

  function render(time) {
    drawScene(time || 0);
    rafId = requestAnimationFrame(render);
  }

  function start() {
    score = 0; level = 1;
    scoreEl.textContent = 0; levelEl.textContent = 1;
    setupStars();
    running = true;
    overlay.style.display = 'none';
    startSequence();
  }

  function onClick(e) {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const x = (e.clientX-rect.left)*scaleX, y = (e.clientY-rect.top)*scaleY;
    for (const s of stars) {
      if (Math.hypot(x-s.x,y-s.y) <= s.r) { handleStarClick(s.id); return; }
    }
  }

  canvas.addEventListener('click', onClick);
  startBtn.addEventListener('click', start);

  setupStars();
  initBgStars();
  render();

  window.__memoryCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    canvas.removeEventListener('click', onClick);
  };
}



// ===== game-amphibian.js =====
// ============================================================
// AMPHIBIAN JUMP GAME — 精靈雙棲記 (Sprite's Land & Water Leap)
// Endless runner: tap to jump over obstacles. On water, the sprite
// moves faster (auto-swim) but on land, items can be collected.
// Survive as long as possible; speed increases over time.
// ============================================================

function mountAmphibianGame(container, gameDef) {
  container.innerHTML = `
    <div id="amRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#d4f5d4,#a8e8a0);position:relative;overflow:hidden;">
      <div id="amHUD" style="position:absolute;top:64px;display:flex;gap:18px;align-items:center;color:#1a4a20;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="amScore" style="color:#55a630;">0</strong></span>
        <span>道具 <strong id="amItems" style="color:#0984e3;">0</strong></span>
        <span>速度 <strong id="amSpeed" style="color:#ff7a3a;">1.0x</strong></span>
        <span style="display:flex;align-items:center;gap:5px;">
          HP
          <span style="width:90px;height:12px;background:rgba(0,0,0,0.15);border:1px solid #2a6a3a;border-radius:6px;overflow:hidden;display:inline-block;">
            <span id="amHpFill" style="display:block;height:100%;width:100%;background:linear-gradient(90deg,#7ee8a0,#4fcf78);transition:width 0.15s;"></span>
          </span>
          <strong id="amHpText" style="color:#2a6a3a;">100</strong>
        </span>
      </div>
      <canvas id="amCanvas" width="480" height="320" style="border-radius:16px;box-shadow:0 12px 30px rgba(40,90,30,0.25);background:#bfe8c8;margin-top:36px;max-width:92vw;"></canvas>
      <div style="position:absolute;bottom:16px;color:#1a4a20;font-size:12px;letter-spacing:1px;">點擊/空白鍵：短按跳低、長按跳高 ・ 陸地可收集道具與補血</div>
      <div id="amOverlay" style="display:flex;position:absolute;inset:0;background:rgba(20,60,20,0.5);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🐸</div>
        <h2 id="amOverlayTitle" style="font-size:26px;letter-spacing:3px;">精靈雙棲記</h2>
        <p id="amOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">按住時間決定跳躍高度，越過障礙物<br>撞到障礙物會扣血，收集 ❤️ 補血珠回血<br>陸地上還可以收集金幣道具！</p>
        <button id="amStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #55a630;background:rgba(85,166,48,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('amCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = H * 0.78;
  const scoreEl = document.getElementById('amScore');
  const itemsEl = document.getElementById('amItems');
  const speedEl = document.getElementById('amSpeed');
  const hpFillEl = document.getElementById('amHpFill');
  const hpTextEl = document.getElementById('amHpText');
  const overlay = document.getElementById('amOverlay');
  const overlayTitle = document.getElementById('amOverlayTitle');
  const overlayDesc = document.getElementById('amOverlayDesc');
  const startBtn = document.getElementById('amStartBtn');

  function currentSpriteSkin() {
    const item = getEquipped('amphibian', 'character');
    return item ? item.colors : { body: '#7ed957', belly: '#fff', eye: '#2b2440' };
  }
  function currentForestTheme() {
    const item = getEquipped('amphibian', 'background');
    return item ? item.colors : { sky1: '#d4f5d4', sky2: '#a8e8a0', land: '#7ecb6f', water: '#5fb8c9' };
  }

  let score = 0, itemsCollected = 0, speedMult = 1;
  let running = false, rafId = null;
  let player, segments, obstacles, items, particles;
  let distanceTraveled = 0, frame = 0;
  const MAX_HP = 100;
  let hp = MAX_HP;
  let invincibleUntil = 0; // ms timestamp
  let jumpHoldStart = 0, isHolding = false;
  const SAFE_START_DISTANCE = 420; // no obstacles spawned before this world-x

  const MIN_JUMP_VY = -6.4;   // initial impulse on jump press (tap = short hop)
  const MAX_HOLD_MS = 380;    // max time holding extends the jump (reduced-gravity window)

  function currentMaxHpDamage() { return 28; } // damage per hit
  function currentHeal() { return 35; }

  function createPlayer() { return { x: 90, y: GROUND_Y, vy: 0, w: 30, h: 26, onGround: true, jumpCount: 0 }; }

  const MIN_OBSTACLE_GAP = 230; // minimum world-space distance between obstacles
  let lastObstacleX = -9999;

  function generateTerrain() {
    segments = [];
    let x = 0;
    while (x < W * 4) {
      const isWater = Math.random() < 0.35;
      const len = isWater ? (120 + Math.random()*100) : (160 + Math.random()*140);
      segments.push({ x, len, type: isWater ? 'water' : 'land' });
      x += len;
    }
  }

  function segmentAt(x) {
    for (const s of segments) if (x >= s.x && x < s.x + s.len) return s;
    return segments[segments.length-1];
  }

  function tryPlaceObstacle(x, w, h, type) {
    if (x < SAFE_START_DISTANCE) return false;
    if (x - lastObstacleX < MIN_OBSTACLE_GAP) return false;
    obstacles.push({ x, w, h, type });
    lastObstacleX = x;
    return true;
  }

  function spawnObstaclesAndItems() {
    obstacles = []; items = []; lastObstacleX = -9999;
    segments.forEach(s => {
      if (s.type === 'land') {
        // try to place a single obstacle roughly centered, respecting gap & safe zone
        const ox = s.x + 40 + Math.random()*(Math.max(20,s.len-80));
        tryPlaceObstacle(ox, 18, 24, 'rock');
        // items: coin or occasional heal, only after safe zone
        if (s.x > SAFE_START_DISTANCE * 0.5 && Math.random() < 0.7) {
          const ix = s.x + s.len/2 + (Math.random()-0.5)*40;
          const isHeal = Math.random() < 0.4;
          items.push({ x: ix, taken: false, y: GROUND_Y - 50, type: isHeal ? 'heal' : 'coin' });
        }
      } else {
        // occasional log obstacle floating on water
        if (Math.random() < 0.4) {
          const ox = s.x + s.len/2;
          tryPlaceObstacle(ox, 26, 16, 'log');
        }
      }
    });
  }

  function reset() {
    score = 0; itemsCollected = 0; speedMult = 1; distanceTraveled = 0; frame = 0;
    hp = MAX_HP; invincibleUntil = 0; isHolding = false;
    scoreEl.textContent = 0; itemsEl.textContent = 0; speedEl.textContent = '1.0x';
    updateHpBar();
    player = createPlayer();
    generateTerrain();
    spawnObstaclesAndItems();
    particles = [];
  }

  function updateHpBar() {
    const pct = Math.max(0, hp/MAX_HP*100);
    hpFillEl.style.width = pct + '%';
    if (pct > 60) hpFillEl.style.background = 'linear-gradient(90deg,#7ee8a0,#4fcf78)';
    else if (pct > 30) hpFillEl.style.background = 'linear-gradient(90deg,#ffcc66,#ff8800)';
    else hpFillEl.style.background = 'linear-gradient(90deg,#ff5555,#cc0000)';
    hpTextEl.textContent = Math.max(0, Math.ceil(hp));
  }

  function startJump() {
    if (!running) return;
    if (player.onGround) {
      player.vy = MIN_JUMP_VY;
      player.onGround = false;
      isHolding = true;
      jumpHoldStart = performance.now();
    }
  }
  function endJump() {
    isHolding = false;
  }

  const GRAVITY = 0.55;
  const HOLD_GRAVITY = 0.22;

  function baseSpeed() { return 3.2 * speedMult; }

  function update() {
    if (!running) return;
    frame++;
    // gradually increase speed over time
    speedMult = 1 + Math.min(1.2, distanceTraveled / 6000);
    speedEl.textContent = speedMult.toFixed(1) + 'x';

    const seg = segmentAt(player.x + distanceTraveled);
    const onWater = seg.type === 'water';
    const speed = baseSpeed();
    distanceTraveled += speed;
    score = Math.floor(distanceTraveled / 10);
    scoreEl.textContent = score;

    // gravity & jump — variable height: reduced gravity while held & still rising
    const holdElapsed = performance.now() - jumpHoldStart;
    const useHoldGravity = isHolding && player.vy < 0 && holdElapsed < MAX_HOLD_MS;
    player.vy += useHoldGravity ? HOLD_GRAVITY : GRAVITY;
    player.y += player.vy;
    const groundLevel = onWater ? GROUND_Y - 4 : GROUND_Y;
    if (player.y >= groundLevel) {
      player.y = groundLevel;
      player.vy = 0;
      player.onGround = true;
      isHolding = false;
    }

    // collisions (HP-based, not instant death)
    const worldX = player.x + distanceTraveled;
    const isInvincible = performance.now() < invincibleUntil;
    if (!isInvincible) {
      obstacles.forEach(ob => {
        if (ob.hit) return;
        const obScreenDist = ob.x - worldX;
        if (Math.abs(obScreenDist) < (ob.w/2 + player.w/2 - 6)) {
          const playerBottom = player.y;
          const obstacleTop = GROUND_Y - ob.h;
          if (playerBottom > obstacleTop + 4) {
            ob.hit = true;
            takeDamage();
          }
        }
      });
    }

    items.forEach(it => {
      if (it.taken) return;
      const dist = it.x - worldX;
      if (Math.abs(dist) < 22 && Math.abs(player.y - it.y) < 40) {
        it.taken = true;
        if (it.type === 'heal') {
          hp = Math.min(MAX_HP, hp + currentHeal());
          updateHpBar();
          spawnSparkle(player.x, player.y - 20, '#ff6fa5');
        } else {
          itemsCollected++;
          itemsEl.textContent = itemsCollected;
          score += 15;
          spawnSparkle(player.x, player.y - 20, '#ffe066');
        }
      }
    });

    updateParticles();

    // extend terrain if running low
    const lastSeg = segments[segments.length-1];
    if (lastSeg.x + lastSeg.len - distanceTraveled < W*2) {
      extendTerrain();
    }
  }

  function takeDamage() {
    hp -= currentMaxHpDamage();
    updateHpBar();
    invincibleUntil = performance.now() + 1100;
    spawnSparkle(player.x, player.y - 15, '#ff5555');
    if (hp <= 0) {
      hp = 0; updateHpBar();
      triggerCrash();
    }
  }

  function extendTerrain() {
    let x = segments[segments.length-1].x + segments[segments.length-1].len;
    for (let i=0;i<5;i++) {
      const isWater = Math.random() < 0.35;
      const len = isWater ? (120+Math.random()*100) : (160+Math.random()*140);
      segments.push({ x, len, type: isWater?'water':'land' });
      if (isWater) {
        if (Math.random()<0.4) tryPlaceObstacle(x+len/2, 26, 16, 'log');
      } else {
        const ox = x+40+Math.random()*(Math.max(20,len-80));
