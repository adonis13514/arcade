<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夢境遊樂場 ・ Dream Arcade</title>
<style>
  :root {
    --ink: #2b2440;
    --paper: #fdf6ec;
    --accent-pink: #ff6fa5;
    --accent-blue: #5ec8e8;
    --accent-purple: #8b6fd4;
    --accent-gold: #ffc857;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--ink);
    font-family:-apple-system,'Hiragino Sans','Noto Sans TC',sans-serif; }
  #app { width:100%; height:100%; position:relative; }

  /* ============ LOGIN SCREEN ============ */
  #loginScreen {
    width:100%; height:100%;
    background:radial-gradient(ellipse at 30% 0%,#4a3d6e 0%,#2b2440 45%,#1a1530 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:absolute; inset:0; z-index:100;
    overflow-y:auto; padding:20px;
  }
  #loginScreen::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(2px 2px at 20% 30%,white,transparent),
      radial-gradient(2px 2px at 60% 70%,white,transparent),
      radial-gradient(1px 1px at 80% 20%,white,transparent),
      radial-gradient(1.5px 1.5px at 40% 85%,white,transparent),
      radial-gradient(1px 1px at 90% 60%,white,transparent),
      radial-gradient(1.5px 1.5px at 10% 65%,white,transparent);
    opacity:0.4;
  }
  .login-box {
    position:relative; z-index:1;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:24px;
    padding:36px 32px;
    width:100%; max-width:420px;
    backdrop-filter:blur(10px);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .login-title { color:#fff; font-size:28px; font-weight:900; letter-spacing:3px; text-align:center; margin-bottom:4px; }
  .login-title span { color:var(--accent-gold); }
  .login-sub { color:rgba(255,255,255,0.5); font-size:13px; text-align:center; margin-bottom:28px; }

  .account-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .account-item {
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px; padding:12px 14px;
    cursor:pointer; transition:all 0.15s;
  }
  .account-item:hover { background:rgba(255,255,255,0.13); border-color:var(--accent-gold); }
  .account-item.selected { border-color:var(--accent-gold); background:rgba(255,200,87,0.12); }
  .account-avatar {
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
    background:rgba(255,255,255,0.1);
  }
  .account-info { flex:1; min-width:0; }
  .account-name { color:#fff; font-weight:800; font-size:15px; }
  .account-stats { color:rgba(255,255,255,0.45); font-size:11px; margin-top:2px; }
  .account-delete {
    background:none; border:none; color:rgba(255,100,100,0.5);
    font-size:16px; cursor:pointer; padding:4px; line-height:1;
    border-radius:6px; transition:color 0.15s;
  }
  .account-delete:hover { color:#ff6060; }

  .login-divider { display:flex; align-items:center; gap:10px; margin:18px 0; }
  .login-divider::before, .login-divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.12); }
  .login-divider span { color:rgba(255,255,255,0.35); font-size:12px; white-space:nowrap; }

  .new-account-form { display:flex; gap:8px; }
  .new-account-form input {
    flex:1; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
    border-radius:12px; padding:10px 14px; color:#fff; font-size:14px; outline:none;
    transition:border-color 0.15s;
  }
  .new-account-form input::placeholder { color:rgba(255,255,255,0.3); }
  .new-account-form input:focus { border-color:var(--accent-blue); }
  .btn-create {
    padding:10px 18px; border-radius:12px; border:none;
    background:var(--accent-purple); color:#fff; font-weight:800; font-size:13px;
    cursor:pointer; white-space:nowrap; transition:opacity 0.15s;
  }
  .btn-create:hover { opacity:0.85; }
  .btn-login {
    width:100%; margin-top:20px; padding:13px;
    border-radius:14px; border:none;
    background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));
    color:#fff; font-weight:900; font-size:16px; letter-spacing:2px;
    cursor:pointer; transition:opacity 0.15s;
  }
  .btn-login:hover { opacity:0.9; }
  .btn-login:disabled { opacity:0.35; cursor:default; }
  .login-error { color:#ff8080; font-size:12px; text-align:center; margin-top:8px; min-height:18px; }

  /* emoji avatar selector */
  .avatar-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .avatar-opt {
    width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-size:18px; cursor:pointer;
    background:rgba(255,255,255,0.08); border:2px solid transparent;
    transition:all 0.12s;
  }
  .avatar-opt.selected { border-color:var(--accent-gold); background:rgba(255,200,87,0.15); }

  /* ============ HUB SCREEN ============ */
  #hub {
    width:100%; height:100%;
    background:radial-gradient(ellipse at 30% 0%,#4a3d6e 0%,#2b2440 45%,#1a1530 100%);
    overflow-y:auto; -webkit-overflow-scrolling:touch; position:relative;
    display:none;
  }
  #hub::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(2px 2px at 20% 30%,white,transparent),
      radial-gradient(2px 2px at 60% 70%,white,transparent),
      radial-gradient(1px 1px at 80% 20%,white,transparent),
      radial-gradient(1.5px 1.5px at 40% 85%,white,transparent),
      radial-gradient(1px 1px at 90% 60%,white,transparent),
      radial-gradient(1.5px 1.5px at 10% 65%,white,transparent);
    opacity:0.5; z-index:0;
  }
  .hub-inner { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:40px 24px 60px; }
  .hub-hero { position:relative; margin-bottom:36px; }
  .eyebrow { display:block; color:rgba(255,255,255,0.45); font-size:11px; letter-spacing:4px; text-transform:uppercase; margin-bottom:10px; }
  .hub-hero h1 { font-size:clamp(32px,6vw,54px); font-weight:900; color:#fff; letter-spacing:4px; line-height:1.1; margin-bottom:8px; }
  .accent-text { color:var(--accent-gold); }
  .hub-hero p { color:rgba(255,255,255,0.55); font-size:14px; letter-spacing:1px; }

  /* top bar with wallet + user */
  .hub-topbar {
    position:absolute; top:0; right:24px;
    display:flex; align-items:center; gap:10px;
  }
  #walletBadge {
    background:rgba(255,255,255,0.12); border:1px solid rgba(255,200,87,0.4);
    border-radius:20px; padding:8px 16px; color:var(--accent-gold);
    font-weight:800; font-size:14px; letter-spacing:1px; backdrop-filter:blur(6px);
  }
  #userBadge {
    background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
    border-radius:20px; padding:6px 14px; color:#fff;
    font-weight:700; font-size:13px; letter-spacing:1px; backdrop-filter:blur(6px);
    cursor:pointer; display:flex; align-items:center; gap:6px;
    transition:background 0.15s;
  }
  #userBadge:hover { background:rgba(255,255,255,0.16); }

  .game-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:18px;
  }
  .game-card {
    border-radius:16px; overflow:hidden; cursor:pointer;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
    position:relative;
  }
  .game-card:hover {
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 20px 40px rgba(0,0,0,0.35);
    border-color:rgba(255,255,255,0.25);
  }
  .game-card canvas { width:100%; height:auto; display:block; }
  .card-label { padding:12px 14px; }
  .card-tag { display:inline-block; padding:3px 10px; border-radius:30px; font-size:10px; font-weight:800; letter-spacing:1px; color:#fff; margin-bottom:6px; }
  .game-card h3 { color:#fff; font-size:16px; font-weight:800; letter-spacing:1px; }
  .card-desc { color:rgba(255,255,255,0.5); font-size:11px; letter-spacing:0.5px; margin-top:3px; }
  .card-hs { font-size:11px; color:rgba(255,255,255,0.45); margin-top:3px; }
  .play-badge {
    position:absolute; top:10px; right:10px;
    background:rgba(0,0,0,0.5); color:#fff;
    font-size:11px; font-weight:700; padding:4px 10px;
    border-radius:20px; opacity:0; transition:opacity 0.2s;
    backdrop-filter:blur(4px); letter-spacing:1px;
  }
  .game-card:hover .play-badge { opacity:1; }

  /* ============ GAME SCREEN ============ */
  #gameScreen {
    width:100%; height:100%; position:absolute; inset:0;
    display:none; flex-direction:column;
    background:#1a1530;
  }
  #gameScreen.active { display:flex; }
  #gameTopBar {
    height:54px; flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 18px;
    background:rgba(0,0,0,0.35); backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(255,255,255,0.08); z-index:10;
  }
  #backBtn {
    background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
    color:#fff; padding:7px 16px; border-radius:30px;
    font-size:13px; font-weight:700; letter-spacing:1px; cursor:pointer;
    transition:background 0.15s;
  }
  #backBtn:hover { background:rgba(255,255,255,0.18); }
  #gameTitleBar { color:#fff; font-weight:800; font-size:15px; letter-spacing:2px; text-shadow:0 2px 8px rgba(0,0,0,0.5); opacity:0.9; }
  .game-container { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }

  #hub::-webkit-scrollbar { width:8px; }
  #hub::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:4px; }

  @media (max-width:480px) {
    .game-grid { grid-template-columns:repeat(2,1fr); gap:14px; }
    .game-card canvas { height:110px; }
    .game-card h3 { font-size:14px; }
    .card-desc { font-size:10px; }
    .login-box { padding:28px 20px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-title">夢境<span>遊樂場</span></div>
      <div class="login-sub">選擇你的冒險者，或創建新帳號 ✦</div>

      <div class="account-list" id="accountList">
        <!-- dynamically populated -->
      </div>

      <div class="login-divider"><span>或建立新帳號</span></div>

      <div id="newAccountSection">
        <div class="new-account-form">
          <input type="text" id="newNameInput" placeholder="輸入你的冒險者名稱" maxlength="12">
          <button class="btn-create" id="createAccountBtn">建立</button>
        </div>
        <div class="avatar-row" id="avatarRow"></div>
      </div>

      <div class="login-error" id="loginError"></div>
      <button class="btn-login" id="loginBtn" disabled>▶ 進入遊樂場</button>
    </div>
  </div>

  <!-- ============ HUB ============ -->
  <div id="hub">
    <div class="hub-inner">
      <div class="hub-hero">
        <div class="hub-topbar">
          <div id="walletBadge"></div>
          <div id="userBadge" title="點擊切換帳號">
            <span id="userAvatarDisplay">🎮</span>
            <span id="userNameDisplay">玩家</span>
          </div>
        </div>
        <span class="eyebrow">33 WORLDS・1 ARCADE</span>
        <h1>夢境<span class="accent-text">遊樂場</span></h1>
        <p>選一個世界，開始你的冒險 ✦ 點擊卡片即可進入</p>
      </div>
      <div class="game-grid" id="gameGrid"></div>
    </div>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="gameScreen">
    <div id="gameTopBar">
      <button id="backBtn">← 返回大廳</button>
      <div id="gameTitleBar"></div>
      <button id="shopOpenBtn" style="background:rgba(255,200,87,0.2);border:1.5px solid rgba(255,200,87,0.5);color:#ffc857;font-size:13px;font-weight:700;letter-spacing:1px;padding:8px 16px;border-radius:30px;cursor:pointer;backdrop-filter:blur(6px);display:none;">🛍️ 商店</button>
    </div>
    <div class="game-container" id="gameContainer"></div>
  </div>

</div>

<script>

// ===== games-registry.js =====
// ============================================================
// GAMES REGISTRY
// Each game: { id, title, desc, tag, tagColor, drawThumbnail(ctx,w,h), mount(container), unmount() }
// drawThumbnail draws an original hand-illustrated anime-style scene as a static preview.
// ============================================================

const GAMES = [];

// ---------- Shared illustration helpers ----------
function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function skyGradient(ctx, w, h, topColor, bottomColor) {
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, topColor);
  g.addColorStop(1, bottomColor);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
}

// Simple chibi-style face — reusable across thumbnails
function drawChibiFace(ctx, x, y, scale, opts) {
  opts = opts || {};
  const skin = opts.skin || '#ffe0c2';
  const hair = opts.hair || '#3a2e4a';
  const blush = opts.blush !== false;
  const eyeColor = opts.eyeColor || '#3a2e4a';
  const expr = opts.expr || 'happy'; // happy | focused | surprised
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // head
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.ellipse(0, 0, 22, 24, 0, 0, Math.PI * 2); ctx.fill();

  // hair back
  ctx.fillStyle = hair;
  ctx.beginPath();
  ctx.moveTo(-22, -4);
  ctx.quadraticCurveTo(-26, -28, 0, -30);
  ctx.quadraticCurveTo(26, -28, 22, -4);
  ctx.quadraticCurveTo(20, -14, 0, -16);
  ctx.quadraticCurveTo(-20, -14, -22, -4);
  ctx.closePath(); ctx.fill();

  // eyes
  ctx.fillStyle = '#fff';
  if (expr === 'surprised') {
    ctx.beginPath(); ctx.ellipse(-8, 2, 5, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(8, 2, 5, 6, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(-8, 2, 4.5, 5.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(8, 2, 4.5, 5.5, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = eyeColor;
  ctx.beginPath(); ctx.ellipse(-8, 3, 2.6, 3.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8, 3, 2.6, 3.4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-9.5, 1, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6.5, 1, 1, 0, Math.PI*2); ctx.fill();

  // blush
  if (blush) {
    ctx.fillStyle = 'rgba(255,140,160,0.45)';
    ctx.beginPath(); ctx.ellipse(-14, 11, 4, 2.4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(14, 11, 4, 2.4, 0, 0, Math.PI*2); ctx.fill();
  }

  // mouth
  ctx.strokeStyle = '#a05050';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  if (expr === 'happy') ctx.arc(0, 10, 4, 0.15 * Math.PI, 0.85 * Math.PI);
  else if (expr === 'surprised') ctx.ellipse(0, 13, 2.5, 3, 0, 0, Math.PI*2);
  else ctx.moveTo(-3, 12), ctx.lineTo(3, 12);
  ctx.stroke();

  // hair front bangs
  ctx.fillStyle = hair;
  ctx.beginPath();
  ctx.moveTo(-20, -6);
  ctx.quadraticCurveTo(-14, -22, -2, -20);
  ctx.quadraticCurveTo(2, -24, 10, -18);
  ctx.quadraticCurveTo(18, -20, 20, -6);
  ctx.quadraticCurveTo(10, -16, 0, -14);
  ctx.quadraticCurveTo(-10, -16, -20, -6);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

function drawSparkle(ctx, x, y, size, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color || '#fff7c2';
  ctx.beginPath();
  ctx.moveTo(0, -size); ctx.quadraticCurveTo(size*0.2, -size*0.2, size, 0);
  ctx.quadraticCurveTo(size*0.2, size*0.2, 0, size);
  ctx.quadraticCurveTo(-size*0.2, size*0.2, -size, 0);
  ctx.quadraticCurveTo(-size*0.2, -size*0.2, 0, -size);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ============================================================
// Placeholder mount for games not yet implemented
// ============================================================
function comingSoonMount(container, title, themeColor) {
  container.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#fff;text-align:center;padding:20px;">
      <div style="font-size:64px;margin-bottom:16px;">🚧</div>
      <h2 style="font-size:24px;margin-bottom:8px;letter-spacing:2px;">${title}</h2>
      <p style="opacity:0.7;font-size:14px;letter-spacing:1px;">這個世界正在建造中，敬請期待 ✦</p>
    </div>
  `;
}

// ============================================================
// GAME 1 — 貪食蛇 (Snake) — 和風庭園主題
// ============================================================
GAMES.push({
  id: 'snake',
  title: '庭園靈蛇',
  desc: '和風庭園 ・ 貪食蛇',
  tag: '經典',
  tagColor: '#5a9b6e',
  drawThumbnail(ctx, w, h) {
    skyGradient(ctx, w, h, '#ffe9d6', '#ffd9b8');
    // distant hills
    ctx.fillStyle = '#cfe8d0';
    ctx.beginPath(); ctx.ellipse(w*0.2, h*0.7, 90, 50, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#b8dcc0';
    ctx.beginPath(); ctx.ellipse(w*0.75, h*0.75, 110, 55, 0, 0, Math.PI*2); ctx.fill();
    // pond
    ctx.fillStyle = '#bfe3e0';
    roundRectPath(ctx, w*0.1, h*0.55, w*0.8, h*0.4, 30);
    ctx.fill();
    // torii gate
    ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 7; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w*0.78, h*0.2); ctx.lineTo(w*0.78, h*0.5);
    ctx.moveTo(w*0.92, h*0.2); ctx.lineTo(w*0.92, h*0.5);
    ctx.moveTo(w*0.74, h*0.22); ctx.lineTo(w*0.96, h*0.22);
    ctx.moveTo(w*0.76, h*0.28); ctx.lineTo(w*0.94, h*0.28);
    ctx.stroke();
    // snake body (cute koi-snake hybrid, segmented)
    const segs = [[60,150],[78,138],[98,130],[120,128],[140,135],[155,148]];
    ctx.lineWidth = 0;
    for (let i = segs.length - 1; i >= 0; i--) {
      const [sx, sy] = segs[i];
      const grad = ctx.createRadialGradient(sx, sy, 2, sx, sy, 18);
      grad.addColorStop(0, '#7ec88a');
      grad.addColorStop(1, '#4f9d62');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(sx, sy, 15 - i*0.7, 0, Math.PI*2); ctx.fill();
      // scale pattern
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(sx, sy, 8 - i*0.4, 0, Math.PI); ctx.stroke();
    }
    // head with chibi face
    const [hx, hy] = segs[0];
    ctx.fillStyle = '#7ec88a';
    ctx.beginPath(); ctx.ellipse(hx, hy, 19, 17, 0, 0, Math.PI*2); ctx.fill();
    // little horns (ryuu style)
    ctx.fillStyle = '#e8c468';
    ctx.beginPath(); ctx.moveTo(hx-10,hy-12); ctx.lineTo(hx-14,hy-22); ctx.lineTo(hx-6,hy-14); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(hx+10,hy-12); ctx.lineTo(hx+14,hy-22); ctx.lineTo(hx+6,hy-14); ctx.closePath(); ctx.fill();
    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(hx-6, hy-2, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx+6, hy-2, 4, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(hx-6, hy-1, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+6, hy-1, 2, 0, Math.PI*2); ctx.fill();
    // tongue

// ===== shop-system.js =====
// ============================================================
// CURRENCY & SHOP SYSTEM
// Global in-memory wallet shared across all games.
// Score earned in any game converts to coins (rate defined per game).
// Each game can define its own shop items (skins/backgrounds) which are
// purchased with the shared coin balance and applied to that game's visuals.
// ============================================================

// ============================================================
// CURRENCY & SHOP SYSTEM
// Global wallet shared across all games, per-account persisted.
// ============================================================

// ---- Multi-Account Persistence ----
const ACCOUNTS_KEY = 'arcade_accounts_v1';   // list of account meta
const ACCOUNT_DATA_PREFIX = 'arcade_acct_';   // + accountId = full save

window.__currentAccountId = null;

async function loadAccountList() {
  try {
    const r = await window.storage.get(ACCOUNTS_KEY);
    if (r && r.value) return JSON.parse(r.value);
  } catch(e) {}
  return [];
}
async function saveAccountList(list) {
  try { await window.storage.set(ACCOUNTS_KEY, JSON.stringify(list)); } catch(e) {}
}
async function loadAccountData(id) {
  try {
    const r = await window.storage.get(ACCOUNT_DATA_PREFIX + id);
    if (r && r.value) return JSON.parse(r.value);
  } catch(e) {}
  return null;
}
async function saveAccountData(id, data) {
  try { await window.storage.set(ACCOUNT_DATA_PREFIX + id, JSON.stringify(data)); } catch(e) {}
}
async function deleteAccountData(id) {
  try { await window.storage.delete(ACCOUNT_DATA_PREFIX + id); } catch(e) {}
}

let _saveTimeout = null;
function scheduleSave() {
  clearTimeout(_saveTimeout);
  _saveTimeout = setTimeout(flushSave, 800);
}
async function flushSave() {
  const id = window.__currentAccountId;
  if (!id) return;
  const data = {
    coins: Wallet.coins,
    shopOwned: ShopItems.filter(i=>i.owned && i.price>0).map(i=>i.id),
    shopEquipped: ShopItems.filter(i=>i.equipped).map(i=>({id:i.id,gameId:i.gameId,kind:i.kind})),
    highScores: window.__arcadeHighScores || {},
    savedAt: Date.now()
  };
  await saveAccountData(id, data);
}

async function applySave(data) {
  if (!data) return;
  if (typeof data.coins === 'number') { Wallet.coins = data.coins; Wallet._notify(); }
  if (Array.isArray(data.shopOwned)) {
    data.shopOwned.forEach(id => { const item=ShopItems.find(i=>i.id===id); if(item) item.owned=true; });
  }
  if (Array.isArray(data.shopEquipped)) {
    ShopItems.forEach(i=>{ if(i.price>0) i.equipped=false; });
    data.shopEquipped.forEach(({id,gameId,kind}) => {
      const item=ShopItems.find(i=>i.id===id&&i.gameId===gameId&&i.kind===kind);
      if(item&&item.owned){ ShopItems.filter(i=>i.gameId===gameId&&i.kind===kind).forEach(i=>i.equipped=false); item.equipped=true; }
    });
  }
  if (data.highScores) window.__arcadeHighScores = {...data.highScores};
}

function resetSave() {
  Wallet.coins=0; Wallet._notify();
  window.__arcadeHighScores={};
  ShopItems.forEach(i=>{ if(i.price>0){ i.owned=false; i.equipped=false; } });
  ShopItems.forEach(i=>{ if(i.price===0){ i.owned=true; i.equipped=true; } });
  if(typeof refreshHighScores==='function') refreshHighScores();
  scheduleSave();
}

// ---- High Score helpers ----
window.__arcadeHighScores = {};
function recordHighScore(gameId, score) {
  const prev = window.__arcadeHighScores[gameId] || 0;
  if (score > prev) { window.__arcadeHighScores[gameId]=score; scheduleSave(); }
  return window.__arcadeHighScores[gameId];
}
function getHighScore(gameId) { return window.__arcadeHighScores[gameId] || 0; }

const Wallet = {
  coins: 0,
  listeners: [],
  add(amount) { this.coins+=amount; this._notify(); scheduleSave(); },
  spend(amount) { if(this.coins<amount)return false; this.coins-=amount; this._notify(); scheduleSave(); return true; },
  onChange(fn) { this.listeners.push(fn); },
  _notify() { this.listeners.forEach(fn=>fn(this.coins)); }
};

const SCORE_TO_COIN_RATE = { snake:0.5, reaction:0.4, maze:0.5, shooter:0.3, default:0.4 };
function convertScoreToCoins(gameId, score) {
  const rate = SCORE_TO_COIN_RATE[gameId] ?? SCORE_TO_COIN_RATE.default;
  const earned = Math.max(0, Math.round(score*rate));
  if(earned>0) Wallet.add(earned);
  recordHighScore(gameId, score);
  return earned;
}

const ShopItems = [];
function getShopItemsForGame(gameId) { return ShopItems.filter(i=>i.gameId===gameId); }
function getEquipped(gameId, kind) { return ShopItems.find(i=>i.gameId===gameId&&i.kind===kind&&i.equipped); }
function equipItem(item) {
  ShopItems.filter(i=>i.gameId===item.gameId&&i.kind===item.kind).forEach(i=>i.equipped=false);
  item.equipped=true; scheduleSave();
}
function purchaseItem(item) {
  if(item.owned) return {ok:false,reason:'already-owned'};
  if(!Wallet.spend(item.price)) return {ok:false,reason:'insufficient-funds'};
  item.owned=true; equipItem(item); return {ok:true};
}
function registerShopItem(def) { ShopItems.push(Object.assign({owned:false,equipped:false},def)); }

function drawSnakePreviewBody(ctx, cx, cy, colors) {
  for (let i = 3; i >= 0; i--) {
    const x = cx + 22 - i*16;
    const grad = ctx.createRadialGradient(x-3,cy-3,2,x,cy,16);
    grad.addColorStop(0, i===0?colors.body1:colors.bodyDark1);
    grad.addColorStop(1, i===0?colors.body2:colors.bodyDark2);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, cy, 15 - i*1.5, 0, Math.PI*2); ctx.fill();
  }
  const hx = cx+22, hy = cy;
  ctx.fillStyle = colors.horn;
  ctx.beginPath(); ctx.moveTo(hx-8,hy-10); ctx.lineTo(hx-11,hy-18); ctx.lineTo(hx-4,hy-11); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(hx+8,hy-10); ctx.lineTo(hx+11,hy-18); ctx.lineTo(hx+4,hy-11); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(hx-5,hy-2,3,3.6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+5,hy-2,3,3.6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2b2440';
  ctx.beginPath(); ctx.arc(hx-5,hy-1,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx+5,hy-1,1.5,0,Math.PI*2); ctx.fill();
}

function drawStarPrev(ctx,cx,cy,r) {
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const angle=(Math.PI/5)*i-Math.PI/2;
    const radius = i%2===0?r:r*0.45;
    const x=cx+Math.cos(angle)*radius, y=cy+Math.sin(angle)*radius;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.fill();
}

function getShopTheme(gameId) { return SHOP_THEME[gameId] || SHOP_THEME.default; }

// ============================================================
// SHOP UI — modal overlay, opened from hub or in-game button
// Themed per-game so the modal feels native to that game's world.
// ============================================================
function openShop(gameId, gameTitle) {
  const existing = document.getElementById('shopModal');
  if (existing) existing.remove();

  const theme = getShopTheme(gameId);

  const modal = document.createElement('div');
  modal.id = 'shopModal';
  modal.style.cssText = `
    position:fixed; inset:0; background:rgba(20,15,35,0.78); z-index:1000;
    display:flex; align-items:center; justify-content:center; padding:20px;
    backdrop-filter: blur(4px);
  `;
  modal.innerHTML = `
    <div style="background:${theme.bg}; border-radius:20px; max-width:480px; width:100%; max-height:80vh; overflow-y:auto; padding:24px; box-shadow:0 20px 50px rgba(0,0,0,0.4);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <h2 style="color:${theme.text}; font-size:20px; letter-spacing:1px;">${gameTitle} 商店</h2>
        <button id="shopCloseBtn" style="background:none;border:none;font-size:22px;cursor:pointer;color:${theme.sub};">✕</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px;color:#ffc857;font-weight:800;margin-bottom:6px;text-shadow:0 0 6px rgba(255,200,87,0.3);">
        💰 <span id="shopCoinDisplay">${Wallet.coins}</span> 金幣
      </div>
      <div style="font-size:11px;color:${theme.sub};margin-bottom:18px;">金幣為所有遊戲共用，在任何遊戲賺到的分數都能在這裡花費</div>
      <div id="shopSectionChar" style="margin-bottom:20px;"></div>
      <div id="shopSectionBg"></div>
    </div>
  `;
  document.body.appendChild(modal);

  function renderSection(containerId, kind, label) {
    const sec = document.getElementById(containerId);
    const items = getShopItemsForGame(gameId).filter(i => i.kind === kind);
    if (items.length === 0) { sec.innerHTML = ''; return; }
    sec.innerHTML = `<h3 style="font-size:13px;color:${theme.sub};letter-spacing:2px;margin-bottom:10px;">${label}</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;" id="${containerId}Grid"></div>`;
    const grid = document.getElementById(containerId + 'Grid');
    items.forEach(item => {
      const card = document.createElement('div');
      card.style.cssText = `
        border-radius:14px; overflow:hidden; background:rgba(128,128,128,0.08); border:2px solid ${item.equipped ? theme.accent : 'rgba(128,128,128,0.25)'};
        display:flex; flex-direction:column; box-shadow:0 4px 10px rgba(0,0,0,0.12);
      `;
      const canvasPrev = document.createElement('canvas');
      canvasPrev.width = 140; canvasPrev.height = 90;
      canvasPrev.style.width = '100%'; canvasPrev.style.height = '80px'; canvasPrev.style.display='block';
      card.appendChild(canvasPrev);
      const pctx = canvasPrev.getContext('2d');
      item.preview(pctx, canvasPrev.width, canvasPrev.height);

      const info = document.createElement('div');
      info.style.cssText = 'padding:8px 10px;display:flex;flex-direction:column;gap:6px;';
      const btnLabel = item.equipped ? '使用中' : item.owned ? '裝備' : `💰 ${item.price}`;
      const btnDisabled = item.equipped;
      info.innerHTML = `
        <div style="font-size:12px;font-weight:700;color:${theme.text};">${item.name}</div>
        <button class="shopItemBtn" style="
          font-size:11px; padding:6px 0; border-radius:8px; border:none; cursor:${btnDisabled?'default':'pointer'};
          background:${item.equipped ? theme.accent : item.owned ? theme.owned : theme.buy};
          color:${item.equipped ? '#fff' : item.owned ? '#fff' : theme.buyText}; font-weight:700; letter-spacing:0.5px;
        " ${btnDisabled?'disabled':''}>${btnLabel}</button>
      `;
      card.appendChild(info);
      grid.appendChild(card);

      const btn = info.querySelector('button');
      btn.addEventListener('click', () => {
        if (item.equipped) return;
        if (item.owned) {
          equipItem(item);
        } else {
          const result = purchaseItem(item);
          if (!result.ok) {
            btn.textContent = '金幣不足！';
            btn.style.background = '#e85a4f';
            btn.style.color = '#fff';
            setTimeout(() => { btn.textContent = `💰 ${item.price}`; btn.style.background = theme.buy; btn.style.color = theme.buyText; }, 900);
            return;
          }
        }
        document.getElementById('shopCoinDisplay').textContent = Wallet.coins;
        renderSection(containerId, kind, label);
      });
    });
  }

  renderSection('shopSectionChar', 'character', '✦ 角色造型');
  renderSection('shopSectionBg', 'background', '✦ 背景主題');

  document.getElementById('shopCloseBtn').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
}

// ===== game-snake.js =====
// ============================================================
// SNAKE GAME — 庭園靈蛇 (Japanese Garden Snake)
// Features: speed-up food (gold), shrink food (purple), normal food (apple/red)
// ============================================================

function mountSnakeGame(container, gameDef) {
  container.innerHTML = `
    <div id="snakeRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff0dc,#ffe0bd);position:relative;">
      <div id="snakeHUD" style="position:absolute;top:64px;display:flex;gap:24px;color:#5a4a3a;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="snakeScore" style="color:#c0392b;">0</strong></span>
        <span>最高 <strong id="snakeBest" style="color:#5a9b6e;">0</strong></span>
      </div>
      <canvas id="snakeCanvas" width="600" height="600" style="border-radius:16px;box-shadow:0 12px 30px rgba(120,80,40,0.25);background:#fdf6ec;margin-top:30px;max-width:90vw;max-height:60vh;"></canvas>
      <div id="snakeMsg" style="position:absolute;color:#7a5230;font-size:13px;margin-top:8px;bottom:18px;letter-spacing:1px;">方向鍵 / WASD 控制方向 ・ 金色=加速　紫色=縮短　紅色=普通</div>
      <div id="snakeOverlay" style="display:none;position:absolute;inset:0;background:rgba(40,25,10,0.55);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;">
        <div style="font-size:40px;">🐍</div>
        <h2 id="snakeOverlayTitle" style="font-size:26px;letter-spacing:3px;"></h2>
        <p id="snakeOverlayDesc" style="font-size:14px;opacity:0.85;"></p>
        <button id="snakeRestartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #ffd9a0;background:rgba(255,255,255,0.15);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('snakeCanvas');
  const ctx = canvas.getContext('2d');
  const GRID = 24;
  const CELLS = canvas.width / GRID; // 600/24 = 25x25 — more cells than before (20x20), and each cell is bigger than original 20px... 
  // Note: cell pixel-size (24px) vs original (20px) — both larger canvas AND more cells than original.
  const scoreEl = document.getElementById('snakeScore');
  const bestEl = document.getElementById('snakeBest');

  // ---- Apply equipped skins/themes from shop ----
  function currentCharColors() {
    const item = getEquipped('snake', 'character');
    return item ? item.colors : { body1:'#9bdca8', body2:'#5fae72', bodyDark1:'#7ec88a', bodyDark2:'#4f9d62', horn:'#e8c468' };
  }
  function currentBgColors() {
    const item = getEquipped('snake', 'background');
    return item ? item.colors : { top:'#fdf6ec', grid:'rgba(200,170,130,0.18)', accent:'rgba(95,155,110,0.15)' };
  }
  const overlay = document.getElementById('snakeOverlay');
  const overlayTitle = document.getElementById('snakeOverlayTitle');
  const overlayDesc = document.getElementById('snakeOverlayDesc');
  const restartBtn = document.getElementById('snakeRestartBtn');

  let best = window.__snakeBestScore || 0;
  bestEl.textContent = best;

  let snake, dir, nextDir, food, score, baseSpeed, speed, running, loopTimer, sakuraTime;
  let boostActive = false, boostEndTime = 0;
  const BOOST_SPEED_MULT = 0.42; // much faster tick interval while boosted (lower = faster)
  const BOOST_DURATION_MS = 5000;

  function randCell(exclude) {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * CELLS), y: Math.floor(Math.random() * CELLS) };
    } while (exclude.some(s => s.x === pos.x && s.y === pos.y));
    return pos;
  }

  function spawnFood() {
    const roll = Math.random();
    let type = 'normal';
    if (roll < 0.15) type = 'speed';       // gold — speeds up temporarily
    else if (roll < 0.30) type = 'shrink'; // purple — shrinks snake
    const pos = randCell(snake);
    food = { ...pos, type };
  }

  function reset() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    baseSpeed = 130;
    speed = baseSpeed;
    boostActive = false; boostEndTime = 0;
    sakuraTime = 0;
    spawnFood();
    scoreEl.textContent = score;
    running = true;
    overlay.style.display = 'none';
    scheduleLoop();
  }

  function scheduleLoop() {
    if (loopTimer) clearTimeout(loopTimer);
    if (!running) return;
    loopTimer = setTimeout(tick, speed);
  }

  function tick() {
    if (!running) return;

    // boost expiry check — revert to normal speed once the 5s window ends
    if (boostActive && Date.now() >= boostEndTime) {
      boostActive = false;
      speed = baseSpeed;
    }

    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.x >= CELLS || head.y < 0 || head.y >= CELLS) {
      return gameOver();
    }
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      if (food.type === 'normal') {
        score += 10;
      } else if (food.type === 'speed') {
        score += 15;
        speed = Math.max(35, Math.round(baseSpeed * BOOST_SPEED_MULT));
        boostActive = true;
        boostEndTime = Date.now() + BOOST_DURATION_MS;
        flashMsg('⚡ 極速加速！5秒');
      } else if (food.type === 'shrink') {
        score += 20;
        flashMsg('✂️ 蛇身縮短！');
        // remove up to 2 extra segments (besides the natural growth this turn)
        for (let i = 0; i < 2 && snake.length > 3; i++) snake.pop();
      }
      scoreEl.textContent = score;
      spawnFood();
    } else {
      snake.pop();
    }

    draw();
    scheduleLoop();
  }

  let msgTimeout;
  function flashMsg(text) {
    const msgEl = document.getElementById('snakeMsg');
    if (!msgEl) return;
    const old = msgEl.textContent;
    msgEl.textContent = text;
    msgEl.style.color = '#c0392b';
    msgEl.style.fontWeight = '800';
    clearTimeout(msgTimeout);
    msgTimeout = setTimeout(() => {
      if (msgEl) { msgEl.textContent = old; msgEl.style.fontWeight = 'normal'; msgEl.style.color = '#7a5230'; }
    }, 900);
  }

  function gameOver() {
    running = false;
    if (score > best) {
      best = score;
      window.__snakeBestScore = best;
      bestEl.textContent = best;
    }
    const earnedCoins = convertScoreToCoins('snake', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '遊戲結束';
    overlayDesc.innerHTML = `本局分數：${score} ・ 最高分：${best}<br><span style="color:#ffc857;">💰 獲得 ${earnedCoins} 金幣！</span>`;
    restartBtn.textContent = '再玩一次';
  }

  function drawBg() {
    const bg = currentBgColors();
    ctx.fillStyle = bg.top;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // subtle garden grid (raked sand pattern)
    ctx.strokeStyle = bg.grid;
    ctx.lineWidth = 1;
    for (let i = 0; i <= CELLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * GRID, 0); ctx.lineTo(i * GRID, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * GRID); ctx.lineTo(canvas.width, i * GRID); ctx.stroke();
    }
    // corner decorations - small bamboo accents
    ctx.fillStyle = bg.accent;
    ctx.fillRect(0, 0, 14, canvas.height);
    ctx.fillRect(canvas.width-14, 0, 14, canvas.height);
  }

  function drawFood() {
    const cx = food.x * GRID + GRID / 2;
    const cy = food.y * GRID + GRID / 2;
    const pulse = 1 + Math.sin(sakuraTime * 0.15) * 0.08;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(pulse, pulse);
    if (food.type === 'normal') {
      ctx.fillStyle = '#e8554a';
      ctx.beginPath(); ctx.arc(0, 0, GRID*0.36, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#5a9b6e';
      ctx.beginPath(); ctx.ellipse(0, -GRID*0.36, 2.5, 4.5, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(-2, -2, 2.5, 0, Math.PI*2); ctx.fill();
    } else if (food.type === 'speed') {
      ctx.save(); ctx.shadowBlur = 12; ctx.shadowColor = '#ffc857';
      ctx.fillStyle = '#ffc857';
      ctx.beginPath();
      ctx.moveTo(-4, -8); ctx.lineTo(3, -2); ctx.lineTo(-1, -2); ctx.lineTo(4, 8); ctx.lineTo(-4, 1); ctx.lineTo(0, 1);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (food.type === 'shrink') {
      ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = '#8b6fd4';
      ctx.fillStyle = '#8b6fd4';
      ctx.beginPath(); ctx.ellipse(0,0,GRID*0.32,GRID*0.32,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(5,0); ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  function drawSnake() {
    const charColors = currentCharColors();
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const cx = s.x * GRID + GRID / 2;
      const cy = s.y * GRID + GRID / 2;
      const isHead = i === 0;
      const r = isHead ? GRID*0.46 : GRID*0.42 - (i * 0.15 > 6 ? 6 : i*0.15);
      const grad = ctx.createRadialGradient(cx-3, cy-3, 2, cx, cy, r);
      grad.addColorStop(0, isHead ? charColors.body1 : charColors.bodyDark1);
      grad.addColorStop(1, isHead ? charColors.body2 : charColors.bodyDark2);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, Math.max(r,4), 0, Math.PI*2); ctx.fill();
      if (!isHead && i % 2 === 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx, cy, r*0.5, 0, Math.PI); ctx.stroke();
      }
    }
    // head face
    const head = snake[0];
    const hx = head.x * GRID + GRID/2;
    const hy = head.y * GRID + GRID/2;
    const ex = dir.x * 4, ey = dir.y * 4;
    // horns
    ctx.fillStyle = charColors.horn;
    const perp = { x: -dir.y, y: dir.x };
    ctx.beginPath();
    ctx.moveTo(hx + perp.x*5 - dir.x*2, hy + perp.y*5 - dir.y*2);
    ctx.lineTo(hx + perp.x*8 - dir.x*8, hy + perp.y*8 - dir.y*8);
    ctx.lineTo(hx + perp.x*2 - dir.x*6, hy + perp.y*2 - dir.y*6);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hx - perp.x*5 - dir.x*2, hy - perp.y*5 - dir.y*2);
    ctx.lineTo(hx - perp.x*8 - dir.x*8, hy - perp.y*8 - dir.y*8);
    ctx.lineTo(hx - perp.x*2 - dir.x*6, hy - perp.y*2 - dir.y*6);
    ctx.closePath(); ctx.fill();
    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(hx + perp.x*5 + ex*0.3, hy + perp.y*5 + ey*0.3, 3.4, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx - perp.x*5 + ex*0.3, hy - perp.y*5 + ey*0.3, 3.4, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(hx + perp.x*5 + ex*0.5, hy + perp.y*5 + ey*0.5, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx - perp.x*5 + ex*0.5, hy - perp.y*5 + ey*0.5, 1.6, 0, Math.PI*2); ctx.fill();
  }

  function drawSakuraPetals() {
    sakuraTime++;
    if (!window.__snakePetals) window.__snakePetals = [];
    const petals = window.__snakePetals;
    if (sakuraTime % 40 === 0 && petals.length < 12) {
      petals.push({ x: Math.random()*canvas.width, y: -10, vy: 0.5+Math.random()*0.5, vx: (Math.random()-0.5)*0.6, rot: Math.random()*Math.PI });
    }
    for (let i = petals.length-1; i>=0; i--) {
      const p = petals[i];
      p.y += p.vy; p.x += p.vx; p.rot += 0.02;
      if (p.y > canvas.height+10) petals.splice(i,1);
    }
    petals.forEach(p => {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = 'rgba(255,182,200,0.55)';
      ctx.beginPath(); ctx.ellipse(0,0,4,2.6,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function draw() {
    drawBg();
    drawSakuraPetals();
    drawFood();
    drawSnake();
  }

  function handleKey(e) {
    const k = e.key;
    if ((k === 'ArrowUp' || k === 'w' || k === 'W') && dir.y === 0) nextDir = { x: 0, y: -1 };
    else if ((k === 'ArrowDown' || k === 's' || k === 'S') && dir.y === 0) nextDir = { x: 0, y: 1 };
    else if ((k === 'ArrowLeft' || k === 'a' || k === 'A') && dir.x === 0) nextDir = { x: -1, y: 0 };
    else if ((k === 'ArrowRight' || k === 'd' || k === 'D') && dir.x === 0) nextDir = { x: 1, y: 0 };
    else return;
    e.preventDefault();
  }

  // touch swipe support
  let touchStartX = 0, touchStartY = 0;
  function handleTouchStart(e) { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }
  function handleTouchEnd(e) {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 20 && dir.x === 0) nextDir = { x: 1, y: 0 };
      else if (dx < -20 && dir.x === 0) nextDir = { x: -1, y: 0 };
    } else {
      if (dy > 20 && dir.y === 0) nextDir = { x: 0, y: 1 };
      else if (dy < -20 && dir.y === 0) nextDir = { x: 0, y: -1 };
    }
  }

  document.addEventListener('keydown', handleKey);
  canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
  canvas.addEventListener('touchend', handleTouchEnd, { passive: true });
  restartBtn.addEventListener('click', reset);

  window.__snakePetals = [];

  // ---- Start screen: show idle preview + overlay, wait for user to click ----
  function showStartScreen() {
    running = false;
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    food = { x: 16, y: 10, type: 'normal' };
    sakuraTime = 0;
    draw();
    overlay.style.display = 'flex';
    overlayTitle.textContent = '庭園靈蛇';
    overlayDesc.textContent = '方向鍵 / WASD 控制方向 ・ 金色加速 ・ 紫色縮短 ・ 收集靈蛇成長';
    restartBtn.textContent = '開始遊戲';
  }
  showStartScreen();

  window.__snakeCleanup = function() {
    running = false;
    if (loopTimer) clearTimeout(loopTimer);
    document.removeEventListener('keydown', handleKey);
    window.__snakePetals = [];
  };
}

// ============================================================
// REACTION GAME — 霓虹獵手 (Neon Hunter)
// Click colored targets fast; combo system unlocks higher levels.
// ============================================================

function mountReactionGame(container, gameDef) {
  container.innerHTML = `
    <div id="reactRoot" style="width:100%;height:100%;position:relative;background:linear-gradient(180deg,#1a0b2e,#3d1a5c);overflow:hidden;">
      <canvas id="reactBgCanvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
      <div id="reactHUD" style="position:absolute;top:64px;left:0;right:0;display:flex;justify-content:center;gap:28px;color:#fff;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="reactScore" style="color:#ffc857;">0</strong></span>
        <span>連擊 <strong id="reactCombo" style="color:#ff6fa5;">0</strong></span>
        <span>關卡 <strong id="reactLevel" style="color:#5ec8e8;">1</strong></span>
        <span>時間 <strong id="reactTime" style="color:#fff;">30</strong></span>
      </div>
      <div id="reactArena" style="position:absolute;inset:0;top:110px;"></div>
      <div id="reactOverlay" style="display:flex;position:absolute;inset:0;background:rgba(15,5,30,0.7);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🎯</div>
        <h2 id="reactOverlayTitle" style="font-size:26px;letter-spacing:3px;">霓虹獵手</h2>
        <p id="reactOverlayDesc" style="font-size:13px;opacity:0.85;max-width:280px;line-height:1.8;">點擊出現的光球得分<br>連續命中累積連擊數<br>連擊越高，分數倍率越大！</p>
        <button id="reactStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #5ec8e8;background:rgba(94,200,232,0.15);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const root = document.getElementById('reactRoot');
  const arena = document.getElementById('reactArena');
  const bgCanvas = document.getElementById('reactBgCanvas');
  const bgCtx = bgCanvas.getContext('2d');
  const scoreEl = document.getElementById('reactScore');
  const comboEl = document.getElementById('reactCombo');
  const levelEl = document.getElementById('reactLevel');
  const timeEl = document.getElementById('reactTime');
  const overlay = document.getElementById('reactOverlay');
  const overlayTitle = document.getElementById('reactOverlayTitle');
  const overlayDesc = document.getElementById('reactOverlayDesc');
  const startBtn = document.getElementById('reactStartBtn');

  function resizeBg() {
    bgCanvas.width = root.clientWidth;
    bgCanvas.height = root.clientHeight;
  }
  resizeBg();

  function currentTargetPalette() {
    const item = getEquipped('reaction', 'character');
    return item ? item.colors.targets : ['#ff6fa5', '#5ec8e8', '#ffc857', '#55e6a5', '#a29bfe'];
  }
  function currentCityTheme() {
    const item = getEquipped('reaction', 'background');
    return item ? item.colors : { sky1:'#1a0b2e', sky2:'#3d1a5c', building:'#150a28', neon1:'#ff6fa5', neon2:'#5ec8e8' };
  }
  let score = 0, combo = 0, maxCombo = 0, level = 1, timeLeft = 30;
  let spawnTimer = null, countdownTimer = null, running = false;
  let activeTargets = [];
  let bgAnimFrame = null;
  let buildingLights = [];

  function initBuildings() {
    buildingLights = [];
    const w = bgCanvas.width;
    let x = 0;
    while (x < w) {
      const bw = 25 + Math.random()*20;
      const bh = 60 + Math.random()*120;
      buildingLights.push({ x, w: bw, h: bh, lights: Array.from({length: 8}, () => Math.random() > 0.5) });
      x += bw + 5;
    }
  }
  initBuildings();

  function drawBg() {
    const w = bgCanvas.width, h = bgCanvas.height;
    const city = currentCityTheme();
    bgCtx.clearRect(0, 0, w, h);
    const skyGrad = bgCtx.createLinearGradient(0,0,0,h);
    skyGrad.addColorStop(0, city.sky1); skyGrad.addColorStop(1, city.sky2);
    bgCtx.fillStyle = skyGrad;
    bgCtx.fillRect(0,0,w,h);
    bgCtx.fillStyle = city.building;
    buildingLights.forEach(b => {
      bgCtx.fillRect(b.x, h - b.h, b.w, b.h);
      b.lights.forEach((on, i) => {
        if (on) {
          bgCtx.fillStyle = i % 2 === 0 ? city.neon1 : city.neon2;
          bgCtx.fillRect(b.x + 5 + (i%2)*10, h - b.h + 8 + Math.floor(i/2)*18, 5, 7);
          bgCtx.fillStyle = city.building;
        }
      });
    });
    const grad = bgCtx.createLinearGradient(0, h-3, w, h);
    grad.addColorStop(0, city.neon1); grad.addColorStop(1, city.neon2);
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, h-3, w, 3);
    bgAnimFrame = requestAnimationFrame(drawBg);
  }

  function speedForLevel(lvl) {
    return Math.max(750, 1500 - lvl * 90); // spawn interval shrinks
  }
  function lifeForLevel(lvl) {
    return Math.max(900, 1900 - lvl * 80); // target visible duration shrinks
  }

  function spawnTarget() {
    if (!running) return;
    const arenaW = arena.clientWidth, arenaH = arena.clientHeight;
    const size = Math.max(34, 64 - level * 2);
    const x = Math.random() * (arenaW - size - 20) + 10;
    const y = Math.random() * (arenaH - size - 20) + 10;
    const palette = currentTargetPalette();
    const color = palette[Math.floor(Math.random() * palette.length)];
    const isBonus = Math.random() < 0.12; // rare gold bonus target
    const el = document.createElement('div');
    const finalColor = isBonus ? '#ffe066' : color;
    el.style.cssText = `
      position:absolute; left:${x}px; top:${y}px; width:${size}px; height:${size}px;
      border-radius:50%; background:radial-gradient(circle at 35% 30%, #fff, ${finalColor} 60%);
      box-shadow:0 0 18px ${finalColor}, 0 0 4px #fff inset;
      cursor:pointer; transform:scale(0); transition:transform 0.15s ease-out;
      z-index:10;
    `;
    arena.appendChild(el);
    requestAnimationFrame(() => { el.style.transform = 'scale(1)'; });

    const life = lifeForLevel(level);
    const timeout = setTimeout(() => {
      if (el.parentNode) {
        // missed — reset combo
        combo = 0;
        comboEl.textContent = combo;
        el.style.transition = 'transform 0.15s, opacity 0.15s';
        el.style.transform = 'scale(0)';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 150);
        activeTargets = activeTargets.filter(t => t !== entry);
      }
    }, life);

    function onHit(e) {
      e.stopPropagation();
      clearTimeout(timeout);
      combo++;
      maxCombo = Math.max(maxCombo, combo);
      const multiplier = 1 + Math.floor(combo / 5) * 0.5;
      const base = isBonus ? 40 : 10;
      const gained = Math.round(base * multiplier);
      score += gained;
      scoreEl.textContent = score;
      comboEl.textContent = combo;

      // level up every 8 combo
      const newLevel = Math.min(10, 1 + Math.floor(combo / 8));
      if (newLevel > level) {
        level = newLevel;
        levelEl.textContent = level;
        flashLevelUp();
      }

      spawnPop(x + size/2, y + size/2, finalColor, `+${gained}`);
      el.style.transform = 'scale(1.4)';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 120);
      activeTargets = activeTargets.filter(t => t !== entry);
    }
    el.addEventListener('pointerdown', onHit);

    const entry = { el, timeout };
    activeTargets.push(entry);
  }

  function spawnPop(x, y, color, text) {
    const pop = document.createElement('div');
    pop.textContent = text;
    pop.style.cssText = `
      position:absolute; left:${x}px; top:${y}px; color:${color}; font-weight:800; font-size:16px;
      pointer-events:none; transform:translate(-50%,-50%); z-index:15; text-shadow:0 0 8px ${color};
      transition: transform 0.5s ease-out, opacity 0.5s; opacity:1;
    `;
    arena.appendChild(pop);
    requestAnimationFrame(() => {
      pop.style.transform = 'translate(-50%,-130%)';
      pop.style.opacity = '0';
    });
    setTimeout(() => pop.remove(), 520);
  }

  let levelUpFlashEl = null;
  function flashLevelUp() {
    if (levelUpFlashEl) levelUpFlashEl.remove();
    const f = document.createElement('div');
    f.textContent = `LEVEL ${level}!`;
    f.style.cssText = `
      position:absolute; top:40%; left:50%; transform:translate(-50%,-50%) scale(0.5);
      color:#ffe066; font-size:32px; font-weight:900; letter-spacing:3px;
      text-shadow:0 0 20px #ffc857; z-index:30; opacity:0; transition: all 0.4s ease-out;
    `;
    arena.appendChild(f);
    levelUpFlashEl = f;
    requestAnimationFrame(() => { f.style.opacity = '1'; f.style.transform = 'translate(-50%,-50%) scale(1)'; });
    setTimeout(() => {
      f.style.opacity = '0';
      f.style.transform = 'translate(-50%,-50%) scale(1.3)';
      setTimeout(() => f.remove(), 400);
    }, 600);
  }

  function loop() {
    if (!running) return;
    spawnTarget();
    spawnTimer = setTimeout(loop, speedForLevel(level));
  }

  function tickCountdown() {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) return endGame();
    countdownTimer = setTimeout(tickCountdown, 1000);
  }

  function endGame() {
    running = false;
    if (spawnTimer) clearTimeout(spawnTimer);
    if (countdownTimer) clearTimeout(countdownTimer);
    activeTargets.forEach(t => { clearTimeout(t.timeout); t.el.remove(); });
    activeTargets = [];
    const earnedCoins = convertScoreToCoins('reaction', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '時間到！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　獲得 <span style="color:#ffc857;">💰${earnedCoins}</span> 金幣<br>最高連擊：${maxCombo}　到達關卡：${level}`;
    startBtn.textContent = '再玩一次';
  }

  function start() {
    score = 0; combo = 0; maxCombo = 0; level = 1; timeLeft = 30;
    scoreEl.textContent = 0; comboEl.textContent = 0; levelEl.textContent = 1; timeEl.textContent = 30;
    arena.innerHTML = '';
    activeTargets = [];
    running = true;
    overlay.style.display = 'none';
    loop();
    countdownTimer = setTimeout(tickCountdown, 1000);
  }

  startBtn.addEventListener('click', start);
  drawBg();

  window.__reactionCleanup = function() {
    running = false;
    if (spawnTimer) clearTimeout(spawnTimer);
    if (countdownTimer) clearTimeout(countdownTimer);
    if (bgAnimFrame) cancelAnimationFrame(bgAnimFrame);
    activeTargets.forEach(t => clearTimeout(t.timeout));
    activeTargets = [];
  };
}

// MAZE GAME — 妖怪迷宮 (Yokai Maze)
// Random maze generation, ghost chaser, increasing difficulty, collectible items.
// ============================================================

function mountMazeGame(container, gameDef) {
  container.innerHTML = `
    <div id="mazeRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%, #2d2050, #150f2e);position:relative;">
      <div id="mazeHUD" style="position:absolute;top:64px;display:flex;gap:20px;align-items:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:1px;z-index:5;">
        <span>關卡 <strong id="mazeLevel" style="color:#ffc857;">1</strong></span>
        <span>道具 <strong id="mazeItems" style="color:#a8e8ff;">0</strong></span>
        <span style="display:flex;align-items:center;gap:6px;">
          HP
          <span id="mazeHpBar" style="width:120px;height:13px;background:#3a1a2a;border:1px solid #ff6fa5;border-radius:7px;overflow:hidden;display:inline-block;box-shadow:0 0 6px rgba(255,111,165,0.4);">
            <span id="mazeHpFill" style="display:block;height:100%;width:100%;background:linear-gradient(90deg,#ff8fc0,#ff6fa5);transition:width 0.2s;"></span>
          </span>
          <strong id="mazeHpText" style="color:#ff8fc0;min-width:46px;display:inline-block;">100/100</strong>
        </span>
      </div>
      <canvas id="mazeCanvas" width="380" height="380" style="border-radius:14px;box-shadow:0 12px 30px rgba(0,0,0,0.5);background:#1a1230;margin-top:36px;"></canvas>
      <div style="position:absolute;bottom:16px;color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px;">方向鍵 / WASD 移動 ・ 收集靈光 ✦ 躲避妖怪 ・ 找到出口</div>
      <div id="mazeOverlay" style="display:flex;position:absolute;inset:0;background:rgba(10,5,25,0.75);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">👻</div>
        <h2 id="mazeOverlayTitle" style="font-size:26px;letter-spacing:3px;">妖怪迷宮</h2>
        <p id="mazeOverlayDesc" style="font-size:13px;opacity:0.85;max-width:280px;line-height:1.8;">在迷宮中尋找金色出口<br>收集藍色靈光珠加分<br>收集粉色補血珠恢復HP<br>被妖怪碰到會扣血並被擊退！</p>
        <button id="mazeStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #8b6fd4;background:rgba(139,111,212,0.2);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('mazeCanvas');
  const ctx = canvas.getContext('2d');
  const levelEl = document.getElementById('mazeLevel');
  const itemsEl = document.getElementById('mazeItems');
  const hpFillEl = document.getElementById('mazeHpFill');
  const hpTextEl = document.getElementById('mazeHpText');
  const overlay = document.getElementById('mazeOverlay');
  const overlayTitle = document.getElementById('mazeOverlayTitle');
  const overlayDesc = document.getElementById('mazeOverlayDesc');
  const startBtn = document.getElementById('mazeStartBtn');

  let level = 1, itemsCollected = 0, totalRunScore = 0;
  let maxHp = 100, hp = 100;
  let invincibleUntil = 0; // timestamp; player can't take damage until this time
  let cols, rows, cellSize, gridWalls; // gridWalls[r][c] = {top,right,bottom,left}
  let player, exitCell, ghosts, wisps, healOrbs;
  let running = false, animFrame = null, ghostMoveTimer = null;
  let keysDown = {};

  function mazeSizeForLevel(lvl) {
    const n = Math.min(7 + Math.floor(lvl * 1.2), 15);
    return n;
  }
  function ghostCountForLevel(lvl) {
    return Math.min(1 + Math.floor((lvl - 1) / 2), 4);
  }
  function ghostSpeedForLevel(lvl) {
    return Math.max(280, 620 - lvl * 35); // ms per ghost move; lower = faster
  }
  function maxHpForLevel(lvl) { return 100 + (lvl - 1) * 15; }   // more max HP each level
  function ghostDamageForLevel(lvl) { return 18 + (lvl - 1) * 4; } // more bite damage each level
  function healAmount() { return Math.round(maxHp * 0.3); }

  // ---- Maze generation (recursive backtracker) ----
  function generateMaze(n) {
    cols = n; rows = n;
    const grid = [];
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < cols; c++) row.push({ top: true, right: true, bottom: true, left: true, visited: false });
      grid.push(row);
    }
    const stack = [{ r: 0, c: 0 }];
    grid[0][0].visited = true;
    while (stack.length) {
      const cur = stack[stack.length - 1];
      const { r, c } = cur;
      const neighbors = [];
      if (r > 0 && !grid[r-1][c].visited) neighbors.push({ r: r-1, c, dir: 'top' });
      if (c < cols-1 && !grid[r][c+1].visited) neighbors.push({ r, c: c+1, dir: 'right' });
      if (r < rows-1 && !grid[r+1][c].visited) neighbors.push({ r: r+1, c, dir: 'bottom' });
      if (c > 0 && !grid[r][c-1].visited) neighbors.push({ r, c: c-1, dir: 'left' });
      if (neighbors.length === 0) { stack.pop(); continue; }
      const next = neighbors[Math.floor(Math.random() * neighbors.length)];
      if (next.dir === 'top') { grid[r][c].top = false; grid[next.r][next.c].bottom = false; }
      if (next.dir === 'right') { grid[r][c].right = false; grid[next.r][next.c].left = false; }
      if (next.dir === 'bottom') { grid[r][c].bottom = false; grid[next.r][next.c].top = false; }
      if (next.dir === 'left') { grid[r][c].left = false; grid[next.r][next.c].right = false; }
      grid[next.r][next.c].visited = true;
      stack.push({ r: next.r, c: next.c });
    }
    // add some extra random openings for multiple paths (less linear, more escape routes)
    const extraOpenings = Math.floor(n * 0.6);
    for (let i = 0; i < extraOpenings; i++) {
      const r = Math.floor(Math.random() * rows);
      const c = Math.floor(Math.random() * cols);
      const dirs = ['top','right','bottom','left'];
      const dir = dirs[Math.floor(Math.random()*4)];
      if (dir === 'right' && c < cols-1) { grid[r][c].right = false; grid[r][c+1].left = false; }
      if (dir === 'bottom' && r < rows-1) { grid[r][c].bottom = false; grid[r+1][c].top = false; }
      if (dir === 'left' && c > 0) { grid[r][c].left = false; grid[r][c-1].right = false; }
      if (dir === 'top' && r > 0) { grid[r][c].top = false; grid[r-1][c].bottom = false; }
    }
    return grid;
  }

  function cellCenter(r, c) {
    return { x: c * cellSize + cellSize/2, y: r * cellSize + cellSize/2 };
  }

  function canMove(r, c, dir) {
    if (dir === 'top') return r > 0 && !gridWalls[r][c].top;
    if (dir === 'bottom') return r < rows-1 && !gridWalls[r][c].bottom;
    if (dir === 'left') return c > 0 && !gridWalls[r][c].left;
    if (dir === 'right') return c < cols-1 && !gridWalls[r][c].right;
    return false;
  }

  function bfsDistance(fromR, fromC, toR, toC) {
    // returns next step direction from (fromR,fromC) toward (toR,toC) using BFS
    const visited = Array.from({length: rows}, () => Array(cols).fill(false));
    const prev = Array.from({length: rows}, () => Array(cols).fill(null));
    const queue = [{ r: fromR, c: fromC }];
    visited[fromR][fromC] = true;
    while (queue.length) {
      const { r, c } = queue.shift();
      if (r === toR && c === toC) break;
      const dirs = [
        ['top', r-1, c], ['bottom', r+1, c], ['left', r, c-1], ['right', r, c+1]
      ];
      for (const [dir, nr, nc] of dirs) {
        if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
        if (visited[nr][nc]) continue;
        if (!canMove(r, c, dir)) continue;
        visited[nr][nc] = true;
        prev[nr][nc] = { r, c };
        queue.push({ r: nr, c: nc });
      }
    }
    // backtrack from target to find first step
    if (!visited[toR][toC]) return null;
    let cur = { r: toR, c: toC };
    while (prev[cur.r][cur.c] && !(prev[cur.r][cur.c].r === fromR && prev[cur.r][cur.c].c === fromC)) {
      cur = prev[cur.r][cur.c];
    }
    return cur;
  }

  function setupLevel() {
    const n = mazeSizeForLevel(level);
    gridWalls = generateMaze(n);
    cellSize = canvas.width / n;
    player = { r: 0, c: 0, x: 0, y: 0, moving: false };
    const pc = cellCenter(0, 0);
    player.x = pc.x; player.y = pc.y;
    exitCell = { r: rows-1, c: cols-1 };

    // wisps (collectibles) scattered in maze
    wisps = [];
    const wispCount = Math.min(5 + level, 12);
    for (let i = 0; i < wispCount; i++) {
      let r, c;
      do { r = Math.floor(Math.random()*rows); c = Math.floor(Math.random()*cols); }
      while ((r===0 && c===0) || (r===exitCell.r && c===exitCell.c));
      wisps.push({ r, c, taken: false, phase: Math.random()*Math.PI*2 });
    }

    // heal orbs — fewer than wisps, but valuable
    healOrbs = [];
    const healCount = Math.min(2 + Math.floor(level / 2), 5);
    for (let i = 0; i < healCount; i++) {
      let r, c;
      do { r = Math.floor(Math.random()*rows); c = Math.floor(Math.random()*cols); }
      while ((r===0 && c===0) || (r===exitCell.r && c===exitCell.c));
      healOrbs.push({ r, c, taken: false, phase: Math.random()*Math.PI*2 });
    }

    // ghosts start far from player
    ghosts = [];
    const gCount = ghostCountForLevel(level);
    for (let i = 0; i < gCount; i++) {
      const gr = rows - 1 - Math.floor(Math.random()*2);
      const gc = Math.floor(Math.random()*cols);
      const center = cellCenter(gr, gc);
      ghosts.push({ r: gr, c: gc, x: center.x, y: center.y, id: i });
    }

    itemsCollected = 0;
    maxHp = maxHpForLevel(level);
    hp = maxHp;
    invincibleUntil = 0;
    itemsEl.textContent = itemsCollected;
    levelEl.textContent = level;
    updateHpBar();
  }

  function updateHpBar() {
    const pct = Math.max(0, hp / maxHp * 100);
    hpFillEl.style.width = pct + '%';
    if (pct > 60) hpFillEl.style.background = 'linear-gradient(90deg,#ff8fc0,#ff6fa5)';
    else if (pct > 30) hpFillEl.style.background = 'linear-gradient(90deg,#ffcc66,#ff8800)';
    else hpFillEl.style.background = 'linear-gradient(90deg,#ff5555,#cc0000)';
    hpTextEl.textContent = `${Math.max(0,Math.ceil(hp))}/${maxHp}`;
  }

  function movePlayer(dr, dc, dir) {
    if (player.moving) return;
    if (!canMove(player.r, player.c, dir)) return;
    player.r += dr; player.c += dc;
    player.moving = true;
    const target = cellCenter(player.r, player.c);
    animateToken(player, target, () => { player.moving = false; checkPlayerEvents(); });
  }

  function animateToken(token, target, onDone) {
    const startX = token.x, startY = token.y;
    const dist = Math.hypot(target.x-startX, target.y-startY);
    const duration = Math.max(90, dist * 1.4);
    const startTime = performance.now();
    function step() {
      const t = Math.min(1, (performance.now() - startTime) / duration);
      token.x = startX + (target.x-startX)*t;
      token.y = startY + (target.y-startY)*t;
      if (t < 1) requestAnimationFrame(step);
      else if (onDone) onDone();
    }
    step();
  }

  function checkPlayerEvents() {
    // collect wisp
    wisps.forEach(w => {
      if (!w.taken && w.r === player.r && w.c === player.c) {
        w.taken = true;
        itemsCollected++;
        itemsEl.textContent = itemsCollected;
      }
    });
    // collect heal orb
    healOrbs.forEach(h => {
      if (!h.taken && h.r === player.r && h.c === player.c) {
        h.taken = true;
        hp = Math.min(maxHp, hp + healAmount());
        updateHpBar();
        flashHeal();
      }
    });
    // reach exit
    if (player.r === exitCell.r && player.c === exitCell.c) {
      levelComplete();
    }
  }

  function flashHeal() {
    canvas.style.boxShadow = '0 0 0 6px rgba(120,255,170,0.6), 0 12px 30px rgba(0,0,0,0.5)';
    setTimeout(() => { canvas.style.boxShadow = '0 12px 30px rgba(0,0,0,0.5)'; }, 220);
  }

  function levelComplete() {
    running = false;
    if (ghostMoveTimer) clearTimeout(ghostMoveTimer);
    const levelScore = itemsCollected * 10 + level * 20;
    totalRunScore += levelScore;
    const earnedCoins = convertScoreToCoins('maze', levelScore);
    level++;
    overlay.style.display = 'flex';
    overlayTitle.textContent = `第 ${level-1} 關 通過！`;
    overlayDesc.innerHTML = `收集靈光：${itemsCollected} 個　獲得 <span style="color:#ffc857;">💰${earnedCoins}</span> 金幣<br>準備進入更複雜的第 ${level} 關迷宮...`;
    startBtn.textContent = `進入第 ${level} 關`;
  }

  function takeDamage(ghost) {
    const now = performance.now();
    if (now < invincibleUntil) return; // still invincible from last hit
    hp -= ghostDamageForLevel(level);
    updateHpBar();
    flashDamage();
    invincibleUntil = now + 1000; // 1s grace period, no repeated damage

    if (hp <= 0) { hp = 0; updateHpBar(); return gameOver(); }

    // knockback: push player one cell away from the ghost instead of resetting to origin
    const dr = player.r - ghost.r, dc = player.c - ghost.c;
    let nr = player.r, nc = player.c;
    if (dr !== 0 && canMove(player.r, player.c, dr > 0 ? 'bottom' : 'top')) nr += dr > 0 ? 1 : -1;
    else if (dc !== 0 && canMove(player.r, player.c, dc > 0 ? 'right' : 'left')) nc += dc > 0 ? 1 : -1;
    player.r = nr; player.c = nc;
    const target = cellCenter(nr, nc);
    animateToken(player, target, () => { checkPlayerEvents(); });
  }

  function flashDamage() {
    canvas.style.boxShadow = '0 0 0 6px rgba(255,80,80,0.6), 0 12px 30px rgba(0,0,0,0.5)';
    setTimeout(() => { canvas.style.boxShadow = '0 12px 30px rgba(0,0,0,0.5)'; }, 200);
  }

  function gameOver() {
    running = false;
    if (ghostMoveTimer) clearTimeout(ghostMoveTimer);
    const finalScore = itemsCollected * 10;
    const earnedCoins = convertScoreToCoins('maze', finalScore);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '被妖怪抓到了...';
    overlayDesc.innerHTML = `到達關卡：${level}<br>總共收集靈光：${itemsCollected}　獲得 <span style="color:#ffc857;">💰${earnedCoins}</span> 金幣`;
    startBtn.textContent = '重新開始';
    level = 1;
    totalRunScore = 0;
  }

  function moveGhosts() {
    if (!running) return;
    ghosts.forEach(g => {
      const step = bfsDistance(g.r, g.c, player.r, player.c);
      if (step) {
        g.r = step.r; g.c = step.c;
        const target = cellCenter(g.r, g.c);
        animateToken(g, target, () => {});
      }
    });
    // check collision after moving
    if (!running) return;
    ghosts.forEach(g => {
      if (g.r === player.r && g.c === player.c) takeDamage(g);
    });
    if (!running) return;
    ghostMoveTimer = setTimeout(moveGhosts, ghostSpeedForLevel(level));
  }

  // ---- Drawing ----
  function currentMazeTheme() {
    const item = getEquipped('maze', 'background');
    return item ? item.colors : { bgTop:'#2d2050', bgBottom:'#150f2e', wall:'#5a4a8a', floor:'#1a1230', ghost:'rgba(220,100,220,0.9)' };
  }
  function currentPlayerSkin() {
    const item = getEquipped('maze', 'character');
    return item ? item.colors : { skin: '#ffe0c2', robe: '#5a4070' };
  }

  function drawMaze() {
    const theme = currentMazeTheme();
    ctx.fillStyle = theme.floor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = theme.wall;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = c * cellSize, y = r * cellSize;
        const cell = gridWalls[r][c];
        ctx.beginPath();
        if (cell.top) { ctx.moveTo(x, y); ctx.lineTo(x+cellSize, y); }
        if (cell.right) { ctx.moveTo(x+cellSize, y); ctx.lineTo(x+cellSize, y+cellSize); }
        if (cell.bottom) { ctx.moveTo(x, y+cellSize); ctx.lineTo(x+cellSize, y+cellSize); }
        if (cell.left) { ctx.moveTo(x, y); ctx.lineTo(x, y+cellSize); }
        ctx.stroke();
      }
    }
    // exit glow
    const ec = cellCenter(exitCell.r, exitCell.c);
    ctx.save();
    ctx.shadowBlur = 16; ctx.shadowColor = '#ffc857';
    ctx.fillStyle = '#ffc857';
    ctx.beginPath(); ctx.arc(ec.x, ec.y, cellSize*0.28, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#3a2a10';
    ctx.font = `bold ${Math.max(8,cellSize*0.18)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('出口', ec.x, ec.y+3);
  }

  function drawWisps(time) {
    wisps.forEach(w => {
      if (w.taken) return;
      const c = cellCenter(w.r, w.c);
      const bob = Math.sin(time*0.003 + w.phase) * 2;
      ctx.save();
      ctx.shadowBlur = 10; ctx.shadowColor = '#a8e8ff';
      ctx.fillStyle = 'rgba(168,232,255,0.85)';
      ctx.beginPath(); ctx.arc(c.x, c.y+bob, cellSize*0.1, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function drawHealOrbs(time) {
    healOrbs.forEach(h => {
      if (h.taken) return;
      const c = cellCenter(h.r, h.c);
      const bob = Math.sin(time*0.004 + h.phase) * 2.5;
      const pulse = 1 + Math.sin(time*0.006 + h.phase) * 0.15;
      ctx.save();
      ctx.translate(c.x, c.y+bob);
      ctx.scale(pulse, pulse);
      ctx.shadowBlur = 12; ctx.shadowColor = '#ff6fa5';
      ctx.fillStyle = 'rgba(255,143,192,0.9)';
      ctx.beginPath(); ctx.arc(0, 0, cellSize*0.13, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(-cellSize*0.06,0); ctx.lineTo(cellSize*0.06,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-cellSize*0.06); ctx.lineTo(0,cellSize*0.06); ctx.stroke();
      ctx.restore();
    });
  }

  function drawGhosts() {
    const theme = currentMazeTheme();
    ghosts.forEach(g => {
      ctx.save();
      ctx.translate(g.x, g.y);
      const r = cellSize*0.28;
      ctx.fillStyle = theme.ghost;
      ctx.beginPath();
      ctx.moveTo(-r, r*0.6);
      ctx.quadraticCurveTo(-r, -r, 0, -r);
      ctx.quadraticCurveTo(r, -r, r, r*0.6);
      ctx.quadraticCurveTo(r*0.6, r*0.2, r*0.3, r*0.6);
      ctx.quadraticCurveTo(0, r*0.2, -r*0.3, r*0.6);
      ctx.quadraticCurveTo(-r*0.6, r*0.2, -r, r*0.6);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = theme.floor;
      ctx.beginPath(); ctx.ellipse(-r*0.35,-r*0.1,r*0.18,r*0.24,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(r*0.35,-r*0.1,r*0.18,r*0.24,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function drawPlayer() {
    const r = cellSize*0.3;
    const skin = currentPlayerSkin();
    const invincible = performance.now() < invincibleUntil;
    if (invincible && Math.floor(performance.now() / 100) % 2 === 0) return; // flicker
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = skin.skin;
    ctx.beginPath(); ctx.ellipse(0, 0, r, r*1.05, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = skin.robe;
    ctx.beginPath();
    ctx.arc(0, -r*0.3, r*0.95, Math.PI, 2*Math.PI);
    ctx.fill();
    ctx.fillStyle = '#2b2440';
    ctx.beginPath(); ctx.arc(-r*0.32, 0, r*0.14, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.32, 0, r*0.14, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function render(time) {
    if (!running) return;
    drawMaze();
    drawWisps(time || 0);
    drawHealOrbs(time || 0);
    drawGhosts();
    drawPlayer();
    animFrame = requestAnimationFrame(render);
  }

  function handleKey(e) {
    if (!running) return;
    const k = e.key;
    if (k === 'ArrowUp' || k === 'w' || k === 'W') movePlayer(-1, 0, 'top');
    else if (k === 'ArrowDown' || k === 's' || k === 'S') movePlayer(1, 0, 'bottom');
    else if (k === 'ArrowLeft' || k === 'a' || k === 'A') movePlayer(0, -1, 'left');
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') movePlayer(0, 1, 'right');
    else return;
    e.preventDefault();
  }

  function start() {
    setupLevel();
    running = true;
    overlay.style.display = 'none';
    render();
    if (ghostMoveTimer) clearTimeout(ghostMoveTimer);
    ghostMoveTimer = setTimeout(moveGhosts, ghostSpeedForLevel(level));
  }

  document.addEventListener('keydown', handleKey);
  startBtn.addEventListener('click', start);

  window.__mazeCleanup = function() {
    running = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    if (ghostMoveTimer) clearTimeout(ghostMoveTimer);
    document.removeEventListener('keydown', handleKey);
  };
}



// ===== game-shooter.js =====
// ============================================================
// SHOOTER GAME — 天空學園防衛隊 (Sky Academy Defender)
// Anime hand-drawn style space/sky shooter.
// HP scales with level, enemies scale with level, fire rate scales with level,
// healing drops, enemy damage scales with level.
// ============================================================

function mountShooterGame(container, gameDef) {
  container.innerHTML = `
    <div id="shootRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#cfe8ff,#a8d4f0);position:relative;overflow:hidden;">
      <div id="shootHUD" style="position:absolute;top:64px;display:flex;gap:22px;align-items:center;color:#2b2440;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>分數 <strong id="shootScore" style="color:#e8554a;">0</strong></span>
        <span>關卡 <strong id="shootLevel" style="color:#5a9b6e;">1</strong></span>
        <span style="display:flex;align-items:center;gap:6px;">
          HP
          <span style="width:110px;height:12px;background:#3a2a2a22;border:1px solid #e8554a;border-radius:7px;overflow:hidden;display:inline-block;">
            <span id="shootHpFill" style="display:block;height:100%;width:100%;background:linear-gradient(90deg,#7ec88a,#4f9d62);transition:width 0.15s;"></span>
          </span>
          <strong id="shootHpText" style="color:#4f9d62;min-width:55px;display:inline-block;">100/100</strong>
        </span>
      </div>
      <canvas id="shootCanvas" width="420" height="560" style="border-radius:16px;box-shadow:0 12px 30px rgba(40,60,90,0.3);background:#dff0ff;margin-top:30px;max-width:88vw;max-height:64vh;"></canvas>
      <div style="position:absolute;bottom:14px;color:rgba(40,30,60,0.6);font-size:12px;letter-spacing:1px;">方向鍵/WASD 移動 ・ 空白鍵 連射 ・ 撿補血星星恢復HP</div>
      <div id="shootOverlay" style="display:flex;position:absolute;inset:0;background:rgba(20,30,50,0.55);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">✈️</div>
        <h2 id="shootOverlayTitle" style="font-size:24px;letter-spacing:3px;">天空學園防衛隊</h2>
        <p id="shootOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">守護天空，擊退入侵的異想怪獸！<br>按住空白鍵可讓彈幕飛得更快<br>關卡越高，敵機更強、你也更快更猛！</p>
        <button id="shootStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #fff;background:rgba(255,255,255,0.2);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('shootCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('shootScore');
  const levelEl = document.getElementById('shootLevel');
  const hpFillEl = document.getElementById('shootHpFill');
  const hpTextEl = document.getElementById('shootHpText');
  const overlay = document.getElementById('shootOverlay');
  const overlayTitle = document.getElementById('shootOverlayTitle');
  const overlayDesc = document.getElementById('shootOverlayDesc');
  const startBtn = document.getElementById('shootStartBtn');

  // ---- Scaling helpers ----
  function playerMaxHP(lvl) { return 100 + (lvl - 1) * 28; }
  function enemyDamage(lvl) { return 14 + (lvl - 1) * 7; }
  function enemyHP(type, lvl) {
    const base = type === 2 ? 3 : type === 1 ? 2 : 1;
    return base + Math.floor((lvl - 1) * 0.6);
  }
  function playerDamage(lvl) { return 1 + Math.floor((lvl - 1) / 2); } // grows faster than enemy HP scaling
  function healAmount(lvl) { return Math.round(playerMaxHP(lvl) * 0.25); }
  function shootCooldownForLevel(lvl) { return Math.max(2, 6 - (lvl - 1) * 0.4); }

  let state = 'idle';
  let score = 0, hp = 100, maxHp = 100, level = 1;
  let keys = {};
  let clouds = [];
  let bullets = [], enemyBullets = [];
  let enemies = [];
  let sparkles = [];
  let healDrops = [];
  let player;
  let shootCooldown = 0, enemyShootTimer = 0, frameCount = 0, enemyDir = 1;
  let spaceHoldFrames = 0;
  let rafId = null;

  function initClouds() {
    clouds = [];
    for (let i = 0; i < 8; i++) {
      clouds.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*0.6+0.5, speed: Math.random()*0.4+0.15 });
    }
  }
  function updateClouds() {
    clouds.forEach(c => { c.y += c.speed; if (c.y > H+30) { c.y = -30; c.x = Math.random()*W; } });
  }
  function drawCloud(c, color) {
    ctx.save();
    ctx.translate(c.x, c.y); ctx.scale(c.s, c.s);
    ctx.fillStyle = color || 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.ellipse(0,0,22,12,0,0,Math.PI*2);
    ctx.ellipse(-16,4,14,10,0,0,Math.PI*2);
    ctx.ellipse(16,4,14,10,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
