      const pulse = 1+Math.sin(pulsePhase)*0.1;
      ctx.translate(d.x, d.y); ctx.scale(pulse,pulse);
      ctx.strokeStyle = '#ff3366'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    });
  }

  function render() {
    pulsePhase += 0.08;
    drawScene(ctxA, false);
    drawScene(ctxB, true);
    rafId = requestAnimationFrame(render);
  }

  function handleClick(evt, canvas) {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const x = (evt.clientX-rect.left)*scaleX, y = (evt.clientY-rect.top)*scaleY;
    let hit = false;
    diffs.forEach(d => {
      if (d.found) return;
      if (Math.hypot(x-d.x, y-d.y) < 22) {
        d.found = true;
        hit = true;
        score += Math.max(10, Math.round(timeLeft*0.5));
        scoreEl.textContent = score;
        foundEl.textContent = diffs.filter(dd=>dd.found).length;
      }
    });
    if (hit && diffs.every(d=>d.found)) {
      score += 50;
      scoreEl.textContent = score;
      setTimeout(nextRound, 500);
    }
  }

  function nextRound() {
    if (!running) return;
    generateScene();
    generateDiffs();
    foundEl.textContent = 0;
    totalEl.textContent = diffs.length;
  }

  function tickCountdown() {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft<=0) return endGame();
    countdownTimer = setTimeout(tickCountdown, 1000);
  }

  function endGame() {
    running = false;
    if (countdownTimer) clearTimeout(countdownTimer);
    const earned = convertScoreToCoins('spotdiff', score);
    overlay.style.display = 'flex';
    overlayTitle.textContent = '時間到！';
    overlayDesc.innerHTML = `最終分數：<strong style="color:#ffc857">${score}</strong>　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '再玩一次';
  }

  function start() {
    score = 0; timeLeft = 90;
    scoreEl.textContent = 0; timeEl.textContent = 90;
    generateScene();
    generateDiffs();
    foundEl.textContent = 0;
    totalEl.textContent = diffs.length;
    running = true;
    overlay.style.display = 'none';
    countdownTimer = setTimeout(tickCountdown, 1000);
  }

  function onClickA(e) { handleClick(e, canvasA); }
  function onClickB(e) { handleClick(e, canvasB); }

  canvasA.addEventListener('click', onClickA);
  canvasB.addEventListener('click', onClickB);
  startBtn.addEventListener('click', start);

  generateScene();
  generateDiffs();
  render();

  window.__spotdiffCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (countdownTimer) clearTimeout(countdownTimer);
    canvasA.removeEventListener('click', onClickA);
    canvasB.removeEventListener('click', onClickB);
  };
}



// ===== game-nonogram.js =====
// ============================================================
// NONOGRAM GAME — 魔法數織畫 (Magic Picture-Cross Puzzle)
// Classic nonogram: fill cells per row/column clue numbers to
// reveal a pixel-art picture. 5 hand-verified symmetric patterns.
// ============================================================

function mountNonogramGame(container, gameDef) {
  container.innerHTML = `
    <div id="nonoRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#2a1a4a,#4a2a6c);position:relative;overflow:hidden;padding:8px;">
      <div id="nonoHUD" style="position:absolute;top:64px;display:flex;gap:18px;align-items:center;color:#fff;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>圖案 <strong id="nonoIdx" style="color:#ffc857;">1</strong>/<span id="nonoTotal">5</span></span>
        <span>分數 <strong id="nonoScore" style="color:#a29bfe;">0</strong></span>
        <span>錯誤 <strong id="nonoMistakes" style="color:#ff6fa5;">0</strong></span>
      </div>
      <canvas id="nonoCanvas" width="320" height="320" style="border-radius:10px;box-shadow:0 12px 30px rgba(20,10,50,0.4);background:#fdf6ec;margin-top:60px;max-width:90vw;cursor:pointer;"></canvas>
      <div style="position:absolute;bottom:14px;color:rgba(255,255,255,0.65);font-size:11px;letter-spacing:0.5px;text-align:center;">點擊填色 ・ 依照上方/左方數字提示填出正確圖案<br>數字代表該行/列連續方格的長度</div>
      <div id="nonoOverlay" style="display:flex;position:absolute;inset:0;background:rgba(15,8,35,0.75);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🧶</div>
        <h2 id="nonoOverlayTitle" style="font-size:26px;letter-spacing:3px;">魔法數織畫</h2>
        <p id="nonoOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">依照行列旁的數字提示<br>點擊填色，數字代表連續色塊長度<br>填對所有格子就能看到隱藏的圖案！</p>
        <button id="nonoStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #a29bfe;background:rgba(162,155,254,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始遊戲</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('nonoCanvas');
  const ctx = canvas.getContext('2d');
  const idxEl = document.getElementById('nonoIdx');
  const totalEl = document.getElementById('nonoTotal');
  const scoreEl = document.getElementById('nonoScore');
  const mistakesEl = document.getElementById('nonoMistakes');
  const overlay = document.getElementById('nonoOverlay');
  const overlayTitle = document.getElementById('nonoOverlayTitle');
  const overlayDesc = document.getElementById('nonoOverlayDesc');
  const startBtn = document.getElementById('nonoStartBtn');

  function currentTheme() {
    const item = getEquipped('nonogram', 'character');
    return item ? item.colors : { fill: '#5a4a9c', clueText: '#2b2440', grid: 'rgba(40,30,60,0.25)', board: '#fdf6ec' };
  }

  // Hand-verified symmetric 10x10 patterns (see dev-time verification)
  const PATTERN_NAMES = ['愛心','星鑽','聖誕樹','小屋','貓咪臉'];
  const PATTERNS = [
    ['0110000110','1111001111','1111111111','1111111111','0111111110','0011111100','0001111000','0000110000','0000000000','0000000000'],
    ['0000110000','0001111000','0011111100','0111111110','1111111111','1111111111','0111111110','0011111100','0001111000','0000110000'],
    ['0000110000','0001111000','0011111100','0111111110','1111111111','0000110000','0000110000','0000110000','0001111000','0000000000'],
    ['0000110000','0001111000','0011111100','0111111110','1111111111','1111111111','1100110011','1100110011','1100110011','1111111111'],
    ['1000000001','1100000011','1110000111','0111111110','0111111110','0110110110','0110110110','0110110110','0011111100','0000000000']
  ];

  const N = 10;
  let patternIdx = 0;
  let solution, playerGrid, rowClues, colClues;
  let score = 0, mistakes = 0, running = false, gameWon = false;
  let cellSize, gridOffX, gridOffY;

  function buildClues(rows) {
    const rowC = rows.map(r => {
      const runs = r.split('0').filter(s=>s.length>0).map(s=>s.length);
      return runs.length ? runs : [0];
    });
    const colC = [];
    for (let c=0;c<N;c++) {
      const col = [];
      for (let r=0;r<N;r++) col.push(rows[r][c]);
      const colStr = col.join('');
      const runs = colStr.split('0').filter(s=>s.length>0).map(s=>s.length);
      colC.push(runs.length ? runs : [0]);
    }
    return { rowC, colC };
  }

  function loadPattern(idx) {
    const rows = PATTERNS[idx];
    solution = rows.map(r => r.split('').map(ch => ch==='1'));
    playerGrid = Array.from({length:N}, () => Array(N).fill(false));
    const { rowC, colC } = buildClues(rows);
    rowClues = rowC; colClues = colC;
    mistakes = 0;
    mistakesEl.textContent = 0;
    idxEl.textContent = idx+1;
    gameWon = false;

    // compute layout: leave room for clues (left margin for row clues, top margin for col clues)
    const maxColClueLines = Math.max(...colClues.map(c=>c.length));
    const maxRowClueChars = Math.max(...rowClues.map(c=>c.join(' ').length));
    gridOffX = Math.max(46, maxRowClueChars*7+10);
    gridOffY = Math.max(40, maxColClueLines*14+8);
    const availW = canvas.width - gridOffX - 6;
    const availH = canvas.height - gridOffY - 6;
    cellSize = Math.min(availW, availH) / N;
  }

  function checkWin() {
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      if (playerGrid[r][c] !== solution[r][c]) return false;
    }
    return true;
  }

  function handleClick(evt) {
    if (!running || gameWon) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const x = (evt.clientX-rect.left)*scaleX, y = (evt.clientY-rect.top)*scaleY;
    if (x < gridOffX || y < gridOffY) return;
    const c = Math.floor((x-gridOffX)/cellSize), r = Math.floor((y-gridOffY)/cellSize);
    if (r<0||r>=N||c<0||c>=N) return;
    if (playerGrid[r][c]) {
      playerGrid[r][c] = false;
      return;
    }
    if (solution[r][c]) {
      playerGrid[r][c] = true;
      score += 5;
      scoreEl.textContent = score;
      if (checkWin()) {
        gameWon = true;
        setTimeout(onPatternComplete, 400);
      }
    } else {
      mistakes++;
      mistakesEl.textContent = mistakes;
      flashWrong(c,r);
    }
  }

  let wrongFlashCell = null, wrongFlashUntil = 0;
  function flashWrong(c,r) {
    wrongFlashCell = [r,c];
    wrongFlashUntil = performance.now()+300;
  }

  function onPatternComplete() {
    const earned = convertScoreToCoins('nonogram', 60);
    if (patternIdx >= PATTERNS.length-1) {
      running = false;
      overlay.style.display='flex';
      overlayTitle.textContent = '全部圖案完成！';
      overlayDesc.innerHTML = `恭喜畫完所有 ${PATTERNS.length} 張圖！最終分數：${score}<br>獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
      startBtn.textContent = '重新挑戰';
      patternIdx = 0;
      score = 0;
      scoreEl.textContent = 0;
    } else {
      running = false;
      overlay.style.display='flex';
      overlayTitle.textContent = `完成「${PATTERN_NAMES[patternIdx]}」！`;
      overlayDesc.innerHTML = `獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣<br>準備挑戰下一張圖案...`;
      startBtn.textContent = '下一張';
      patternIdx++;
    }
  }

  function draw() {
    const theme = currentTheme();
    ctx.fillStyle = theme.board;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // column clues
    ctx.fillStyle = theme.clueText;
    ctx.font = `${Math.max(9,cellSize*0.32)}px sans-serif`;
    ctx.textAlign = 'center';
    colClues.forEach((clue, c) => {
      const x = gridOffX + c*cellSize + cellSize/2;
      clue.forEach((num,i) => {
        const y = gridOffY - (clue.length-i)*13 - 2;
        ctx.fillText(num, x, y);
      });
    });
    // row clues
    ctx.textAlign = 'right';
    rowClues.forEach((clue, r) => {
      const y = gridOffY + r*cellSize + cellSize/2 + 4;
      ctx.fillText(clue.join(' '), gridOffX-6, y);
    });

    // grid cells
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const x = gridOffX+c*cellSize, y = gridOffY+r*cellSize;
      const isWrong = wrongFlashCell && wrongFlashCell[0]===r && wrongFlashCell[1]===c && performance.now()<wrongFlashUntil;
      ctx.fillStyle = playerGrid[r][c] ? theme.fill : (isWrong ? 'rgba(255,80,80,0.4)' : 'transparent');
      if (playerGrid[r][c] || isWrong) ctx.fillRect(x+1,y+1,cellSize-2,cellSize-2);
    }
    // grid lines
    ctx.strokeStyle = theme.grid; ctx.lineWidth=1;
    for (let i=0;i<=N;i++) {
      const lw = (i%5===0) ? 2 : 1;
      ctx.lineWidth = lw;
      ctx.beginPath(); ctx.moveTo(gridOffX+i*cellSize, gridOffY); ctx.lineTo(gridOffX+i*cellSize, gridOffY+N*cellSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(gridOffX, gridOffY+i*cellSize); ctx.lineTo(gridOffX+N*cellSize, gridOffY+i*cellSize); ctx.stroke();
    }
  }

  let rafId = null;
  function render() { draw(); rafId = requestAnimationFrame(render); }

  function start() {
    loadPattern(patternIdx);
    running = true;
    overlay.style.display = 'none';
  }

  canvas.addEventListener('click', handleClick);
  startBtn.addEventListener('click', () => {
    if (!running) start();
  });

  loadPattern(0);
  render();

  window.__nonogramCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    canvas.removeEventListener('click', handleClick);
  };
}



// ===== game-pet.js =====
// ============================================================
// VIRTUAL PET GAME — 靈靈寵物屋 (Spirit Pet House)
// Care for a cute spirit pet: feed, play, sleep, bathe to keep
// its stats up. Sustained good care earns coins and levels up the pet.
// ============================================================

function mountPetGame(container, gameDef) {
  container.innerHTML = `
    <div id="petRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#ffe9f0,#ffd9e8);position:relative;overflow:hidden;">
      <div id="petHUD" style="position:absolute;top:64px;display:flex;gap:16px;align-items:center;color:#6a2a4a;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>等級 <strong id="petLevel" style="color:#ff6fa5;">1</strong></span>
        <span>照護分數 <strong id="petScore" style="color:#ffc857;">0</strong></span>
      </div>
      <canvas id="petCanvas" width="320" height="280" style="border-radius:16px;box-shadow:0 12px 30px rgba(150,50,90,0.2);background:#fff5f8;margin-top:60px;max-width:90vw;"></canvas>
      <div id="petStats" style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center;max-width:340px;"></div>
      <div id="petButtons" style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center;max-width:340px;"></div>
      <div id="petOverlay" style="display:flex;position:absolute;inset:0;background:rgba(120,40,80,0.5);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🐾</div>
        <h2 id="petOverlayTitle" style="font-size:26px;letter-spacing:3px;">靈靈寵物屋</h2>
        <p id="petOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">餵食、陪玩、哄睡、洗澡<br>讓寵物保持開心健康，狀態越好分數累積越快<br>持續照顧能讓寵物升級，並換得金幣獎勵！</p>
        <button id="petStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #ff6fa5;background:rgba(255,111,165,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始飼養</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('petCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const levelEl = document.getElementById('petLevel');
  const scoreEl = document.getElementById('petScore');
  const statsContainer = document.getElementById('petStats');
  const buttonsContainer = document.getElementById('petButtons');
  const overlay = document.getElementById('petOverlay');
  const overlayTitle = document.getElementById('petOverlayTitle');
  const overlayDesc = document.getElementById('petOverlayDesc');
  const startBtn = document.getElementById('petStartBtn');

  function currentPetSkin() {
    const item = getEquipped('pet', 'character');
    return item ? item.colors : { body: '#ff9bb8', belly: '#fff', cheek: '#ff6fa5' };
  }
  function currentRoomTheme() {
    const item = getEquipped('pet', 'background');
    return item ? item.colors : { bg: '#fff5f8', floor: '#ffd9e8' };
  }

  const STAT_DEFS = [
    { key: 'hunger', label: '飽食', color: '#ff8a3a', icon: '🍖' },
    { key: 'happy', label: '開心', color: '#ffc857', icon: '😊' },
    { key: 'energy', label: '精神', color: '#5ec8e8', icon: '⚡' },
    { key: 'clean', label: '清潔', color: '#55e6a5', icon: '🛁' }
  ];

  let stats = { hunger:80, happy:80, energy:80, clean:80 };
  let level = 1, careScore = 0, running = false;
  let sleeping = false;
  let speech = '', speechUntil = 0;
  let particles = [];
  let rafId = null, tickTimer = null;
  let bounce = 0;
  let lastTickTime = 0;

  const LEVEL_CAP = 5;
  function scoreForNextLevel(lvl) { return lvl * 300; }

  function clamp(v) { return Math.max(0, Math.min(100, v)); }

  function setSpeech(text) { speech = text; speechUntil = performance.now() + 2400; }

  function feed() {
    if (!running) return;
    stats.hunger = clamp(stats.hunger + 28);
    setSpeech('好好吃！謝謝你～ 🍖');
    spawnParticles('#ffb088');
  }
  function play() {
    if (!running) return;
    stats.happy = clamp(stats.happy + 22);
    stats.energy = clamp(stats.energy - 10);
    setSpeech('哇～陪我玩好開心！');
    spawnParticles('#ffc857');
  }
  function bathe() {
    if (!running) return;
    stats.clean = clamp(stats.clean + 30);
    setSpeech('洗香香，好舒服～');
    spawnParticles('#5ec8e8');
  }
  function toggleSleep() {
    if (!running) return;
    sleeping = !sleeping;
    setSpeech(sleeping ? '呼呼...晚安 💤' : '我醒了！');
  }

  function spawnParticles(color) {
    for (let i=0;i<8;i++) {
      const a = Math.random()*Math.PI*2, s = Math.random()*2+1;
      particles.push({ x: W/2, y: H*0.45, vx: Math.cos(a)*s, vy: Math.sin(a)*s-1, life:1, color });
    }
  }
  function updateParticles() {
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life-=0.025;});
  }
  function drawParticles() {
    particles.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  function tick() {
    if (!running) return;
    const decayRate = sleeping ? 0.3 : 1;
    stats.hunger = clamp(stats.hunger - 1.2*decayRate);
    stats.happy = clamp(stats.happy - 1*decayRate);
    stats.clean = clamp(stats.clean - 0.6*decayRate);
    stats.energy = clamp(stats.energy + (sleeping ? 4 : -0.8));

    const avg = (stats.hunger+stats.happy+stats.energy+stats.clean)/4;
    const gained = Math.round(avg/100 * 8);
    careScore += gained;
    scoreEl.textContent = careScore;

    if (level < LEVEL_CAP && careScore >= scoreForNextLevel(level)) {
      level++;
      levelEl.textContent = level;
      setSpeech(`升級了！等級 ${level} 🎉`);
      const earned = convertScoreToCoins('pet', 60);
      spawnParticles('#ff6fa5');
      if (level >= LEVEL_CAP) {
        setTimeout(() => showMilestone(earned), 800);
      }
    }

    updateStatsUI();
    renderStatusSpeech();
    tickTimer = setTimeout(tick, 1000);
  }

  function renderStatusSpeech() {
    if (performance.now() < speechUntil) return;
    const lowest = STAT_DEFS.reduce((a,b) => stats[a.key] < stats[b.key] ? a : b);
    if (stats[lowest.key] < 35) {
      const msgs = {
        hunger: '肚子好餓...有東西吃嗎？',
        happy: '好無聊，陪我玩嘛！',
        energy: '好睏...讓我睡一下',
        clean: '我想洗澡澡了～'
      };
      setSpeech(msgs[lowest.key]);
    } else if (Math.random()<0.3) {
      const happyMsgs = ['今天好開心！','有你照顧真好～','嘿嘿～','咕嚕咕嚕～'];
      setSpeech(happyMsgs[Math.floor(Math.random()*happyMsgs.length)]);
    }
  }

  function showMilestone(earned) {
    running = false;
    overlay.style.display = 'flex';
    overlayTitle.textContent = '寵物已成長茁壯！';
    overlayDesc.innerHTML = `達到最高等級 ${LEVEL_CAP}！累積照護分數：${careScore}<br>獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '繼續飼養新階段';
  }

  function updateStatsUI() {
    STAT_DEFS.forEach(def => {
      const bar = document.getElementById('petStatBar_'+def.key);
      if (bar) bar.style.width = stats[def.key]+'%';
    });
  }

  function buildStatsUI() {
    statsContainer.innerHTML = STAT_DEFS.map(def => `
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <span style="font-size:11px;color:#6a2a4a;">${def.icon} ${def.label}</span>
        <span style="width:60px;height:8px;background:rgba(0,0,0,0.1);border-radius:4px;overflow:hidden;display:inline-block;">
          <span id="petStatBar_${def.key}" style="display:block;height:100%;width:${stats[def.key]}%;background:${def.color};transition:width 0.3s;"></span>
        </span>
      </div>
    `).join('');
  }

  function buildButtons() {
    buttonsContainer.innerHTML = `
      <button id="petFeedBtn" style="padding:8px 16px;border-radius:20px;border:none;background:#ff8a3a;color:#fff;font-weight:700;font-size:12px;cursor:pointer;">🍖 餵食</button>
      <button id="petPlayBtn" style="padding:8px 16px;border-radius:20px;border:none;background:#ffc857;color:#5a4a1a;font-weight:700;font-size:12px;cursor:pointer;">🎾 玩耍</button>
      <button id="petBatheBtn" style="padding:8px 16px;border-radius:20px;border:none;background:#5ec8e8;color:#fff;font-weight:700;font-size:12px;cursor:pointer;">🛁 洗澡</button>
      <button id="petSleepBtn" style="padding:8px 16px;border-radius:20px;border:none;background:#a29bfe;color:#fff;font-weight:700;font-size:12px;cursor:pointer;">💤 睡覺</button>
    `;
    document.getElementById('petFeedBtn').addEventListener('click', feed);
    document.getElementById('petPlayBtn').addEventListener('click', play);
    document.getElementById('petBatheBtn').addEventListener('click', bathe);
    document.getElementById('petSleepBtn').addEventListener('click', toggleSleep);
  }

  function drawPet() {
    const skin = currentPetSkin();
    bounce += 0.05;
    const sizeMult = 1 + (level-1)*0.08;
    const by = sleeping ? Math.sin(bounce*0.5)*1 : Math.sin(bounce)*3;
    ctx.save();
    ctx.translate(W/2, H*0.48 + by);
    ctx.scale(sizeMult, sizeMult);

    // body
    ctx.save(); ctx.shadowBlur=10; ctx.shadowColor=skin.body;
    ctx.fillStyle = skin.body;
    ctx.beginPath(); ctx.ellipse(0,0,46,42,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = skin.belly;
    ctx.beginPath(); ctx.ellipse(0,14,28,22,0,0,Math.PI*2); ctx.fill();

    // ears
    ctx.fillStyle = skin.body;
    ctx.beginPath(); ctx.ellipse(-32,-30,12,16,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(32,-30,12,16,0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = skin.cheek;
    ctx.beginPath(); ctx.ellipse(-32,-28,5,7,-0.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(32,-28,5,7,0.3,0,Math.PI*2); ctx.fill();

    // face
    if (sleeping) {
      ctx.strokeStyle = '#2b2440'; ctx.lineWidth=2.4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-18,-6); ctx.quadraticCurveTo(-12,-2,-6,-6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(6,-6); ctx.quadraticCurveTo(12,-2,18,-6); ctx.stroke();
      ctx.fillStyle='#a29bfe'; ctx.font='bold 14px sans-serif';
      ctx.fillText('z z z', 24, -36);
    } else {
      const lowest = STAT_DEFS.reduce((a,b) => stats[a.key] < stats[b.key] ? a : b);
      const sad = stats[lowest.key] < 30;
      ctx.fillStyle = '#2b2440';
      ctx.beginPath(); ctx.ellipse(-14,-8,4.5,sad?3.5:5.5,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(14,-8,4.5,sad?3.5:5.5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-12,-10,1.6,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(16,-10,1.6,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#a05050'; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath();
      if (sad) ctx.arc(0,8,7,Math.PI*1.2,Math.PI*1.8);
      else ctx.arc(0,2,8,0.15*Math.PI,0.85*Math.PI);
      ctx.stroke();
    }
    // cheeks
    ctx.fillStyle = 'rgba(255,140,160,0.4)';
    ctx.beginPath(); ctx.ellipse(-26,4,7,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(26,4,7,4.5,0,0,Math.PI*2); ctx.fill();

    ctx.restore();

    // speech bubble
    if (performance.now() < speechUntil && speech) {
      ctx.save();
      ctx.font = 'bold 12px sans-serif';
      const textW = ctx.measureText(speech).width;
      const bx = W/2, by2 = H*0.48 - 70*sizeMult;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      roundRectPath(ctx, bx-textW/2-12, by2-16, textW+24, 32, 12);
      ctx.fill();
      ctx.beginPath(); ctx.moveTo(bx-8,by2+16); ctx.lineTo(bx,by2+26); ctx.lineTo(bx+8,by2+16); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#6a2a4a'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(speech, bx, by2);
      ctx.restore();
    }
  }

  function draw() {
    const theme = currentRoomTheme();
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = theme.floor;
    ctx.fillRect(0,H*0.75,W,H*0.25);
    drawParticles();
    drawPet();
  }

  function render() { draw(); updateParticles(); rafId = requestAnimationFrame(render); }

  function start() {
    stats = { hunger:80, happy:80, energy:80, clean:80 };
    level = 1; careScore = 0; sleeping = false;
    levelEl.textContent = 1; scoreEl.textContent = 0;
    buildStatsUI();
    buildButtons();
    updateStatsUI();
    running = true;
    overlay.style.display = 'none';
    setSpeech('你好！我是你的新寵物～');
    clearTimeout(tickTimer);
    tickTimer = setTimeout(tick, 1000);
  }

  buildStatsUI();
  buildButtons();
  startBtn.addEventListener('click', start);

  render();

  window.__petCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (tickTimer) clearTimeout(tickTimer);
  };
}



// ===== game-idle.js =====
// ============================================================
// IDLE GAME — 靈晶礦脈 (Spirit Crystal Mine)
// Click crystals to earn gems; buy upgrades that auto-generate
// gems per second. Offline earnings calculated on re-entry.
// ============================================================

function mountIdleGame(container, gameDef) {
  container.innerHTML = `
    <div id="idleRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#1a1245,#2d1f6b);position:relative;overflow:hidden;padding:8px;">
      <div id="idleHUD" style="position:absolute;top:64px;display:flex;gap:16px;align-items:center;color:#fff;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>💎 <strong id="idleGems" style="color:#a29bfe;">0</strong></span>
        <span>每秒 <strong id="idleGps" style="color:#5ec8e8;">0</strong></span>
        <span>金幣 <strong id="idleCoins" style="color:#ffc857;">0</strong></span>
      </div>
      <div style="display:flex;gap:10px;margin-top:40px;align-items:flex-start;max-width:420px;width:100%;flex-wrap:wrap;justify-content:center;">
        <canvas id="idleCanvas" width="180" height="200" style="border-radius:14px;box-shadow:0 10px 24px rgba(20,10,50,0.4);background:#231a60;cursor:pointer;flex-shrink:0;"></canvas>
        <div id="idleUpgrades" style="flex:1;min-width:160px;display:flex;flex-direction:column;gap:7px;max-height:220px;overflow-y:auto;"></div>
      </div>
      <div id="idleConvertBar" style="margin-top:12px;display:flex;gap:10px;align-items:center;">
        <button id="idleConvertBtn" style="padding:8px 20px;border-radius:20px;border:2px solid #ffc857;background:rgba(255,200,87,0.15);color:#ffc857;font-weight:800;font-size:12px;cursor:pointer;">💰 換算金幣</button>
        <span style="color:rgba(255,255,255,0.65);font-size:11px;">每 10 靈晶 = 1 金幣</span>
      </div>
      <div style="position:absolute;bottom:10px;color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:0.5px;">點擊礦晶收集靈晶 ・ 購買礦工讓靈晶自動增加 ・ 再次進入可領取離線收益</div>
      <div id="idleOverlay" style="display:flex;position:absolute;inset:0;background:rgba(10,5,35,0.8);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">💎</div>
        <h2 id="idleOverlayTitle" style="font-size:26px;letter-spacing:3px;">靈晶礦脈</h2>
        <p id="idleOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">點擊礦晶收集靈晶寶石<br>購買礦工讓靈晶自動增加<br>即使離開遊戲，礦工也不會停工！</p>
        <button id="idleStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #a29bfe;background:rgba(162,155,254,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始挖礦</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('idleCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const gemsEl = document.getElementById('idleGems');
  const gpsEl = document.getElementById('idleGps');
  const coinsEl = document.getElementById('idleCoins');
  const upgradesEl = document.getElementById('idleUpgrades');
  const convertBtn = document.getElementById('idleConvertBtn');
  const overlay = document.getElementById('idleOverlay');
  const overlayTitle = document.getElementById('idleOverlayTitle');
  const overlayDesc = document.getElementById('idleOverlayDesc');
  const startBtn = document.getElementById('idleStartBtn');

  const UPGRADES = [
    { id: 'pickaxe', name: '礦工精靈', icon: '⛏️', baseCost: 12, baseGps: 0.5, count: 0 },
    { id: 'lamp', name: '魔法礦燈', icon: '🪔', baseCost: 80, baseGps: 4, count: 0 },
    { id: 'golem', name: '挖礦土靈', icon: '🗿', baseCost: 450, baseGps: 22, count: 0 },
    { id: 'dragon', name: '靈龍助手', icon: '🐉', baseCost: 2000, baseGps: 100, count: 0 },
    { id: 'portal', name: '晶礦傳送門', icon: '🌀', baseCost: 10000, baseGps: 500, count: 0 },
  ];

  function costFor(upg) { return Math.floor(upg.baseCost * Math.pow(1.15, upg.count)); }
  function totalGps() { return UPGRADES.reduce((s,u) => s + u.baseGps*u.count, 0); }

  let gems = 0, coins = 0, lastSaveTime = 0;
  let running = false, rafId = null, autoTick = null;
  let clickParticles = [];
  let crystalPhase = 0;

  // ---- Persistence via in-memory state (no localStorage in artifact) ----
  // To simulate "offline earnings" we store when game was last active.
  // If we re-enter the game screen during the same session, offline time is counted.
  let sessionStartGems = 0, sessionStartGps = 0, sessionStartTime = 0;

  function fmt(n) {
    if (n < 1000) return Math.floor(n).toString();
    if (n < 1e6) return (n/1000).toFixed(1)+'K';
    return (n/1e6).toFixed(2)+'M';
  }

  function addGem(amount) {
    gems += amount;
    gemsEl.textContent = fmt(gems);
  }

  function clickCrystal() {
    if (!running) return;
    const clickValue = 1 + Math.floor(totalGps()*0.1);
    addGem(clickValue);
    clickParticles.push({ x: W/2+(Math.random()-0.5)*40, y: H*0.52, life:1, text:`+${clickValue}` });
  }

  function autoGenerate() {
    if (!running) return;
    const gps = totalGps();
    addGem(gps);
    gpsEl.textContent = fmt(gps)+'/s';
    autoTick = setTimeout(autoGenerate, 1000);
  }

  function buyUpgrade(upg) {
    const cost = costFor(upg);
    if (gems < cost) return;
    gems -= cost;
    upg.count++;
    gemsEl.textContent = fmt(gems);
    renderUpgrades();
  }

  function convertGems() {
    const convertable = Math.floor(gems/10);
    if (convertable < 1) return;
    const earned = convertable;
    gems -= convertable*10;
    coins += earned;
    coinsEl.textContent = fmt(coins);
    gemsEl.textContent = fmt(gems);
    Wallet.add(earned);
    overlayTitle.textContent = '兌換成功！';
    overlayDesc.innerHTML = `兌換了 ${convertable*10} 靈晶　獲得 <span style="color:#ffc857;">💰${earned}</span> 金幣`;
    startBtn.textContent = '繼續挖礦';
    overlay.style.display = 'flex';
    setTimeout(() => { overlay.style.display='none'; }, 1800);
  }

  function renderUpgrades() {
    upgradesEl.innerHTML = UPGRADES.map(upg => {
      const cost = costFor(upg);
      const canAfford = gems >= cost;
      return `<div style="background:rgba(255,255,255,0.06);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px;border:1px solid rgba(162,155,254,${canAfford?'0.5':'0.15'});">
        <span style="font-size:18px;">${upg.icon}</span>
        <div style="flex:1;min-width:0;">
          <div style="color:#fff;font-weight:700;font-size:11px;">${upg.name} x${upg.count}</div>
          <div style="color:#a29bfe;font-size:10px;">${fmt(upg.baseGps*upg.count)}/s</div>
        </div>
        <button data-id="${upg.id}" style="padding:4px 8px;border-radius:10px;border:none;background:${canAfford?'#a29bfe':'rgba(255,255,255,0.1)'};color:${canAfford?'#fff':'rgba(255,255,255,0.35)'};font-weight:700;font-size:10px;cursor:${canAfford?'pointer':'default'};">💎${fmt(cost)}</button>
      </div>`;
    }).join('');
    upgradesEl.querySelectorAll('[data-id]').forEach(btn => {
      const upg = UPGRADES.find(u=>u.id===btn.dataset.id);
      btn.addEventListener('click', () => buyUpgrade(upg));
    });
  }

  function drawCrystal() {
    crystalPhase += 0.04;
    const glow = 0.5+Math.sin(crystalPhase)*0.3;
    ctx.fillStyle = '#1f1654';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.translate(W/2, H*0.48);
    ctx.save();
    ctx.shadowBlur=20+glow*10; ctx.shadowColor='#a29bfe';
    ctx.fillStyle = `hsl(250,70%,${55+glow*10}%)`;
    ctx.beginPath();
    ctx.moveTo(0,-50); ctx.lineTo(30,0); ctx.lineTo(20,40); ctx.lineTo(-20,40); ctx.lineTo(-30,0);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.moveTo(0,-50); ctx.lineTo(-30,0); ctx.lineTo(-8,-20); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.moveTo(0,-50); ctx.lineTo(30,0); ctx.lineTo(8,-15); ctx.closePath(); ctx.fill();
    ctx.restore();
    // sparkles
    for (let i=0;i<3;i++) {
      const a = crystalPhase*1.3+i*Math.PI*2/3;
      const r=54+Math.sin(crystalPhase+i)*6;
      const sx=Math.cos(a)*r, sy=Math.sin(a)*r;
      ctx.fillStyle=`rgba(162,155,254,${0.3+glow*0.4})`;
      ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    // click particles
    clickParticles = clickParticles.filter(p=>p.life>0);
    clickParticles.forEach(p=>{
      p.y -= 1.5; p.life -= 0.04;
      ctx.save(); ctx.globalAlpha=p.life;
      ctx.fillStyle='#ffc857'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(p.text,p.x,p.y);
      ctx.restore();
    });
  }

  let rafRunning = false;
  function render() { drawCrystal(); rafId = requestAnimationFrame(render); }

  function checkOfflineEarnings() {
    if (sessionStartTime > 0 && totalGps() > 0) {
      const elapsed = Math.min((Date.now() - sessionStartTime)/1000, 3600);
      if (elapsed > 5) {
        const offline = Math.floor(totalGps() * elapsed);
        addGem(offline);
        overlayTitle.textContent = '離線收益！';
        overlayDesc.innerHTML = `離開了 ${Math.floor(elapsed)} 秒<br>礦工自動採集了 <strong style="color:#a29bfe">💎${fmt(offline)}</strong>！`;
        startBtn.textContent = '繼續挖礦';
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.display='none'; }, 2000);
      }
    }
    sessionStartTime = Date.now();
    sessionStartGps = totalGps();
  }

  function start() {
    checkOfflineEarnings();
    running = true;
    overlay.style.display = 'none';
    renderUpgrades();
    clearTimeout(autoTick);
    autoTick = setTimeout(autoGenerate, 1000);
  }

  canvas.addEventListener('click', clickCrystal);
  canvas.addEventListener('touchend', (e)=>{ e.preventDefault(); clickCrystal(); }, {passive:false});
  convertBtn.addEventListener('click', convertGems);
  startBtn.addEventListener('click', start);

  render();
  renderUpgrades();

  window.__idleCleanup = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (autoTick) clearTimeout(autoTick);
    canvas.removeEventListener('click', clickCrystal);
  };
}

// ============================================================
// FARM GAME — 靈野田園 (Spirit Meadow Farm)
// Plant seeds, water crops, harvest when fully grown.
// 3×4 grid of plots. Different crops have different growth times.
// Earn gold by selling harvests; buy better seeds and expansions.
// ============================================================

function mountFarmGame(container, gameDef) {
  container.innerHTML = `
    <div id="farmRoot" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#d4f0e8,#a8e8b8);position:relative;overflow:hidden;padding:6px;">
      <div id="farmHUD" style="position:absolute;top:64px;display:flex;gap:16px;align-items:center;color:#1a4a28;font-weight:800;font-size:13px;letter-spacing:1px;z-index:5;">
        <span>金幣 <strong id="farmCoins" style="color:#ffc857;">0</strong></span>
        <span>總收成 <strong id="farmHarvest" style="color:#55a630;">0</strong></span>
        <span>季節 <strong id="farmSeason" style="color:#ff8a3a;">春</strong></span>
      </div>
      <div style="display:flex;gap:10px;margin-top:38px;align-items:flex-start;flex-wrap:wrap;justify-content:center;">
        <canvas id="farmCanvas" width="276" height="260" style="border-radius:14px;box-shadow:0 10px 24px rgba(20,60,30,0.25);background:#c8e0a8;cursor:pointer;"></canvas>
        <div style="display:flex;flex-direction:column;gap:7px;min-width:120px;">
          <div style="color:#1a4a28;font-weight:800;font-size:12px;letter-spacing:1px;margin-bottom:2px;">🌱 選擇種子</div>
          <div id="farmSeedBtns" style="display:flex;flex-direction:column;gap:6px;"></div>
          <button id="farmWaterAllBtn" style="margin-top:8px;padding:7px 12px;border-radius:14px;border:2px solid #5ec8e8;background:rgba(94,200,232,0.15);color:#0a4a6a;font-weight:700;font-size:11px;cursor:pointer;">💧 全部澆水</button>
        </div>
      </div>
      <div id="farmMsg" style="position:absolute;bottom:12px;color:#1a4a28;font-size:12px;letter-spacing:0.5px;font-weight:700;"></div>
      <div id="farmOverlay" style="display:flex;position:absolute;inset:0;background:rgba(30,80,40,0.55);flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;gap:14px;z-index:20;">
        <div style="font-size:40px;">🌻</div>
        <h2 id="farmOverlayTitle" style="font-size:26px;letter-spacing:3px;">靈野田園</h2>
        <p id="farmOverlayDesc" style="font-size:13px;opacity:0.9;max-width:280px;line-height:1.8;">選擇種子種在田地上<br>記得澆水讓作物快速成長<br>收成後賣出換取金幣，買更好的種子！</p>
        <button id="farmStartBtn" style="padding:10px 32px;border-radius:30px;border:2px solid #55a630;background:rgba(85,166,48,0.25);color:#fff;font-weight:700;letter-spacing:2px;cursor:pointer;">開始耕種</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('farmCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const coinsEl = document.getElementById('farmCoins');
  const harvestEl = document.getElementById('farmHarvest');
  const seasonEl = document.getElementById('farmSeason');
  const seedBtns = document.getElementById('farmSeedBtns');
  const waterAllBtn = document.getElementById('farmWaterAllBtn');
  const farmMsg = document.getElementById('farmMsg');
  const overlay = document.getElementById('farmOverlay');
  const overlayTitle = document.getElementById('farmOverlayTitle');
  const overlayDesc = document.getElementById('farmOverlayDesc');
  const startBtn = document.getElementById('farmStartBtn');

  function currentFarmerSkin() {
    const item = getEquipped('farm', 'character');
    return item ? item.colors : { hat: '#55a630', shirt: '#fff', skin: '#ffe0c2' };
  }
  function currentSkyTheme() {
    const item = getEquipped('farm', 'background');
    return item ? item.colors : { sky1: '#d4f0e8', sky2: '#a8e8b8', soil: '#8b5e3c', soilWet: '#6b3e1c' };
  }

  const CROPS = [
    { id: 'radish', name: '蘿蔔', icon: '🌱', emoji: '🥕', seedCost: 0, growTime: 8, value: 4, watered: false, color: '#ff6fa5' },
    { id: 'strawberry', name: '草莓', icon: '🍓', emoji: '🍓', seedCost: 5, growTime: 15, value: 12, watered: false, color: '#ff3355' },
    { id: 'pumpkin', name: '南瓜', icon: '🎃', emoji: '🎃', seedCost: 20, growTime: 30, value: 35, watered: false, color: '#ff8a3a' },
    { id: 'watermelon', name: '西瓜', icon: '🍉', emoji: '🍉', seedCost: 60, growTime: 60, value: 100, watered: false, color: '#2fae5c' },
  ];

  const ROWS = 3, COLS = 4;
  const CELL = Math.min(W/COLS, H/ROWS) - 4;
  const GRID_X = (W - COLS*CELL)/2, GRID_Y = (H - ROWS*CELL)/2 + 10;

  let plots; // { state: 'empty'|'seeded'|'growing'|'ready', crop: cropId, progress: 0-100, watered, plantTime }
  let coins = 0, totalHarvested = 0, selectedCrop = 0;
  let running = false, rafId = null, growthTick = null;
  let season = 0;
  const SEASONS = ['春','夏','秋','冬'];
  let dayTimer = 0;
  let particles = [];

  function emptyPlot() { return { state:'empty', crop:null, progress:0, watered:false, plantTime:0 }; }

  function reset() {
    plots = Array.from({length:ROWS*COLS}, emptyPlot);
    coins = 30; totalHarvested = 0; selectedCrop = 0; season = 0; dayTimer = 0;
    coinsEl.textContent = 0; harvestEl.textContent = 0; seasonEl.textContent = SEASONS[0];
  }

  function cropById(id) { return CROPS.find(c=>c.id===id); }
  function selectedCropDef() { return CROPS[selectedCrop]; }

  function plantAt(idx) {
    const plot = plots[idx];
    if (!running) return;
    if (plot.state !== 'empty') return;
    const crop = selectedCropDef();
    if (coins < crop.seedCost) { showMsg('金幣不足！需要'+crop.seedCost+'金幣'); return; }
    coins -= crop.seedCost;
    coinsEl.textContent = coins;
    plot.state = 'seeded';
    plot.crop = crop.id;
    plot.progress = 0;
    plot.watered = false;
    plot.plantTime = Date.now();
    showMsg('已種下'+crop.name+'！記得澆水 💧');
  }

  function waterAt(idx) {
    const plot = plots[idx];
    if (!plot.crop || plot.state==='empty' || plot.state==='ready') return;
    if (plot.watered) { showMsg('已經澆過水了！'); return; }
    plot.watered = true;
    showMsg('澆水完成！生長加速 💧');
    spawnWaterSplash(idx);
  }

  function harvestAt(idx) {
    const plot = plots[idx];
    if (plot.state !== 'ready') return;
    const crop = cropById(plot.crop);
    coins += crop.value;
    totalHarvested++;
    coinsEl.textContent = coins;
    harvestEl.textContent = totalHarvested;
    const earned = convertScoreToCoins('farm', crop.value);
    showMsg(`收成 ${crop.name} +${crop.value} 金幣！💰${earned}`);
    spawnHarvestBurst(idx);
    plots[idx] = emptyPlot();
  }

  function waterAll() {
    let count = 0;
    plots.forEach((_,i) => {
      const p = plots[i];
      if (p.crop && p.state !== 'empty' && p.state !== 'ready' && !p.watered) {
        p.watered = true; count++;
        spawnWaterSplash(i);
      }
    });
    if (count>0) showMsg(`澆了 ${count} 塊田！`);
    else showMsg('所有田地都澆過水了');
  }

  function growthUpdate() {
    if (!running) return;
    dayTimer++;
    if (dayTimer >= 20) { dayTimer=0; season=(season+1)%4; seasonEl.textContent=SEASONS[season]; }
    plots.forEach(plot => {
      if (!plot.crop || plot.state==='empty' || plot.state==='ready') return;
      const crop = cropById(plot.crop);
      const rate = plot.watered ? 2.5 : 1;
      plot.progress = Math.min(100, plot.progress + 100/(crop.growTime*10)*rate);
      if (plot.progress >= 100) { plot.state='ready'; plot.watered=false; }
    });
    growthTick = setTimeout(growthUpdate, 1000);
  }

  function spawnWaterSplash(idx) {
    const cx = GRID_X+(idx%COLS)*CELL+CELL/2, cy = GRID_Y+Math.floor(idx/COLS)*CELL+CELL/2;
    for (let i=0;i<5;i++) { const a=Math.random()*Math.PI*2,s=Math.random()*1.5+0.5; particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,color:'#5ec8e8'}); }
  }
  function spawnHarvestBurst(idx) {
    const cx = GRID_X+(idx%COLS)*CELL+CELL/2, cy = GRID_Y+Math.floor(idx/COLS)*CELL+CELL/2;
    for (let i=0;i<10;i++) { const a=Math.random()*Math.PI*2,s=Math.random()*2.5+1; particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,life:1,color:'#ffc857'}); }
  }
  function updateParticles() {
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.04;});
  }
  function drawParticles() {
    particles.forEach(p=>{
      ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.restore();
    });
  }

  let msgTimer = null;
  function showMsg(text) {
    farmMsg.textContent = text;
    clearTimeout(msgTimer);
    msgTimer = setTimeout(()=>{ farmMsg.textContent=''; },2200);
  }

  function drawPlot(idx) {
    const theme = currentSkyTheme();
    const plot = plots[idx];
    const x = GRID_X+(idx%COLS)*CELL, y = GRID_Y+Math.floor(idx/COLS)*CELL;
    const cx = x+CELL/2, cy = y+CELL/2;
    ctx.fillStyle = plot.watered ? theme.soilWet : theme.soil;
    roundRectPath(ctx, x+3,y+3,CELL-6,CELL-6,6); ctx.fill();
    if (plot.state==='seeded') {
      ctx.fillStyle='#8b6a3a';
      ctx.beginPath();ctx.arc(cx,cy+4,4,0,Math.PI*2);ctx.fill();
    } else if (plot.state==='growing') {
      const crop = cropById(plot.crop);
      const scale = 0.4+plot.progress/100*0.6;
      ctx.font = `${Math.round(CELL*0.45*scale)}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(crop.icon, cx, cy+2);
      ctx.fillStyle='rgba(0,0,0,0.15)';
      ctx.fillRect(x+6,y+CELL-12,CELL-12,7);
      ctx.fillStyle='#55e6a5';
      ctx.fillRect(x+6,y+CELL-12,(CELL-12)*plot.progress/100,7);
    } else if (plot.state==='ready') {
      const crop = cropById(plot.crop);
      ctx.font = `${Math.round(CELL*0.5)}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#ffe066';
      ctx.fillText(crop.emoji, cx, cy);ctx.restore();
    }
    if (selectedCrop!==undefined && plot.state==='empty') {
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
      roundRectPath(ctx,x+3,y+3,CELL-6,CELL-6,6);ctx.stroke();
    }
  }

  function draw() {
    const theme = currentSkyTheme();
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,theme.sky1);g.addColorStop(1,theme.sky2);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    for (let i=0;i<ROWS*COLS;i++) drawPlot(i);
    drawParticles();
  }

  function render() { updateParticles();draw();rafId=requestAnimationFrame(render); }

  function handleCanvasClick(e) {
    if (!running) return;
    const rect=canvas.getBoundingClientRect();
    const scaleX=W/rect.width,scaleY=H/rect.height;
    const mx=(e.clientX-rect.left)*scaleX,my=(e.clientY-rect.top)*scaleY;
    const col=Math.floor((mx-GRID_X)/CELL),row=Math.floor((my-GRID_Y)/CELL);
    if (col<0||col>=COLS||row<0||row>=ROWS) return;
    const idx=row*COLS+col;
    const plot=plots[idx];
    if (plot.state==='empty') plantAt(idx);
    else if (plot.state==='ready') harvestAt(idx);
    else waterAt(idx);
  }

  function buildSeedUI() {
    seedBtns.innerHTML = CROPS.map((c,i) => `
      <button data-idx="${i}" style="padding:6px 10px;border-radius:12px;border:2px solid ${i===selectedCrop?c.color:'rgba(255,255,255,0.2)'};background:${i===selectedCrop?c.color+'33':'transparent'};color:#1a4a28;font-weight:700;font-size:11px;cursor:pointer;text-align:left;">
        ${c.emoji} ${c.name} <span style="color:#ffc857;font-size:10px;">${c.seedCost>0?'💰'+c.seedCost:'免費'}</span>
      </button>
    `).join('');
    seedBtns.querySelectorAll('[data-idx]').forEach(btn => {
      btn.addEventListener('click', () => { selectedCrop=parseInt(btn.dataset.idx); buildSeedUI(); });
    });
  }

  function start() {
    reset();
    buildSeedUI();
    running=true;
    overlay.style.display='none';
    clearTimeout(growthTick);
    growthTick=setTimeout(growthUpdate,1000);
    showMsg('點擊土地種植作物，澆水可加速生長！');
  }

  canvas.addEventListener('click', handleCanvasClick);
  canvas.addEventListener('touchend', e=>{ e.preventDefault(); handleCanvasClick({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY}); },{passive:false});
  waterAllBtn.addEventListener('click', waterAll);
  startBtn.addEventListener('click', start);

  buildSeedUI();
  reset();
  render();

  window.__farmCleanup = function() {
    running=false;
    if(rafId)cancelAnimationFrame(rafId);
    if(growthTick)clearTimeout(growthTick);
    canvas.removeEventListener('click',handleCanvasClick);
  };
}
